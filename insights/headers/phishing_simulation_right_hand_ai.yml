name: "Right-Hand AI phishing simulation"
type: "query"
source: |
  type.inbound
  // Right-Hand publishes no dedicated header, so anchor on its sending IPs
  // (52.74.95.172 = simulation; SendGrid/relay IPs) paired with a Right-Hand
  // landing-page domain in the sender or a body link.
  and any(headers.ips,
          .ip in ("52.74.95.172", "168.245.54.27", "149.72.49.118", "52.76.252.34")
  )
  and (
    sender.email.domain.root_domain in (
      "linktosso.com",
      "resetlogin.com",
      "account-protect.me",
      "micrrosotf.com",
      "linktologin.com",
      "grnaill.com",
      "mailboxaccess.com",
      "linkdinapp.com",
      "micosot.com",
      "login-sso.com"
    )
    or any(body.links,
           .href_url.domain.root_domain in (
             "linktosso.com",
             "resetlogin.com",
             "account-protect.me",
             "micrrosotf.com",
             "linktologin.com",
             "grnaill.com",
             "mailboxaccess.com",
             "linkdinapp.com",
             "micosot.com",
             "login-sso.com"
           )
    )
  )
severity: "informational"
tags:
  - "Headers"
  - "Phishing simulation"
