name: "Huntress phishing simulation"
type: "query"
source: |
  type.inbound
  and (
    // SMTP delivery (single /32, equivalent to the exclusion's beta.ip_in)
    any(headers.ips, .ip == "18.205.140.116")
    // MS/Gmail DMI
    or length(headers.hops) == 1
  )
  and any(headers.hops, any(.fields, .name =~ "X-PHISHTEST-Curricula"))
  and any(headers.hops,
          any(.fields, .name in~ ('X-C-Message-Id', 'C-Message-Id'))
  )
  and sender.email.domain.root_domain in (
    "securitynotifications.org",
    "security-updater.com",
    "amazonsecurity.org",
    "breach-notice.com",
    "filesharingnow.com",
    "mailbox-quota.com",
    "passwordsnotification.com",
    "securelinkedin.com",
    "fraud-assistance.com",
    "payment-process.com",
    "news-article.com",
    "invite-meeting.com",
    "feedback-collect.com",
    "businessnotice.org",
    "databoxonline.com",
    "electronic-hr.com",
    "emailtransaction.com",
    "employee-services.org",
    "governmentnotice.org",
    "notificationservices.org",
  )
  and any(body.links,
          .href_url.domain.root_domain in (
            "securitynotifications.org",
            "security-updater.com",
            "amazonsecurity.org",
            "breach-notice.com",
            "filesharingnow.com",
            "mailbox-quota.com",
            "passwordsnotification.com",
            "securelinkedin.com",
            "fraud-assistance.com",
            "payment-process.com",
            "news-article.com",
            "invite-meeting.com",
            "feedback-collect.com",
            "businessnotice.org",
            "databoxonline.com",
            "electronic-hr.com",
            "emailtransaction.com",
            "employee-services.org",
            "governmentnotice.org",
            "notificationservices.org",
          )
  )
severity: "informational"
tags:
  - "Headers"
  - "Phishing simulation"
