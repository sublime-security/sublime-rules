name: "Links in attachments"
type: "query"
source: |
  map([
  filter(map(attachments,
              map(file.explode(.), distinct(map(.scan.url.urls, .url), .))
          ),
          length(.) > 0
  ),
  // parse out links from attached emls as well
  [filter(map(attachments,
              map(distinct(file.parse_eml(.).body.links, .href_url.url),
                  .href_url.url
              )
          ),
          length(.) > 0
  )]
  ], .)
severity: "informational"
