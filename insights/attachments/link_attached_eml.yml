name: "Links in Attached EMLs"
type: "query"
source: |
  [
    map(attachments, map(file.explode(.), distinct(map(.scan.url.urls, .url), .))),
    [
      map(attachments,
          map(distinct(file.parse_eml(.).body.links, .href_url.url),
              .href_url.url
          )
      )
    ]
  ]
severity: "informational"
