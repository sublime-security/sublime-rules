name: "Suspicious Wordpress Hosted HTML or PHP File"
type: "query"
source: |
    any(body.links,
        regex.icontains(.href_url.path,
                        // commonly abused wordpress paths
                        '^\/wp-(?:admin|includes)\/.*\.(?:html?|php)',
                        '^\/wp-content\/(?:(?:mu-)?plugins|themes)\/.*\.(?:html?|php)'
        )
        and not regex.icontains(.href_url.path,
                                '^\/wp-admin\/(?:[a-z0-9-]+\/)?[a-z0-9-]+\.php'
        )
        and not regex.icontains(.href_url.path,
                                '^\/wp-content\/.*\/(?:confirm|functions|matomo)\.php$'
        )
    )
    // exclude wordpress mailer
    and not strings.istarts_with(headers.mailer, 'WPMailSMTP')
severity: "medium"
tags:
  - "Suspicious link"
description: "This insight detects suspicious links originating from potentially compromised WordPress installations, where the linked resources are not typically intended to be publicly accessible."
