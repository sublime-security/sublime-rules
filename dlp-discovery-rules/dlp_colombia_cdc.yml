name: "DLP: Colombia Citizenship Card Number"
description: "Detects messages containing Colombian Citizenship Card (CDC) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CO_CDC"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CO_CDC"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Colombia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "3fe1bd8c-a0c7-567f-a465-4848973938f6"
