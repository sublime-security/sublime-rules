name: "DLP: Canada Social Insurance Number (SIN)"
description: "Detects messages containing Canadian Social Insurance Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CA_SIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CA_SIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Canada"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "795285bd-5143-52ae-92af-b5d499b5f9d5"
