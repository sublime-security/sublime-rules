name: "DLP - PCI: Mastercard Credit Card Number"
description: |
  Detects outbound emails containing Mastercard credit card numbers. Covers both
  traditional 5-series BINs (51-55) and expanded 2-series BINs (2221-2720). Uses
  Presidio's built-in credit card recognizer with Luhn checksum validation.
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "United States"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "32d9687a-28e1-53f3-9cfb-e9d4e0fd77ab"
