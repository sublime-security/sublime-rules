name: "DLP: Azure ML Web Service API Key"
description: "Detects messages containing Azure Machine Learning web service API keys."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_ML_WEB_SERVICE_KEY"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_ML_WEB_SERVICE_KEY"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "API Key"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "46e226e5-5b27-4432-89dd-ea4b2eea7a80"
