name: "DLP: Japan MyNumber ID"
description: "Detects messages containing Japanese MyNumber identification numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "JP_MY_NUMBER"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "JP_MY_NUMBER"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Japan"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "500b0110-688d-54c9-8efd-0d4716250b00"
