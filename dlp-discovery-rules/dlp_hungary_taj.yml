name: "DLP: Hungary Social Security Number (TAJ)"
description: "Detects messages containing Hungarian Social Security Numbers (TAJ)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "HU_TAJ"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "HU_TAJ"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Social Security Number"
regions:
  - "Hungary"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d729eb83-4944-53d0-b01d-d58d48bd9c25"
