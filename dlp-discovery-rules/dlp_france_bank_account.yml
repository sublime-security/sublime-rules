name: "DLP: France Bank Account Number"
description: "Detects messages containing French bank account numbers (IBAN)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "FRANCE_BANK_ACCOUNT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "FRANCE_BANK_ACCOUNT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Financial"
regions:
  - "France"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "e1083a78-9e9a-5ba5-9748-4c2d797e2e2b"
