name: "DLP: Luxembourg National ID (Non-Natural Persons)"
description: "Detects messages containing Luxembourg National Identification Numbers for non-natural persons."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "LUXEMBOURG_NONNATURAL_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "LUXEMBOURG_NONNATURAL_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Luxembourg"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "5f54f877-122e-5862-a961-5c8606ee1b31"
