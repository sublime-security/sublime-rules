name: "DLP: IP Address"
description: "Detects messages containing IP addresses (IPv4 and IPv6)."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IP_ADDRESS"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IP_ADDRESS"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Network Identifiers"
data_types:
  - "Network Address"
regions:
  - "Global"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d637bb74-67d5-58fb-87eb-5903a801876f"
