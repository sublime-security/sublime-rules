name: "DLP: Australia Medical Account Number"
description: "Detects messages containing Australian Medicare numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AU_MEDICARE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AU_MEDICARE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
  - "PHI"
data_types:
  - "Healthcare ID"
regions:
  - "Australia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "6b5477cf-256c-5f96-bd6a-28a6b0a8746f"
