name: "DLP: Azure SignalR Access Key"
description: "Detects messages containing Azure SignalR service access keys."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_SIGNALR_ACCESS_KEY"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_SIGNALR_ACCESS_KEY"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "API Key"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "fdbfe99e-51f8-461f-acb5-770a0a637383"
