name: "DLP: UK Unique Taxpayer Reference (UTR)"
description: "Detects messages containing UK Unique Taxpayer Reference numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "UK_UTR"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "UK_UTR"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax"
regions:
  - "United Kingdom"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "2d987acf-36bb-4a43-9c4c-8be5080fd65e"
