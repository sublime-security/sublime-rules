name: "DLP: Belgium National Number"
description: "Detects messages containing Belgian National Numbers (Rijksregisternummer)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "BELGIUM_NATIONAL_NUMBER"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "BELGIUM_NATIONAL_NUMBER"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Belgium"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "962a3dfb-ef20-52bb-9fec-e85866e3c5ca"
