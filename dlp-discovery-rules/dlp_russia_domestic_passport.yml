name: "DLP: Russia Domestic Passport"
description: "Detects messages containing Russian domestic passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "RU_DOMESTIC_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "RU_DOMESTIC_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "Russia"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d4b2b76c-1bb5-406e-9740-b0fae5acdca0"
