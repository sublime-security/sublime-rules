name: "DLP - PCI: Visa Credit Card Number"
description: |
  Detects outbound emails containing Visa credit card numbers. Visa card numbers
  begin with 4 and are 13 or 16 digits long. Uses Presidio's built-in credit card
  recognizer with Luhn checksum validation.
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "United States"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "a81ebea6-c2d5-559f-8e94-dcc4c842efdf"
