name: "DLP: EU Tax ID"
description: "Detects messages containing any EU/EEA member state tax identification number."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type in (
            "AT_TAX_ID",
            "AT_VAT",
            "CY_TAX_ID",
            "DE_TAX_ID",
            "ES_TAX_ID",
            "FR_TAX_ID",
            "GR_TAX_ID",
            "HU_TAX_ID",
            "HU_VAT",
            "IT_TAX_ID",
            "MT_TAX_ID",
            "NL_TAX_ID",
            "PL_TAX_ID",
            "PT_TAX_ID",
            "SE_TAX_ID",
            "SI_TAX_ID"
          )
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type in (
                "AT_TAX_ID",
                "AT_VAT",
                "CY_TAX_ID",
                "DE_TAX_ID",
                "ES_TAX_ID",
                "FR_TAX_ID",
                "GR_TAX_ID",
                "HU_TAX_ID",
                "HU_VAT",
                "IT_TAX_ID",
                "MT_TAX_ID",
                "NL_TAX_ID",
                "PL_TAX_ID",
                "PT_TAX_ID",
                "SE_TAX_ID",
                "SI_TAX_ID"
              )
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax ID"
regions:
  - "European Union"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "37014037-1c31-4798-80fe-5e3af60c7274"
