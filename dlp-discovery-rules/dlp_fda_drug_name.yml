name: "DLP: FDA Drug Names"
description: "Detects messages containing FDA-approved drug and medication names."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "FDA_DRUG_NAME"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "FDA_DRUG_NAME"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "Global"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "b34e0d6d-93df-4518-8af1-dd87e70a510e"
