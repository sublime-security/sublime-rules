name: "DLP - PCI: Discover Credit Card Number"
description: |
  Detects outbound emails containing Discover credit card numbers. Discover PANs
  are 16 digits starting with 6011, 622126-622925, 644-649, or 65. Uses Presidio's
  built-in credit card recognizer with Luhn checksum validation.
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "United States"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "2031491a-7f6c-5c76-b06d-a8415f7fa40d"
