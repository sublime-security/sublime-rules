name: "DLP: Azure Cosmos DB Account Access Key"
description: "Detects messages containing Azure Cosmos DB account access keys used to access administrative resources."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_COSMOS_DB_ACCESS_KEY"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_COSMOS_DB_ACCESS_KEY"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "API Key"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "4fa161a4-f8ea-4ade-9f6a-0bb6af4350f4"
