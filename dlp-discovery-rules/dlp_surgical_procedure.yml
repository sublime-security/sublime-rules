name: "DLP: Surgical Procedures"
description: "Detects messages containing surgical procedure and operation names."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SURGICAL_PROCEDURE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SURGICAL_PROCEDURE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "Global"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "96156912-d1d9-44ca-aff4-2244b9ef6a50"
