name: "DLP: Azure Service Bus Connection String"
description: "Detects messages containing Azure Service Bus connection strings with shared access keys."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_SERVICE_BUS_CONNECTION_STRING"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_SERVICE_BUS_CONNECTION_STRING"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Connection String"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f96f0f8c-e67f-4434-84d5-1c2e7802c03b"
