name: "DLP: Japan Credit Card Number"
description: "Detects messages containing credit card numbers in Japanese context."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "Japan"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "5182e877-7de5-573e-8cbe-ceb2a27e9de3"
