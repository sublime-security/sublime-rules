name: "DLP - PCI: American Express Credit Card Number"
description: |
  Detects outbound emails containing American Express (Amex) credit card numbers.
  Amex PANs are 15 digits and start with 34 or 37. Uses Presidio's built-in credit
  card recognizer with Luhn checksum validation.
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "United States"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "cc2d8bce-41a6-5b70-bafc-acce206b142e"
