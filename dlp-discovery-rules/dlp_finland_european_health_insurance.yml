name: "DLP: Finland European Health Insurance Card"
description: "Detects messages containing Finnish European Health Insurance Card numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "FI_EUROPEAN_HEALTH_INSURANCE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "FI_EUROPEAN_HEALTH_INSURANCE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Health Insurance"
regions:
  - "Finland"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "3a580af3-08a3-417c-84fc-05d82632eec2"
