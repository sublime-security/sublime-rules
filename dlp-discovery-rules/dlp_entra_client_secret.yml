name: "DLP: Microsoft Entra Client Secret"
description: "Detects messages containing Microsoft Entra (Azure AD) client secrets used for service principal authentication."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "ENTRA_CLIENT_SECRET"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "ENTRA_CLIENT_SECRET"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f1741357-b46b-4b21-9c6a-899ec90b4fad"
