name: "DLP: IMEI Number"
description: "Detects messages containing International Mobile Equipment Identity (IMEI) numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IMEI"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IMEI"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Network Identifiers"
data_types:
  - "Device Identifier"
regions:
  - "Global"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "0faa7d25-0ea1-5921-b9fd-125d2d34b8d5"
