name: "DLP: US Social Security Number (SSN)"
description: "Detects messages containing US Social Security Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_SSN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_SSN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "United States"
compliance:
  - "CCPA"
  - "GLBA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "5ed9e765-1827-5bec-9e04-77bad97ba4ba"
