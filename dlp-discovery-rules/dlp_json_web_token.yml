name: "DLP: JSON Web Token (JWT)"
description: "Detects messages containing JSON Web Tokens."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "JSON_WEB_TOKEN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "JSON_WEB_TOKEN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "7591086a-9600-54a8-bc34-26d664b2c4bc"
