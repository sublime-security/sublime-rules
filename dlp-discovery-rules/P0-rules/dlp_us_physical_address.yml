name: "DLP: US Physical Address"
description: "Detects messages containing US physical addresses."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
      .type == "us_physical_address" and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
            .type == "us_physical_address" and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
detection_methods:
  - "Content analysis"
