name: "DLP: Poland Tax Identification Number"
description: "Detects messages containing Polish Tax Identification Numbers (NIP)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "PL_TAX_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "PL_TAX_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax ID"
regions:
  - "Poland"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f3f37258-5c3a-5a70-89cc-5c21b7194cd2"
