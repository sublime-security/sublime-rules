name: "DLP: Russia International Passport"
description: "Detects messages containing Russian international passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "RU_INTERNATIONAL_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "RU_INTERNATIONAL_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "Russia"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "4f7f86a6-a708-4e68-84f2-91392d03a54b"
