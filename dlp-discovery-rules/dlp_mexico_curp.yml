name: "DLP: Mexico CURP Number"
description: "Detects messages containing Mexican Unique Population Registry Code (CURP)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "MX_CURP"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "MX_CURP"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Mexico"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "7ed7b32a-7cb1-5188-a1b5-8c087d018d52"
