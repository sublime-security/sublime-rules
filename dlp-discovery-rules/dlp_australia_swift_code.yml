name: "DLP: Australia SWIFT Code"
description: "Detects messages containing Australian SWIFT/BIC codes for financial institutions."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AU_SWIFT_CODE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AU_SWIFT_CODE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Australia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "4da18a44-7112-58b2-a8a2-e85dc76e4a60"
