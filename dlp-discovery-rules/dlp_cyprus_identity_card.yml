name: "DLP: Cyprus Identity Card"
description: "Detects messages containing Cypriot Identity Card numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and any([body.current_thread.text, subject.subject],
          // Cyprus ID: 8 alphanumeric characters
          regex.contains(., '\b[A-Z0-9]{8}\b')
  )
  and any([body.current_thread.text, subject.subject],
          regex.icontains(., 'identity\s+card|ταυτότητα|kimlik')
  )
  and (
    strings.icontains(sender.email.domain.tld, "cy")
    or strings.icontains(body.current_thread.text, "cyprus")
  )

detection_methods:
  - "Content analysis"
id: "0022129b-de93-539b-bae5-b0e2733844c6"
