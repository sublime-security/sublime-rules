name: "DLP: India Bank Account Number"
description: "Detects messages containing Indian bank account numbers with IFSC codes."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IN_BANK_ACCOUNT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IN_BANK_ACCOUNT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "India"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "1bf9a9d0-fcc7-5053-9167-25514ae26af2"
