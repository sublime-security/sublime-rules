name: "DLP: US Driver's License Number"
description: "Detects messages containing US driver's license numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_DRIVER_LICENSE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_DRIVER_LICENSE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "United States"
compliance:
  - "CCPA"
  - "GLBA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "bffdbcef-5ea5-5c8d-a2aa-64833faa073c"
