name: "DLP: Slack Token"
description: "Detects messages containing Slack API tokens and webhooks."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SLACK_TOKEN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SLACK_TOKEN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "99723c25-994d-59a5-ab4f-030415050c2e"
