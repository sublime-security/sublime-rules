name: "DLP: Israel Bank Account Number"
description: "Detects messages containing Israeli bank account numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IL_BANK_ACCOUNT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IL_BANK_ACCOUNT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Israel"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "1ca4fa07-523d-5e34-a59f-e64856cf7631"
