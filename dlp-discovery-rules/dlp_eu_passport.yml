name: "DLP: EU Passport"
description: "Detects messages containing any EU/EEA member state passport number."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type in (
            "AT_PASSPORT",
            "BG_PASSPORT",
            "CY_PASSPORT",
            "CZ_PASSPORT",
            "DE_PASSPORT",
            "DK_PASSPORT",
            "EE_PASSPORT",
            "ES_PASSPORT",
            "FI_PASSPORT",
            "FR_PASSPORT",
            "GR_PASSPORT",
            "HR_PASSPORT",
            "HU_PASSPORT",
            "IE_PASSPORT",
            "IT_PASSPORT",
            "LT_PASSPORT",
            "LV_PASSPORT",
            "MT_PASSPORT",
            "NL_PASSPORT",
            "PL_PASSPORT",
            "PT_PASSPORT",
            "RO_PASSPORT",
            "SE_PASSPORT",
            "SI_PASSPORT",
            "SK_PASSPORT"
          )
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type in (
                "AT_PASSPORT",
                "BG_PASSPORT",
                "CY_PASSPORT",
                "CZ_PASSPORT",
                "DE_PASSPORT",
                "DK_PASSPORT",
                "EE_PASSPORT",
                "ES_PASSPORT",
                "FI_PASSPORT",
                "FR_PASSPORT",
                "GR_PASSPORT",
                "HR_PASSPORT",
                "HU_PASSPORT",
                "IE_PASSPORT",
                "IT_PASSPORT",
                "LT_PASSPORT",
                "LV_PASSPORT",
                "MT_PASSPORT",
                "NL_PASSPORT",
                "PL_PASSPORT",
                "PT_PASSPORT",
                "RO_PASSPORT",
                "SE_PASSPORT",
                "SI_PASSPORT",
                "SK_PASSPORT"
              )
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "European Union"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d660c110-2ab3-4de3-b008-59d49dde5e11"
