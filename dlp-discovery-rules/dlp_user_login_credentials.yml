name: "DLP: User Login Credentials"
description: "Detects messages containing user login credentials (username and password pairs)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "USER_LOGIN_CREDENTIALS"
          and .confidence == "high"
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "USER_LOGIN_CREDENTIALS"
              and .confidence == "high"
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "e041792a-89fa-4e21-baf8-c717bf931bfc"
