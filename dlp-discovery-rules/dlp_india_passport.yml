name: "DLP: India Passport Number"
description: "Detects messages containing Indian passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IN_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IN_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "India"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "4f8bdfce-d739-5212-a8a4-2a1a834da267"
