name: "DLP: Ukraine International Passport"
description: "Detects messages containing Ukrainian international passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "UA_INTERNATIONAL_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "UA_INTERNATIONAL_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "Ukraine"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "039a9620-b56e-4e03-a095-5d7616625980"
