name: "DLP: EU Debit Card Number"
description: "Detects messages containing European debit card numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "European Union"
compliance:
  - "PCI-DSS"
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "0f31c606-5ea3-530d-a711-a6c6b9c7cd38"
