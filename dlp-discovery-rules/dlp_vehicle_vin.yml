name: "DLP: Vehicle Identification Number (VIN)"
description: "Detects messages containing Vehicle Identification Numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "VEHICLE_VIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "VEHICLE_VIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Device Identifier"
regions:
  - "Global"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "18b68205-e1f8-5f09-a78b-1ac3e1ca3ad3"
