name: "DLP: Lithuania Driver's License"
description: "Detects messages containing Lithuanian driver's license numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "LT_DRIVERS_LICENSE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "LT_DRIVERS_LICENSE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Driver's License"
regions:
  - "Lithuania"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "9b61c89a-41c5-40de-84ba-74d080d067b6"
