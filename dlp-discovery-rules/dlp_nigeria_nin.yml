name: "DLP: Nigeria National Identification Number"
description: "Detects messages containing Nigerian National Identification Numbers (NIN)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "NG_NIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "NG_NIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Nigeria"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f644c49d-ca96-47cd-b51a-bcd01eba88ea"
