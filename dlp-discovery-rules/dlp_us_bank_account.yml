name: "DLP: US Bank Account Number"
description: "Detects messages containing US bank account numbers with ABA routing numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_BANK_NUMBER"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_BANK_NUMBER"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "United States"
compliance:
  - "GLBA"
  - "SOX"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "b81d1c09-2caa-51d1-82ce-72cf504a2c9f"
