name: "DLP: Spain Bank Account Number"
description: "Detects messages containing Spanish bank account numbers (IBAN)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SPAIN_BANK_ACCOUNT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SPAIN_BANK_ACCOUNT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Financial"
regions:
  - "Spain"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "b6342006-546b-5058-acc3-776726e9c9b7"
