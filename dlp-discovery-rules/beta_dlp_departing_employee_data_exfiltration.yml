name: "DLP - Departing Employee Data Exfiltration"
description: |
  Detects outbound emails from employees currently on the $employees_on_notice
  custom list who are sending file attachments to personal email domains, or
  sending emails with large individual attachments to any destination. Both
  triggers are treated as independent high-confidence exfiltration signals given
  the insider threat context of a known departing employee.

  No regex or ml_extract applicable. Signals are sender list membership, domain
  routing, and attachment volume.

  Operational requirement: $employees_on_notice must be updated promptly when
  resignations are received and entries removed after the employee's final day.
type: "dlp"
severity: high
source: |
  type.outbound
  and sender.email.email in $employees_on_notice
  and (
      // Trigger 1: any attachment routed to a personal email domain
      (
          length(attachments) > 0
          and (
              any(recipients.to,
                  .email.domain.root_domain in $free_email_providers
                  or .email.domain.root_domain in $disposable_email_providers
              )
              or any(recipients.cc,
                  .email.domain.root_domain in $free_email_providers
                  or .email.domain.root_domain in $disposable_email_providers
              )
          )
      )
      // Trigger 2: single attachment over 5 MB regardless of destination
      or (
          any(attachments, .size > 5242880)
          and (
              any(recipients.to,
                  .email.domain.root_domain in $free_email_providers
                  or .email.domain.root_domain in $disposable_email_providers
              )
              or any(recipients.cc,
                  .email.domain.root_domain in $free_email_providers
                  or .email.domain.root_domain in $disposable_email_providers
              )
              or any(recipients.bcc,
                  .email.domain.root_domain in $free_email_providers
                  or .email.domain.root_domain in $disposable_email_providers
              )
          )
      )
  )
tags:
  - "Sensitive data"
attack_types:
  - "DLP: Data Exfiltration"
detection_methods:
  - "Content analysis"
  - "Sender analysis"
