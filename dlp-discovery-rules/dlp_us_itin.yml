name: "DLP: US Individual Taxpayer Identification Number (ITIN)"
description: "Detects messages containing US Individual Taxpayer Identification Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_ITIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_ITIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "United States"
compliance:
  - "CCPA"
  - "GLBA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "259d44e5-b0ac-5846-9153-25d08d05ac38"
