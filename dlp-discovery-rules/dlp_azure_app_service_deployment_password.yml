name: "DLP: Azure App Service Deployment Password"
description: "Detects messages containing Azure App Service deployment passwords used to secure deployments from a local computer."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_APP_SERVICE_DEPLOYMENT_PASSWORD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_APP_SERVICE_DEPLOYMENT_PASSWORD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f1cbece4-b9b8-44a0-b94c-1e947ae3ce84"
