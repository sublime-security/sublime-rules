name: "beta.DLP: US Individual Taxpayer Identification Number (ITIN)"
description: "Detects messages containing US Individual Taxpayer Identification Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text).elements,
      .type == "us_itin" and .confidence in ("medium", "high")
    )
    or any(beta.ml_extract_sensitive_information(subject.subject).elements,
      .type == "us_itin" and .confidence in ("medium", "high")
    )
    or any(attachments,
    any(file.explode(.),
      (
        any(beta.ml_extract_sensitive_information(.scan.strings.raw).elements,
          .type == "us_itin" and .confidence in ("medium", "high")
        )
        or any(beta.ml_extract_sensitive_information(.scan.ocr.raw).elements,
          .type == "us_itin" and .confidence in ("medium", "high")
        )
      )
    )
  )
  )
tags:
  - "PII"
attack_types:
  - "DLP: PII"
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "File analysis"
  - "Optical Character Recognition"
id: "bca7cee0-2ee2-548d-b40f-16da1218d3a7"
