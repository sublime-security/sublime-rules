name: "DLP: EU Driver's License"
description: "Detects messages containing any EU/EEA member state driver's license number."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type in (
            "AT_DRIVERS_LICENSE",
            "BG_DRIVERS_LICENSE",
            "CY_DRIVERS_LICENSE",
            "CZ_DRIVERS_LICENSE",
            "DE_DRIVERS_LICENSE",
            "DK_DRIVERS_LICENSE",
            "EE_DRIVERS_LICENSE",
            "ES_DRIVERS_LICENSE",
            "FI_DRIVERS_LICENSE",
            "FR_DRIVERS_LICENSE",
            "GR_DRIVERS_LICENSE",
            "HR_DRIVERS_LICENSE",
            "HU_DRIVERS_LICENSE",
            "IE_DRIVERS_LICENSE",
            "IT_DRIVERS_LICENSE",
            "LT_DRIVERS_LICENSE",
            "LV_DRIVERS_LICENSE",
            "MT_DRIVERS_LICENSE",
            "NL_DRIVERS_LICENSE",
            "PL_DRIVERS_LICENSE",
            "PT_DRIVERS_LICENSE",
            "RO_DRIVERS_LICENSE",
            "SE_DRIVERS_LICENSE",
            "SI_DRIVERS_LICENSE",
            "SK_DRIVERS_LICENSE"
          )
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type in (
                "AT_DRIVERS_LICENSE",
                "BG_DRIVERS_LICENSE",
                "CY_DRIVERS_LICENSE",
                "CZ_DRIVERS_LICENSE",
                "DE_DRIVERS_LICENSE",
                "DK_DRIVERS_LICENSE",
                "EE_DRIVERS_LICENSE",
                "ES_DRIVERS_LICENSE",
                "FI_DRIVERS_LICENSE",
                "FR_DRIVERS_LICENSE",
                "GR_DRIVERS_LICENSE",
                "HR_DRIVERS_LICENSE",
                "HU_DRIVERS_LICENSE",
                "IE_DRIVERS_LICENSE",
                "IT_DRIVERS_LICENSE",
                "LT_DRIVERS_LICENSE",
                "LV_DRIVERS_LICENSE",
                "MT_DRIVERS_LICENSE",
                "NL_DRIVERS_LICENSE",
                "PL_DRIVERS_LICENSE",
                "PT_DRIVERS_LICENSE",
                "RO_DRIVERS_LICENSE",
                "SE_DRIVERS_LICENSE",
                "SI_DRIVERS_LICENSE",
                "SK_DRIVERS_LICENSE"
              )
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Driver's License"
regions:
  - "European Union"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "8976a8f4-9008-4996-a3f5-9a9f8de226d8"
