name: "DLP: Taiwan ID Number"
description: "Detects messages containing Taiwan National Identification Card numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "TW_NATIONAL_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "TW_NATIONAL_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Taiwan"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "65f678cb-64d8-5bc8-bb9c-56014c499371"
