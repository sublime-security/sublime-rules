name: "DLP: Switzerland AHV/AVS Number"
description: "Detects messages containing Swiss social security numbers (AHV/AVS)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CH_AHV"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CH_AHV"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Social Security Number"
regions:
  - "Switzerland"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "6a5ea785-ae75-40ff-9d05-71652a53684b"
