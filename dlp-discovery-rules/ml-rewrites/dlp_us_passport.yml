name: "DLP: US Passport Number"
description: "Detects messages containing US passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
      .type == "us_passport_number" and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
            .type == "us_passport_number" and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
detection_methods:
  - "Content analysis"
id: "df291668-d22b-5402-8705-45d39119d425"
