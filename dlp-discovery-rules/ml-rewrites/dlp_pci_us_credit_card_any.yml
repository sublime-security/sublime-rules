name: "DLP - PCI: US Credit Card Number (Any Network)"
description: "Detects messages containing credit card numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
      .type == "credit_card_number" and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
            .type == "credit_card_number" and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
detection_methods:
  - "Content analysis"
id: "e1959e6c-49e9-5c13-af51-360bf3089c32"
