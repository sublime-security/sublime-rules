name: "DLP: US Bank Account Number"
description: "Detects messages containing US bank account numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
      .type == "us_bank_number" and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
            .type == "us_bank_number" and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
detection_methods:
  - "Content analysis"
id: "b81d1c09-2caa-51d1-82ce-72cf504a2c9f"
