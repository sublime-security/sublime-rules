name: "DLP: Argentina DNI Number"
description: "Detects messages containing Argentine National Identity Card (DNI) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AR_DNI"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AR_DNI"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Argentina"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "bcd91739-4e68-5af3-8c99-97fed0525753"
