name: "DLP: Blood Test Terms"
description: "Detects messages containing blood test and laboratory marker terminology."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "BLOOD_TEST_TERM"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "BLOOD_TEST_TERM"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "Global"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "af1e99af-5e6a-4efa-adee-86b2639c92aa"
