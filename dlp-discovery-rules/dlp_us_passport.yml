name: "DLP: US Passport Number"
description: "Detects messages containing US passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "United States"
compliance:
  - "CCPA"
  - "GLBA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "df291668-d22b-5402-8705-45d39119d425"
