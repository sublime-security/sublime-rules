name: "DLP: Azure Bot Framework Secret Key"
description: "Detects messages containing Azure Bot Framework secret keys used for WebChat channel connections."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_BOT_FRAMEWORK_SECRET_KEY"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_BOT_FRAMEWORK_SECRET_KEY"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "API Key"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "46d9c234-4a3f-46d3-a3d7-1851ee09b82a"
