name: "DLP: Australia Tax File Number"
description: "Detects messages containing Australian Tax File Numbers (TFN)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AU_TFN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AU_TFN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Tax ID"
regions:
  - "Australia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "6f995365-e040-5065-b866-df2b4e11b698"
