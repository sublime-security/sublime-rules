name: "DLP - PCI: US Credit Card Number (Any Network)"
description: |
  Detects outbound emails containing credit card numbers from any of the four major
  US payment networks -- Visa, Mastercard, American Express, and Discover -- using
  Presidio's built-in credit card recognizer with Luhn checksum validation.
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "Global"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "e1959e6c-49e9-5c13-af51-360bf3089c32"
