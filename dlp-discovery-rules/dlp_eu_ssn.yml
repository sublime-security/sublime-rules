name: "DLP: EU Social Security Number"
description: "Detects messages containing any EU/EEA member state social security number."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type in (
            "AT_SOCIAL_SECURITY",
            "DE_SSN",
            "ES_SSN",
            "FI_EUROPEAN_HEALTH_INSURANCE",
            "FR_SSN",
            "GR_AMKA",
            "HU_TAJ",
            "IT_SSN",
            "NL_SSN",
            "PT_SSN",
            "CH_AHV"
          )
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type in (
                "AT_SOCIAL_SECURITY",
                "DE_SSN",
                "ES_SSN",
                "FI_EUROPEAN_HEALTH_INSURANCE",
                "FR_SSN",
                "GR_AMKA",
                "HU_TAJ",
                "IT_SSN",
                "NL_SSN",
                "PT_SSN",
                "CH_AHV"
              )
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Social Security Number"
regions:
  - "European Union"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d632c5e5-abd8-44a6-9915-0fd52f9fb413"
