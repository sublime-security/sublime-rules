name: "DLP: Hungary VAT Number"
description: "Detects messages containing Hungarian VAT identification numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "HU_VAT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "HU_VAT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax ID"
regions:
  - "Hungary"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "88b4c7b4-ffef-42f9-99d7-9aa1afa2d05f"
