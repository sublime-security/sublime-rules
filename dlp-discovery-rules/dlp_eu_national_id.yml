name: "DLP: EU National ID"
description: "Detects messages containing any EU/EEA member state national identification number."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type in (
            "AT_IDENTITY_CARD",
            "BG_UCN",
            "CY_IDENTITY_CARD",
            "CZ_PERSONAL_ID",
            "DE_IDENTITY_CARD",
            "DK_PERSONAL_ID",
            "EE_PERSONAL_CODE",
            "ES_DNI",
            "FI_PERSONAL_IDENTITY_CODE",
            "FR_CNI",
            "GR_NATIONAL_ID",
            "HR_IDENTITY_CARD",
            "HR_OIB",
            "HU_PERSONAL_ID",
            "IE_PPS",
            "IT_FISCAL_CODE",
            "LT_PERSONAL_CODE",
            "LV_PERSONAL_CODE",
            "MT_IDENTITY_CARD",
            "NL_BSN",
            "PL_IDENTITY_CARD",
            "PL_PESEL",
            "PT_CC",
            "RO_PERSONAL_CODE",
            "SE_PERSONAL_NUMBER",
            "SI_EMSO",
            "SK_PERSONAL_NUMBER"
          )
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type in (
                "AT_IDENTITY_CARD",
                "BG_UCN",
                "CY_IDENTITY_CARD",
                "CZ_PERSONAL_ID",
                "DE_IDENTITY_CARD",
                "DK_PERSONAL_ID",
                "EE_PERSONAL_CODE",
                "ES_DNI",
                "FI_PERSONAL_IDENTITY_CODE",
                "FR_CNI",
                "GR_NATIONAL_ID",
                "HR_IDENTITY_CARD",
                "HR_OIB",
                "HU_PERSONAL_ID",
                "IE_PPS",
                "IT_FISCAL_CODE",
                "LT_PERSONAL_CODE",
                "LV_PERSONAL_CODE",
                "MT_IDENTITY_CARD",
                "NL_BSN",
                "PL_IDENTITY_CARD",
                "PL_PESEL",
                "PT_CC",
                "RO_PERSONAL_CODE",
                "SE_PERSONAL_NUMBER",
                "SI_EMSO",
                "SK_PERSONAL_NUMBER"
              )
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "European Union"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "22a06938-036b-4bbf-9625-eaf2bccde65d"
