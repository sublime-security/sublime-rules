name: "DLP: Canada Personal Health Identification Number (PHIN)"
description: "Detects messages containing Canadian Personal Health Identification Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CA_PHIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CA_PHIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
  - "PHI"
data_types:
  - "Healthcare ID"
regions:
  - "Canada"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "ac349280-46b6-5224-9e81-e996a86dc32c"
