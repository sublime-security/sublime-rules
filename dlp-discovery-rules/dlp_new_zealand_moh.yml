name: "DLP: New Zealand Ministry of Health Number"
description: "Detects messages containing New Zealand National Health Index (NHI) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "NZ_MOH"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "NZ_MOH"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
  - "PHI"
data_types:
  - "Healthcare ID"
regions:
  - "New Zealand"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "96e26ff1-e505-4069-aeb4-76b66cd683d5"
