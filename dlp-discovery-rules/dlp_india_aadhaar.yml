name: "DLP: India Aadhaar Number"
description: "Detects messages containing Indian Aadhaar identification numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IN_AADHAAR"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IN_AADHAAR"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "India"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "00b9be99-2832-5cb3-a8a7-20fe2f8786e8"
