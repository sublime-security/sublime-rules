name: "DLP: Spain Social Security Number"
description: "Detects messages containing Spanish Social Security Numbers (Numero de la Seguridad Social)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SPAIN_SSN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SPAIN_SSN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Spain"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "04f9e1a3-2905-5df1-8b2b-318f75b23ea1"
