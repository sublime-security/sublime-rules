name: "DLP: South Korea Resident Registration Number (RRN)"
description: "Detects messages containing South Korean Resident Registration Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "KR_RRN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "KR_RRN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "South Korea"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "f8624d7d-b3eb-54f2-a0c7-efb708ab33d9"
