name: "DLP: Chile Identity Card Number"
description: "Detects messages containing Chilean Identity Card (CDI) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CL_CDI"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CL_CDI"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Chile"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "22bc7cb6-fd39-5d23-9589-8e52c3f8bf42"
