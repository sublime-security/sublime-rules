name: "DLP: Azure IoT Connection String"
description: "Detects messages containing Azure IoT Hub connection strings with shared access keys."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AZURE_IOT_CONNECTION_STRING"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AZURE_IOT_CONNECTION_STRING"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Connection String"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "dfd60d90-053b-4c47-9a2c-a3fafcb73656"
