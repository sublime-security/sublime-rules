# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "AWS Access Key ID"
    supported_language: en
    supported_entity: AWS_ACCESS_KEY
    patterns:
      - name: "aws_access_key_id"
        regex: "\\bAKIA[0-9A-Z]{16}\\b"
        score: 0.85
    context: ["aws", "amazon", "access key", "secret key", "AKIA", "credentials"]

  - name: "AWS Secret Access Key"
    supported_language: en
    supported_entity: AWS_ACCESS_KEY
    patterns:
      - name: "aws_secret_access_key"
        regex: "(?i)(?:aws_secret_access_key|secret.?key|aws.?secret)\\s*[:=]\\s*[A-Za-z0-9/+=]{40}"
        score: 0.7
    context: ["aws", "amazon", "secret key", "secret access key", "credentials"]
