# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [Israel]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Israel Bank Account Number"
    supported_language: en
    supported_entity: IL_BANK_ACCOUNT
    patterns:
      - name: "il_bank_account"
        regex: "\\b\\d{6,9}\\b"
        score: 0.1
    context: ["bank account", "account number", "bank", "transfer", "deposit", "israel", "israeli"]

  - name: "Israel Bank Account Number (Hebrew)"
    supported_language: he
    supported_entity: IL_BANK_ACCOUNT
    patterns:
      - name: "il_bank_account_he"
        regex: "\\b\\d{6,9}\\b"
        score: 0.3
    context: ["חשבון בנק", "מספר חשבון", "בנק", "העברה"]
