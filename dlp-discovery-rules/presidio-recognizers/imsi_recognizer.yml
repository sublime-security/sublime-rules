# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Network Identifiers]
#   data_types: [Device Identifier]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "IMSI Number"
    supported_language: en
    supported_entity: IMSI
    patterns:
      - name: "imsi_15_digits"
        regex: "\\b\\d{15}\\b"
        score: 0.3
      - name: "imsi_14_digits"
        regex: "\\b\\d{14}\\b"
        score: 0.2
    context:
      - "IMSI"
      - "international mobile subscriber"
      - "SIM identifier"
      - "subscriber identity"
      - "mobile subscriber"
      - "IMSI number"
