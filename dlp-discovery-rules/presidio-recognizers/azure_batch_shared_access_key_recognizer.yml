# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 256-bit symmetric key (43 chars + =)
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "Azure Batch Shared Access Key"
    supported_language: en
    supported_entity: AZURE_BATCH_SHARED_ACCESS_KEY
    patterns:
      - name: "azure_batch_connection_string"
        regex: "(?i)(?:batch\\.azure\\.com|batch\\.windows\\.net).{0,100}(?:SharedAccessKey|AccountKey)\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.85
      - name: "azure_batch_account_key"
        regex: "(?i)(?:AccountKey|SharedAccessKey)\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.6
    context: ["azure", "batch", "SharedAccessKey", "AccountKey", "batch.azure.com"]
