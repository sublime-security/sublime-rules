# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Basic Authentication Header"
    supported_language: en
    supported_entity: BASIC_AUTH_HEADER
    patterns:
      - name: "basic_auth_header"
        regex: "\\bBasic\\s+[A-Za-z0-9+/]{16,}={0,2}\\b"
        score: 0.75
      - name: "authorization_basic"
        regex: "(?i)Authorization:\\s*Basic\\s+[A-Za-z0-9+/]{16,}={0,2}"
        score: 0.85
    context: ["authorization", "basic", "header", "auth", "http", "credential"]
