recognizers:
  - name: "Lithuania Passport Number"
    supported_language: en
    supported_entity: LT_PASSPORT
    patterns:
      - name: "lt_passport"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
    context: ["passport", "pasas", "lithuania", "lithuanian", "paso numeris", "keliones dokumentas"]
