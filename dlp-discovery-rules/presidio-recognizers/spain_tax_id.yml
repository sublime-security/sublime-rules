# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax]
#   regions: [Spain]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Spain Tax ID"
    supported_language: en
    supported_entity: SPAIN_TAX_ID
    patterns:
      - name: "spain_nif_personal"
        regex: "\\b\\d{8}[A-Z]\\b"
        score: 0.4
      - name: "spain_nif_company"
        regex: "\\b[A-Z]\\d{7}[A-Z0-9]\\b"
        score: 0.4
    context: ["NIF", "numero de identificacion fiscal", "tax ID", "CIF", "identificacion fiscal"]
