# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Cryptographic Material]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 256-bit (44 chars) or 512-bit (88 chars) symmetric keys
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "General Symmetric Key"
    supported_language: en
    supported_entity: GENERAL_SYMMETRIC_KEY
    patterns:
      - name: "symmetric_key_256"
        regex: "(?i)(?:SharedAccessKey|AccountKey|key|secret)\\s*[=:]\\s*[A-Za-z0-9/+]{43}="
        score: 0.6
      - name: "symmetric_key_512"
        regex: "(?i)(?:SharedAccessKey|AccountKey|key|secret)\\s*[=:]\\s*[A-Za-z0-9/+]{86}=="
        score: 0.65
    context: ["SharedAccessKey", "AccountKey", "key", "secret", "symmetric", "encryption"]
