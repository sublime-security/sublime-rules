# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Argentina]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Argentina DNI Number"
    supported_language: en
    supported_entity: AR_DNI
    patterns:
      - name: "ar_dni_formatted"
        regex: "\\b\\d{2}\\.?\\d{3}\\.?\\d{3}\\b"
        score: 0.2
    context: ["DNI", "documento nacional", "identity card", "argentina", "national identity", "documento"]
