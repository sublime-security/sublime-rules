# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [Japan]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Japan Bank Account Number"
    supported_language: en
    supported_entity: JP_BANK_ACCOUNT
    patterns:
      - name: "jp_bank_account"
        regex: "\\b\\d{7}\\b"
        score: 0.1
    context: ["bank account", "account number", "bank", "transfer", "deposit", "savings"]

  - name: "Japan Bank Account Number (Japanese)"
    supported_language: ja
    supported_entity: JP_BANK_ACCOUNT
    patterns:
      - name: "jp_bank_account_ja"
        regex: "\\b\\d{7}\\b"
        score: 0.3
    context: ["口座番号", "銀行口座", "振込", "預金"]
