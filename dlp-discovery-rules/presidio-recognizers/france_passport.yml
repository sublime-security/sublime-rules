# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France Passport"
    supported_language: en
    supported_entity: FRANCE_PASSPORT
    patterns:
      - name: "france_passport_standard"
        regex: "\\b\\d{2}[A-Z]{2}\\d{5}\\b"
        score: 0.5
    context: ["passeport", "passport", "document de voyage", "travel document"]
