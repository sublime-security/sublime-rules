# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Luxembourg]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Luxembourg Non-Natural ID"
    supported_language: en
    supported_entity: LUXEMBOURG_NONNATURAL_ID
    patterns:
      - name: "luxembourg_nonnatural_11_digits"
        regex: "\\b\\d{11}\\b"
        score: 0.3
      - name: "luxembourg_nonnatural_formatted"
        regex: "\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{3}\\b"
        score: 0.3
    context: ["matricule", "company ID", "identification", "numero d'identification", "registre de commerce", "RCS"]
