recognizers:
  - name: "Finland Passport Number"
    supported_language: en
    supported_entity: FI_PASSPORT
    patterns:
      - name: "fi_passport"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
    context: ["passport", "passi", "finland", "finnish", "passinumero", "matkustusasiakirja"]
