# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Social Security Number]
#   regions: [Austria]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Austria Social Security Number"
    supported_language: en
    supported_entity: AT_SOCIAL_SECURITY
    patterns:
      - name: "at_ssn_formatted"
        regex: "\\b\\d{4}\\s?\\d{6}\\b"
        score: 0.4
    context: ["sozialversicherung", "social security", "SVNR", "sozialversicherungsnummer", "austria", "austrian"]
