# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Cryptographic Material]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Private Key"
    supported_language: en
    supported_entity: PRIVATE_KEY
    patterns:
      - name: "rsa_private_key"
        regex: "-----BEGIN\\s+(?:RSA\\s+)?PRIVATE\\s+KEY-----"
        score: 0.95
      - name: "openssh_private_key"
        regex: "-----BEGIN\\s+OPENSSH\\s+PRIVATE\\s+KEY-----"
        score: 0.95
      - name: "pgp_private_key"
        regex: "-----BEGIN\\s+PGP\\s+PRIVATE\\s+KEY\\s+BLOCK-----"
        score: 0.95
      - name: "ec_private_key"
        regex: "-----BEGIN\\s+EC\\s+PRIVATE\\s+KEY-----"
        score: 0.95
      - name: "dsa_private_key"
        regex: "-----BEGIN\\s+DSA\\s+PRIVATE\\s+KEY-----"
        score: 0.95
      - name: "encrypted_private_key"
        regex: "-----BEGIN\\s+ENCRYPTED\\s+PRIVATE\\s+KEY-----"
        score: 0.95
    context: ["private key", "rsa", "ssh", "pgp", "pem", "key file", "certificate"]
