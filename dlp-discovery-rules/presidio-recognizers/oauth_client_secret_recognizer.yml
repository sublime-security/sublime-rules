# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "OAuth Client Secret"
    supported_language: en
    supported_entity: OAUTH_CLIENT_SECRET
    patterns:
      - name: "oauth_client_secret_hex"
        regex: "(?i)(?:oauth|client[_\\s]?secret|client[_\\s]?id).{0,30}[a-f0-9]{32,}"
        score: 0.7
      - name: "oauth_client_secret_alnum"
        regex: "(?i)(?:oauth|client[_\\s]?secret|client[_\\s]?id).{0,30}[A-Za-z0-9_-]{32,}"
        score: 0.6
    context: ["oauth", "client secret", "client id", "client_secret", "client_id", "authorization"]
