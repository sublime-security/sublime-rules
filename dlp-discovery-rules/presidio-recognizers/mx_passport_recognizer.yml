recognizers:
  - name: "Mexico Passport Number"
    supported_language: en
    supported_entity: MX_PASSPORT
    patterns:
      - name: "mx_passport"
        regex: "\\b[A-Z0-9]{9,10}\\b"
        score: 0.1
    context: ["passport", "pasaporte", "mexico", "méxico", "travel document", "mexican"]
