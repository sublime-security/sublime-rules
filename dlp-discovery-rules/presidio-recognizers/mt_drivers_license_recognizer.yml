recognizers:
  - name: "Malta Driver's License Number"
    supported_language: en
    supported_entity: MT_DRIVERS_LICENSE
    patterns:
      - name: "mt_dl"
        regex: "\\b\\d{5,7}[A-Z]?\\b"
        score: 0.2
    context: ["licenzja tas-sewqan", "driver's license", "driving licence", "malta", "maltese"]
