# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France Tax ID"
    supported_language: en
    supported_entity: FRANCE_TAX_ID
    patterns:
      - name: "france_spi_13_digits"
        regex: "\\b\\d{13}\\b"
        score: 0.3
      - name: "france_spi_formatted"
        regex: "\\b\\d{2}[\\s]?\\d{2}[\\s]?\\d{3}[\\s]?\\d{3}[\\s]?\\d{3}\\b"
        score: 0.4
    context: ["numero fiscal", "SPI", "tax identification", "impot", "fiscale", "numero de contribuable"]
