# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Portugal]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Portugal Citizen Card"
    supported_language: en
    supported_entity: PORTUGAL_CITIZEN_CARD
    patterns:
      - name: "portugal_cc_standard"
        regex: "\\b\\d{8}[\\s\\-]?\\d\\s?[A-Z]{2}\\d\\b"
        score: 0.5
      - name: "portugal_cc_compact"
        regex: "\\b\\d{9}[A-Z]{2}\\d\\b"
        score: 0.6
    context: ["cartao de cidadao", "citizen card", "CC", "numero de identificacao", "BI"]
