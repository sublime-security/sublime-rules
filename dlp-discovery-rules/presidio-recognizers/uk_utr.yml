# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax]
#   regions: [United Kingdom]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "UK Unique Taxpayer Reference"
    supported_language: en
    supported_entity: UK_UTR
    patterns:
      - name: "uk_utr_10_digits"
        regex: "\\b\\d{10}\\b"
        score: 0.3
      - name: "uk_utr_formatted"
        regex: "\\b\\d{5}\\s?\\d{5}\\b"
        score: 0.4
    context: ["UTR", "unique taxpayer reference", "tax reference", "self assessment", "HMRC"]
