# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Saudi Arabia]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Saudi Arabia National ID"
    supported_language: en
    supported_entity: SA_NATIONAL_ID
    patterns:
      - name: "sa_national_id"
        regex: "\\b[12]\\d{9}\\b"
        score: 0.4
    context: ["national ID", "iqama", "identity", "saudi", "KSA", "resident ID"]

  - name: "Saudi Arabia National ID (Arabic)"
    supported_language: ar
    supported_entity: SA_NATIONAL_ID
    patterns:
      - name: "sa_national_id_ar"
        regex: "\\b[12]\\d{9}\\b"
        score: 0.5
    context: ["رقم الهوية", "إقامة", "هوية وطنية", "الهوية"]
