recognizers:
  - name: "UK Electoral Roll"
    supported_language: en
    supported_entity: UK_ELECTORAL_ROLL
    patterns:
      - name: "uk_electoral_roll_number"
        regex: "\\b[A-Z]{2,3}[-/]?\\d{1,4}[-/]?\\d{1,4}\\b"
        score: 0.3
    context: ["electoral roll", "electoral register", "voter registration", "polling district", "elector number"]
