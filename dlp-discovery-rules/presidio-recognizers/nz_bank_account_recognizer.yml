# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [New Zealand]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "New Zealand Bank Account Number"
    supported_language: en
    supported_entity: NZ_BANK_ACCOUNT
    patterns:
      - name: "nz_bank_account_formatted"
        regex: "\\b\\d{2}-\\d{4}-\\d{7}-\\d{2,3}\\b"
        score: 0.7
      - name: "nz_bank_account_compact"
        regex: "\\b\\d{15,16}\\b"
        score: 0.1
    context: ["bank account", "account number", "bank", "transfer", "deposit", "new zealand", "NZ"]
