# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Broad pattern matching password=, pwd=, secret=, etc. with actual values
# Uses high confidence only to reduce false positives
recognizers:
  - name: "General Password"
    supported_language: en
    supported_entity: GENERAL_PASSWORD
    patterns:
      - name: "password_assignment"
        regex: "(?i)(?:password|passwd|pwd)\\s*[=:]\\s*[\"']?[^\\s\"';]{8,128}[\"']?"
        score: 0.5
      - name: "password_in_code"
        regex: "(?i)(?:password|secret|credential)\\s*[=:]\\s*\"[^\"]{8,128}\""
        score: 0.55
      - name: "password_in_xml"
        regex: "(?i)<(?:password|secret|credential)[^>]*>[^<]{8,128}</(?:password|secret|credential)>"
        score: 0.6
      - name: "password_in_connection_string"
        regex: "(?i)(?:password|pwd)\\s*=\\s*[^;\"]{8,128};"
        score: 0.55
    context: ["password", "pwd", "secret", "credential", "passphrase", "login"]
