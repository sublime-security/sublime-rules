recognizers:
  - name: "Azure Maps Subscription Key"
    supported_language: en
    supported_entity: AZURE_MAPS_SUBSCRIPTION_KEY
    patterns:
      - name: "azure_maps_key_context"
        regex: "(?i)(?:azure.?maps|subscription.?key|maps.?key)\\s*[:=]\\s*[A-Za-z0-9_\\-]{32,44}"
        score: 0.75
      - name: "azure_maps_key_bare"
        regex: "(?i)maps\\.azure\\.com[^\\s]*(?:subscription-key|api-key)=[A-Za-z0-9_\\-]{32,44}"
        score: 0.85
    context: ["azure maps", "subscription key", "maps api", "maps.azure.com", "atlas", "geolocation"]
