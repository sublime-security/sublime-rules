# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Belgium]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Belgium Passport"
    supported_language: en
    supported_entity: BELGIUM_PASSPORT
    patterns:
      - name: "belgium_passport_standard"
        regex: "\\b[A-Z]{2}\\d{6}\\b"
        score: 0.4
      - name: "belgium_passport_electronic"
        regex: "\\b[A-Z][A-Z0-9]\\d{6}\\b"
        score: 0.4
    context: ["paspoort", "passeport", "passport", "reisdocument", "travel document"]
