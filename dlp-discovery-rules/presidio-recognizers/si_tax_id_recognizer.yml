    supported_language: en
    supported_entity: SI_TAX_ID
    patterns:
      - name: "si_tax_id"
        regex: "\\b\\d{8}\\b"
        score: 0.2
    context: ["davcna stevilka", "tax ID", "TIN", "slovenia", "slovenian", "tax identification", "FURS"]
