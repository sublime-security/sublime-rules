# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 256-bit symmetric key (43 chars + =)
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "Azure SignalR Access Key"
    supported_language: en
    supported_entity: AZURE_SIGNALR_ACCESS_KEY
    patterns:
      - name: "signalr_connection_string"
        regex: "(?i)(?:signalr\\.net|service\\.signalr).{0,100}(?:accesskey|SharedAccessKey|AccountKey)\\s*[=:]\\s*[A-Za-z0-9/+]{43}="
        score: 0.85
      - name: "signalr_key_generic"
        regex: "(?i)signalr.{0,50}(?:key|access)\\s*[=:]\\s*[A-Za-z0-9/+]{43}="
        score: 0.7
    context: ["signalr", "azure", "access key", "SharedAccessKey", "service.signalr.net"]
