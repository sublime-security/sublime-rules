# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Austria]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Austria Identity Card Number"
    supported_language: en
    supported_entity: AT_IDENTITY_CARD
    patterns:
      - name: "at_identity_card"
        regex: "\\b\\d{7,8}\\b"
        score: 0.2
    context: ["personalausweis", "identity card", "ausweis", "austria", "austrian", "identitätskarte", "ID card"]
