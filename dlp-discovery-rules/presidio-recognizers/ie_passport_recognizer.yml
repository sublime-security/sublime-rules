recognizers:
  - name: "Ireland Passport Number"
    supported_language: en
    supported_entity: IE_PASSPORT
    patterns:
      - name: "ie_passport"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
      - name: "ie_passport_old"
        regex: "\\b[A-Z]\\d{7}\\b"
        score: 0.3
    context: ["passport", "pas", "ireland", "irish", "passport number", "uimhir pas"]
