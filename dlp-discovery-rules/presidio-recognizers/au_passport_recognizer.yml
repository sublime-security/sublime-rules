recognizers:
  - name: "Australia Passport Number"
    supported_language: en
    supported_entity: AU_PASSPORT
    patterns:
      - name: "au_passport"
        regex: "\\b[A-Z]\\d{7}\\b"
        score: 0.4
    context: ["passport", "travel document", "australia", "australian"]
