# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Hex encoded 128-bit key (32 hex chars), prefix dapi
# Keywords: dapi, key, secret, token, password, pw
recognizers:
  - name: "Azure Databricks Personal Access Token"
    supported_language: en
    supported_entity: AZURE_DATABRICKS_PAT
    patterns:
      - name: "databricks_dapi_token"
        regex: "\\bdapi[0-9a-fA-F]{32}\\b"
        score: 0.9
      - name: "databricks_pat_context"
        regex: "(?i)(?:databricks|azuredatabricks).{0,50}(?:PAT|token)\\s*[=:]\\s*[A-Za-z0-9]{32}"
        score: 0.75
    context: ["databricks", "dapi", "token", "pat", "azure", "personal access token"]
