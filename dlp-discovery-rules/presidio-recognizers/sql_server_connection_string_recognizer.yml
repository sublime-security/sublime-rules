# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Connection String]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: User Id/uid/UserId + Password/pwd pattern
recognizers:
  - name: "SQL Server Connection String"
    supported_language: en
    supported_entity: SQL_SERVER_CONNECTION_STRING
    patterns:
      - name: "sql_connection_string_user_pwd"
        regex: "(?i)(?:User\\s+Id|uid|UserId)\\s*=\\s*[^;]+;.{0,200}(?:Password|pwd)\\s*=\\s*[^;\"]{7,128}[;\"]"
        score: 0.8
      - name: "sql_connection_string_server"
        regex: "(?i)(?:Server|Data\\s+Source)\\s*=\\s*[^;]+;.{0,200}(?:Password|pwd)\\s*=\\s*[^;\"]{7,128}"
        score: 0.75
    context: ["sql server", "connection string", "User Id", "uid", "password", "pwd", "data source", "server"]
