# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 512-bit symmetric key (88 chars, 86 + ==)
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "Azure Cosmos DB Account Access Key"
    supported_language: en
    supported_entity: AZURE_COSMOS_DB_ACCESS_KEY
    patterns:
      - name: "cosmos_db_connection_string"
        regex: "(?i)AccountEndpoint\\s*=\\s*https://[^;]+\\.documents\\.azure\\.com[^;]*;\\s*AccountKey\\s*=\\s*[A-Za-z0-9/+]{86}=="
        score: 0.9
      - name: "cosmos_db_account_key"
        regex: "(?i)(?:cosmos|documentdb|documents\\.azure\\.com).{0,100}(?:AccountKey|SharedAccessKey)\\s*=\\s*[A-Za-z0-9/+]{86}=="
        score: 0.85
    context: ["cosmos", "documentdb", "documents.azure.com", "AccountKey", "SharedAccessKey", "azure"]
