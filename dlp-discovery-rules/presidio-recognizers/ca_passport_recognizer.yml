recognizers:
  - name: "Canada Passport Number"
    supported_language: en
    supported_entity: CA_PASSPORT
    patterns:
      - name: "ca_passport"
        regex: "\\b[A-Z]{2}\\d{6}\\b"
        score: 0.4
    context: ["passport", "travel document", "canada", "canadian"]
