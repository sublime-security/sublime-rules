recognizers:
  - name: "Netherlands VAT Number"
    supported_language: en
    supported_entity: NETHERLANDS_VAT
    patterns:
      - name: "netherlands_vat_standard"
        regex: "\\bNL\\s?\\d{9}B\\d{2}\\b"
        score: 0.8
    context: ["BTW", "BTW-nummer", "VAT", "omzetbelasting", "value added tax", "BTW-id"]
