# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax]
#   regions: [Netherlands]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Netherlands Tax ID"
    supported_language: en
    supported_entity: NETHERLANDS_TAX_ID
    patterns:
      - name: "netherlands_tin_9_digits"
        regex: "\\b\\d{9}\\b"
        score: 0.3
      - name: "netherlands_tin_formatted"
        regex: "\\b\\d{3}\\.?\\d{3}\\.?\\d{3}\\b"
        score: 0.3
    context: ["tax identification", "belastingnummer", "TIN", "fiscaal nummer", "belasting"]
