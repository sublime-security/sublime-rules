# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 URL encoded 384-bit key (64 chars: a-z, 0-9, _, -)
# Keywords: virtualearth, api/maps, key
recognizers:
  - name: "Microsoft Bing Maps Key"
    supported_language: en
    supported_entity: BING_MAPS_KEY
    patterns:
      - name: "bing_maps_key_context"
        regex: "(?i)(?:bingMapsKey|bing.?maps.?key|virtualearth|api/maps).{0,30}[=:]\\s*[A-Za-z0-9_-]{64}"
        score: 0.85
      - name: "bing_maps_url_param"
        regex: "(?i)(?:virtualearth\\.net|bing\\.com/api/maps).{0,100}key=[A-Za-z0-9_-]{64}"
        score: 0.85
    context: ["bing maps", "virtualearth", "api/maps", "bingMapsKey", "microsoft", "key"]
