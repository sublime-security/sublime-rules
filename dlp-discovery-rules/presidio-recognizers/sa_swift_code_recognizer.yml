# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [Saudi Arabia]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Saudi Arabia SWIFT Code"
    supported_language: en
    supported_entity: SA_SWIFT_CODE
    patterns:
      - name: "sa_swift_8"
        regex: "\\b[A-Z]{4}SA[A-Z0-9]{2}\\b"
        score: 0.7
      - name: "sa_swift_11"
        regex: "\\b[A-Z]{4}SA[A-Z0-9]{2}[A-Z0-9]{3}\\b"
        score: 0.7
    context: ["SWIFT", "BIC", "bank", "transfer", "wire", "international", "financial"]
