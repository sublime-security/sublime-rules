# Checksum: None
# Source: Purview (sit-defn-us-physical-addresses)
#
# Detects US physical/mailing addresses by matching common street address
# patterns followed by US state abbreviations and ZIP codes.
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Physical Address]
#   regions: [United States]
#   compliance: [CCPA, GLBA]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "US Physical Address"
    supported_language: en
    supported_entity: US_PHYSICAL_ADDRESS
    patterns:
      - name: "us_street_address_with_zip"
        regex: "\\b\\d{1,6}\\s+[A-Za-z0-9\\s\\.]+(?:Street|St|Avenue|Ave|Boulevard|Blvd|Drive|Dr|Lane|Ln|Road|Rd|Court|Ct|Place|Pl|Way|Circle|Cir|Trail|Trl|Terrace|Ter|Parkway|Pkwy|Highway|Hwy)\\.?\\s*,?\\s*(?:Apt|Suite|Ste|Unit|#)?\\.?\\s*\\d*\\s*,?\\s*[A-Za-z\\s]+,?\\s*(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\\s+\\d{5}(?:-\\d{4})?\\b"
        score: 0.7
      - name: "us_po_box"
        regex: "\\b(?:P\\.?\\s*O\\.?\\s*Box|Post\\s+Office\\s+Box)\\s+\\d+\\s*,?\\s*[A-Za-z\\s]+,?\\s*(?:AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\\s+\\d{5}(?:-\\d{4})?\\b"
        score: 0.7
    context:
      - "address"
      - "mailing address"
      - "street address"
      - "home address"
      - "shipping address"
      - "billing address"
      - "residential address"
      - "physical address"
      - "deliver to"
      - "send to"
