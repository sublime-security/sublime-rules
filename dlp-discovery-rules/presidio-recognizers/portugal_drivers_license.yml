# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Portugal]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Portugal Driver's License"
    supported_language: en
    supported_entity: PORTUGAL_DRIVERS_LICENSE
    patterns:
      - name: "portugal_dl_standard"
        regex: "\\b[A-Z]{2}[-\\s]?\\d{6}\\b"
        score: 0.4
      - name: "portugal_dl_numeric"
        regex: "\\b\\d{2}[-\\s]?\\d{2}[-\\s]?\\d{2}[-\\s]?\\d{2}\\b"
        score: 0.3
    context: ["carta de conducao", "driver's license", "driving licence", "IMT", "licenca de conducao"]
