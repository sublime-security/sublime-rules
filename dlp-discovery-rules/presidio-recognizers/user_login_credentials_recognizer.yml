# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Paired username + password in various formats
# Uses high confidence only to reduce false positives
recognizers:
  - name: "User Login Credentials"
    supported_language: en
    supported_entity: USER_LOGIN_CREDENTIALS
    patterns:
      - name: "username_password_pair"
        regex: "(?i)(?:username|user|user\\s*id|uid|DB_USER)\\s*[=:]\\s*[^;\\s\"]{1,100}[;\\s].{0,50}(?:password|pwd|pass|DB_PASS)\\s*[=:]\\s*[^;\\s\"]{7,128}"
        score: 0.6
      - name: "login_xml_block"
        regex: "(?i)<login>\\s*<login>[^<]+</login>\\s*<password>[^<]+</password>\\s*</login>"
        score: 0.7
      - name: "service_account_password"
        regex: "(?i)(?:Service\\s+Account|service_account)\\s*[=:]\\s*[^;]+;.{0,50}(?:Password|pwd)\\s*[=:]\\s*[^;\"]{7,128}"
        score: 0.65
    context: ["username", "password", "login", "credentials", "user id", "uid", "pwd"]
