# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Azure SAS tokens appear as URL query parameters with sig= parameter
recognizers:
  - name: "Azure SAS Token"
    supported_language: en
    supported_entity: AZURE_SAS_TOKEN
    patterns:
      - name: "azure_sas_url"
        regex: "(?i)(?:blob|queue|table|file|dfs)\\.core\\.windows\\.net.{0,300}[?&]sig=[A-Za-z0-9%/+=]+"
        score: 0.85
      - name: "azure_sas_params"
        regex: "(?i)[?&]sv=\\d{4}-\\d{2}-\\d{2}&.{0,200}sig=[A-Za-z0-9%/+=]+"
        score: 0.75
      - name: "azure_sas_generic"
        regex: "(?i)SharedAccessSignature\\s+sr=.{0,200}sig=[A-Za-z0-9%/+=]+"
        score: 0.8
    context: ["azure", "sas", "shared access signature", "sig=", "blob", "storage", "core.windows.net"]
