# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Italy]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Italy Driver's License"
    supported_language: en
    supported_entity: IT_DRIVERS_LICENSE
    patterns:
      - name: "it_dl_standard"
        regex: "\\b[A-Z]{2}\\d{7}[A-Z]\\b"
        score: 0.5
      - name: "it_dl_old_format"
        regex: "\\b[A-Z]{2}\\d{5}[A-Z]{2}\\b"
        score: 0.4
    context: ["patente di guida", "patente", "driver's license", "driving licence", "motorizzazione"]
