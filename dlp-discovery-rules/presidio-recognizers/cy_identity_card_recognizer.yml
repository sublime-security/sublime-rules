# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Cyprus]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Cyprus Identity Card Number"
    supported_language: en
    supported_entity: CY_IDENTITY_CARD
    patterns:
      - name: "cy_identity_card"
        regex: "\\b[A-Z0-9]{8}\\b"
        score: 0.2
    context: ["identity card", "tautotita", "kimlik", "cyprus", "cypriot", "ID card", "politis"]
