# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax ID]
#   regions: [Sweden]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Sweden Tax Identification Number"
    supported_language: en
    supported_entity: SE_TAX_ID
    patterns:
      - name: "se_tax_id_12digit"
        regex: "\\b\\d{12}\\b"
        score: 0.3
      - name: "se_tax_id_formatted"
        regex: "\\b\\d{6}[\\-+]\\d{4}\\b"
        score: 0.4
    context: ["skatteregistrering", "tax ID", "TIN", "skatteverket", "tax identification", "sweden", "swedish"]
