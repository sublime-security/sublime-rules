recognizers:
  - name: "Portugal Passport"
    supported_language: en
    supported_entity: PORTUGAL_PASSPORT
    patterns:
      - name: "portugal_passport_standard"
        regex: "\\b[A-Z]{2}\\d{6}\\b"
        score: 0.4
      - name: "portugal_passport_new"
        regex: "\\b[A-Z]\\d{6}\\b"
        score: 0.3
    context: ["passaporte", "passport", "documento de viagem", "travel document"]
