recognizers:
  - name: "Luxembourg Driver's License"
    supported_language: en
    supported_entity: LU_DRIVERS_LICENSE
    patterns:
      - name: "lu_dl_standard"
        regex: "\\b\\d{6}\\b"
        score: 0.2
      - name: "lu_dl_extended"
        regex: "\\bSNCA[-\\s]?\\d{6}\\b"
        score: 0.6
    context: ["permis de conduire", "Fuhrerschein", "driver's license", "driving licence", "SNCA"]
