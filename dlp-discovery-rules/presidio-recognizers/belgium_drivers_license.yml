recognizers:
  - name: "Belgium Driver's License"
    supported_language: en
    supported_entity: BELGIUM_DRIVERS_LICENSE
    patterns:
      - name: "belgium_dl_standard"
        regex: "\\b\\d{10}\\b"
        score: 0.3
      - name: "belgium_dl_formatted"
        regex: "\\b\\d{4}[-\\s]?\\d{4}[-\\s]?\\d{2}\\b"
        score: 0.4
    context: ["rijbewijs", "permis de conduire", "driver's license", "driving licence", "DIV"]
