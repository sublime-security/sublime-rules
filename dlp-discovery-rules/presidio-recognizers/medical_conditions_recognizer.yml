      - "hepatitis"
      - "hepatitis B"
      - "hepatitis C"
      - "pneumonia"
      - "depression"
      - "major depressive disorder"
      - "anxiety disorder"
      - "bipolar disorder"
      - "schizophrenia"
      - "Alzheimer's disease"
      - "Parkinson's disease"
      - "epilepsy"
      - "multiple sclerosis"
      - "lupus"
      - "rheumatoid arthritis"
      - "osteoarthritis"
      - "Crohn's disease"
      - "ulcerative colitis"
      - "asthma"
      - "COPD"
      - "chronic obstructive pulmonary disease"
      - "congestive heart failure"
      - "coronary artery disease"
