# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Azure Authentication Token"
    supported_language: en
    supported_entity: AZURE_AUTH_TOKEN
    patterns:
      - name: "azure_auth_token"
        regex: "(?i)(?:azure|microsoft\\s+cloud).{0,50}(?:auth|token|credential|secret|key).{0,50}[A-Za-z0-9_-]{40,}"
        score: 0.6
      - name: "azure_bearer_token"
        regex: "(?i)Bearer\\s+eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
        score: 0.85
    context: ["azure", "microsoft", "auth", "token", "credential", "bearer", "cloud"]
