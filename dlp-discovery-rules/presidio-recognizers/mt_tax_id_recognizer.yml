recognizers:
  - name: "Malta Tax ID Number"
    supported_language: en
    supported_entity: MT_TAX_ID
    patterns:
      - name: "mt_tax_id"
        regex: "\\b\\d{8}\\b"
        score: 0.2
    context: ["tax ID", "TIN", "numru tat-taxxa", "malta", "maltese", "tax identification", "inland revenue"]
