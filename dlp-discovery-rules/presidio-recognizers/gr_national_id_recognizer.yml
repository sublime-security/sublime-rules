# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Greece]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Greece National ID Card Number"
    supported_language: en
    supported_entity: GR_NATIONAL_ID
    patterns:
      - name: "gr_national_id"
        regex: "\\b[A-Z]{1,2}\\d{6}\\b"
        score: 0.4
    context: ["tautotita", "national ID", "identity card", "greece", "greek", "astynomiki tautotita", "deltio tautotitas"]
