# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: URL-encoded 256-bit key (43-73 chars ending in %3d)
# Keywords: sig=, key, token, secret, password
recognizers:
  - name: "Azure Logic App Shared Access Signature"
    supported_language: en
    supported_entity: AZURE_LOGIC_APP_SAS
    patterns:
      - name: "logic_app_sig_param"
        regex: "(?i)logic\\.azure\\.com.{0,200}[&?]sig=[A-Za-z0-9%/+]{43,73}%3[dD]"
        score: 0.9
      - name: "logic_app_sas_generic"
        regex: "(?i)logic\\.azure\\.com.{0,200}sig=[A-Za-z0-9/+]{43}="
        score: 0.85
    context: ["logic app", "logic.azure.com", "sig=", "shared access signature", "azure", "workflow"]
