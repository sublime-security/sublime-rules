recognizers:
  - name: "Spain Driver's License"
    supported_language: en
    supported_entity: SPAIN_DRIVERS_LICENSE
    patterns:
      - name: "spain_dl_dni_format"
        regex: "\\b\\d{8}[A-Z]\\b"
        score: 0.3
      - name: "spain_dl_nie_format"
        regex: "\\b[XYZ]\\d{7}[A-Z]\\b"
        score: 0.3
    context: ["permiso de conducir", "carnet de conducir", "driver's license", "driving licence", "DGT"]
