# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Healthcare ID]
#   regions: [United States]
#   compliance: [HIPAA]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "US Insurance Claim Number"
    supported_language: en
    supported_entity: US_INSURANCE_CLAIM
    patterns:
      - name: "insurance_claim_alphanumeric"
        regex: "\\b[A-Z0-9]{10,20}\\b"
        score: 0.2
    context:
      - "claim number"
      - "insurance claim"
      - "policy claim"
      - "claim #"
      - "claim no"
      - "claim id"
      - "insurance policy"
      - "health claim"
      - "medical claim"
