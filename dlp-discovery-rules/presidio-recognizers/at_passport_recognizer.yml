recognizers:
  - name: "Austria Passport Number"
    supported_language: en
    supported_entity: AT_PASSPORT
    patterns:
      - name: "at_passport"
        regex: "\\b[A-Z]\\d{7}\\b"
        score: 0.4
    context: ["passport", "reisepass", "austria", "austrian", "passnummer", "reisedokument"]
