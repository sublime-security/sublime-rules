recognizers:
  - name: "Hungary Driver's License Number"
    supported_language: en
    supported_entity: HU_DRIVERS_LICENSE
    patterns:
      - name: "hu_dl"
        regex: "\\b[A-Z]{2}\\d{6}\\b"
        score: 0.4
    context: ["jogositvany", "driver's license", "driving licence", "hungary", "hungarian", "vezerlo engedely"]
