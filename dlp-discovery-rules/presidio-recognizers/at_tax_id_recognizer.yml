# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax ID]
#   regions: [Austria]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Austria Tax Identification Number"
    supported_language: en
    supported_entity: AT_TAX_ID
    patterns:
      - name: "at_tax_id_formatted"
        regex: "\\b\\d{2}[\\s\\-]?\\d{3}[\\s\\-]?\\d{4}\\b"
        score: 0.3
      - name: "at_tax_id_9digit"
        regex: "\\b\\d{9}\\b"
        score: 0.2
    context: ["steuernummer", "tax ID", "FinanzOnline", "tax identification", "austria", "austrian", "TIN"]
