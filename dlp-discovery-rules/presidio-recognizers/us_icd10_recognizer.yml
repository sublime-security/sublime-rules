# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Medical Code]
#   regions: [United States]
#   compliance: [HIPAA]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "US ICD-10-CM Code"
    supported_language: en
    supported_entity: US_ICD10
    patterns:
      - name: "icd10_diagnosis_with_dot"
        regex: "\\b[A-TV-Z]\\d{2}\\.?[A-Z0-9]{1,4}\\b"
        score: 0.5
      - name: "icd10_diagnosis_short"
        regex: "\\b[A-TV-Z]\\d{2}\\b"
        score: 0.2
      - name: "icd10_pcs_procedure"
        regex: "\\b[A-HJ-NP-Z0-9]{7}\\b"
        score: 0.3
    context:
      - "ICD-10"
      - "ICD10"
      - "diagnosis code"
      - "procedure code"
      - "diagnostic code"
      - "medical code"
      - "clinical code"
