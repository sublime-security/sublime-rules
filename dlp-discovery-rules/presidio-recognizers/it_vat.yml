recognizers:
  - name: "Italy VAT Number"
    supported_language: en
    supported_entity: IT_VAT
    patterns:
      - name: "it_vat_standard"
        regex: "\\bIT\\s?\\d{11}\\b"
        score: 0.7
      - name: "it_partita_iva"
        regex: "\\b\\d{11}\\b"
        score: 0.3
    context: ["partita IVA", "P.IVA", "VAT", "IVA", "value added tax", "imposta sul valore aggiunto"]
