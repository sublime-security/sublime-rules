# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Financial]
#   regions: [United Kingdom]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "UK SWIFT Code"
    supported_language: en
    supported_entity: UK_SWIFT_CODE
    patterns:
      - name: "uk_swift_bic"
        regex: "\\b[A-Z]{4}GB[A-Z0-9]{2}(?:[A-Z0-9]{3})?\\b"
        score: 0.5
    context: ["SWIFT", "BIC", "bank", "financial", "sort code", "transfer"]
