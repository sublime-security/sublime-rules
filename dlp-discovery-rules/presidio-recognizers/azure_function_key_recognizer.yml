# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 320-bit key (56 chars: 54 base64 + ==)
#   or URL-encoded variant (up to 90 chars ending in %3d%3d)
# Keywords: code=, key
recognizers:
  - name: "Azure Function Master/API Key"
    supported_language: en
    supported_entity: AZURE_FUNCTION_KEY
    patterns:
      - name: "azure_function_code_param"
        regex: "(?i)azurewebsites\\.net/api/.+[?&]code=[A-Za-z0-9/+]{54}=="
        score: 0.9
      - name: "azure_function_code_urlencoded"
        regex: "(?i)azurewebsites\\.net/api/.+[?&]code=[A-Za-z0-9%]{54,84}%3[dD]%3[dD]"
        score: 0.85
      - name: "azure_function_key_generic"
        regex: "(?i)(?:function\\s*key|master\\s*key|host\\s*key).{0,30}[A-Za-z0-9/+]{54}=="
        score: 0.7
    context: ["azure function", "azurewebsites.net", "function key", "master key", "code=", "api key"]
