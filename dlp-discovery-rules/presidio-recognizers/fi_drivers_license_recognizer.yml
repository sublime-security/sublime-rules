recognizers:
  - name: "Finland Driver's License Number"
    supported_language: en
    supported_entity: FI_DRIVERS_LICENSE
    patterns:
      - name: "fi_dl"
        regex: "\\b[A-Z]\\d{6,9}\\b"
        score: 0.3
    context: ["ajokortti", "driver's license", "driving licence", "finland", "finnish", "ajolupa"]
