# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Tax ID]
#   regions: [Singapore]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Singapore UEN (Business Registration)"
    supported_language: en
    supported_entity: SG_UEN
    patterns:
      - name: "sg_uen_business"
        regex: "\\b\\d{8}[A-Z]\\b"
        score: 0.3
      - name: "sg_uen_local_company"
        regex: "\\b\\d{9}[A-Z]\\b"
        score: 0.3
      - name: "sg_uen_other"
        regex: "\\bT\\d{2}[A-Z]{2}\\d{4}[A-Z]\\b"
        score: 0.5
    context: ["UEN", "unique entity number", "business registration", "ACRA", "singapore", "company registration"]
