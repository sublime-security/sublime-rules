recognizers:
  - name: "Netherlands Driver's License"
    supported_language: en
    supported_entity: NETHERLANDS_DRIVERS_LICENSE
    patterns:
      - name: "netherlands_dl_standard"
        regex: "\\b\\d{10}\\b"
        score: 0.3
      - name: "netherlands_dl_formatted"
        regex: "\\b\\d{4}[\\s-]?\\d{3}[\\s-]?\\d{3}\\b"
        score: 0.4
    context: ["rijbewijs", "driver's license", "driving licence", "RDW", "rijbewijsnummer"]
