recognizers:
  - name: "Finland European Health Insurance Card Number"
    supported_language: en
    supported_entity: FI_EUROPEAN_HEALTH_INSURANCE
    patterns:
      - name: "fi_ehic"
        regex: "\\bFI\\s?\\d{10,12}\\b"
        score: 0.5
    context: ["EHIC", "European Health Insurance", "health insurance card", "finland", "finnish", "eurooppalainen sairaanhoitokortti", "kela"]
