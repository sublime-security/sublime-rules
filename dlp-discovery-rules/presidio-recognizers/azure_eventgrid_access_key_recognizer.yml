# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 256-bit symmetric key (43 chars + =)
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "Azure EventGrid Access Key"
    supported_language: en
    supported_entity: AZURE_EVENTGRID_ACCESS_KEY
    patterns:
      - name: "eventgrid_connection_string"
        regex: "(?i)(?:eventgrid\\.azure\\.net|eventgrid).{0,100}(?:accesskey|SharedAccessKey|AccountKey)\\s*[=:]\\s*[A-Za-z0-9/+]{43}="
        score: 0.85
      - name: "eventgrid_key_generic"
        regex: "(?i)eventgrid.{0,50}(?:key|access)\\s*[=:]\\s*[A-Za-z0-9/+]{43}="
        score: 0.7
    context: ["eventgrid", "azure", "access key", "SharedAccessKey", "AccountKey", "event grid"]
