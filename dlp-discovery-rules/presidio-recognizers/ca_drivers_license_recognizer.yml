# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Canada]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Canada Driver's License Number"
    supported_language: en
    supported_entity: CA_DRIVERS_LICENSE
    patterns:
      - name: "ca_drivers_license"
        regex: "\\b[A-Z0-9]{15,16}\\b"
        score: 0.1
    context: ["driver's license", "drivers license", "driving licence", "DL number", "license number", "permis de conduire", "canada"]

  - name: "Canada Driver's License Number (French)"
    supported_language: fr
    supported_entity: CA_DRIVERS_LICENSE
    patterns:
      - name: "ca_drivers_license_fr"
        regex: "\\b[A-Z0-9]{15,16}\\b"
        score: 0.1
    context: ["permis de conduire", "numéro de permis", "licence", "canada"]
