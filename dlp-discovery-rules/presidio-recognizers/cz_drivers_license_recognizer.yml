recognizers:
  - name: "Czech Republic Driver's License Number"
    supported_language: en
    supported_entity: CZ_DRIVERS_LICENSE
    patterns:
      - name: "cz_dl"
        regex: "\\b[A-Z]{2}\\s?\\d{6}\\b"
        score: 0.4
    context: ["ridicsky prukaz", "driver's license", "driving licence", "czech", "czech republic"]
