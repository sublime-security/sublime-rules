# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 512-bit key (88 chars: 86 base64 + ==)
# Keywords: SharedAccessKey, AccountKey, MII
recognizers:
  - name: "Azure Storage Account Access Key"
    supported_language: en
    supported_entity: AZURE_STORAGE_ACCOUNT_KEY
    patterns:
      - name: "storage_account_connection_string"
        regex: "(?i)(?:core\\.windows\\.net|AccountName).{0,100}AccountKey\\s*=\\s*[A-Za-z0-9/+]{86}=="
        score: 0.9
      - name: "storage_account_key_generic"
        regex: "(?i)(?:AccountKey|DefaultEndpointsProtocol)\\s*=\\s*[A-Za-z0-9/+]{86}=="
        score: 0.8
    context: ["azure storage", "core.windows.net", "AccountKey", "AccountName", "storage account", "blob"]
