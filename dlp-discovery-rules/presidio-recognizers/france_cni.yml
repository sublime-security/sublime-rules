# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France CNI"
    supported_language: en
    supported_entity: FRANCE_CNI
    patterns:
      - name: "france_cni_12_chars"
        regex: "\\b[A-Z0-9]{12}\\b"
        score: 0.3
      - name: "france_cni_new_format"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
    context: ["CNI", "carte nationale", "national ID", "carte d'identite", "identite"]
