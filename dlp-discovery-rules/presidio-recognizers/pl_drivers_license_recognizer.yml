# Card view metadata:
#   data_categories: [PII]
#   data_types: [Driver's License]
#   regions: [Poland]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Poland Driver's License Number"
    supported_language: en
    supported_entity: PL_DRIVERS_LICENSE
    patterns:
      - name: "pl_dl"
        regex: "\\b\\d{5}/\\d{2}/\\d{4}\\b"
        score: 0.5
      - name: "pl_dl_alt"
        regex: "\\b[A-Z]{5}\\d{8}\\b"
        score: 0.5
    context: ["prawo jazdy", "driver's license", "driving licence", "poland", "polish"]
