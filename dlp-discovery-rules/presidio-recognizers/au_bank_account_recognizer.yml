# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [Australia]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Australia BSB Code"
    supported_language: en
    supported_entity: AU_BANK_ACCOUNT
    patterns:
      - name: "au_bsb"
        regex: "\\b\\d{3}-\\d{3}\\b"
        score: 0.4
    context: ["BSB", "bank account", "account number", "bank", "transfer", "deposit"]

  - name: "Australia Bank Account Number"
    supported_language: en
    supported_entity: AU_BANK_ACCOUNT
    patterns:
      - name: "au_bank_account"
        regex: "\\b\\d{6,10}\\b"
        score: 0.1
    context: ["BSB", "bank account", "account number", "bank", "transfer", "deposit", "savings"]
