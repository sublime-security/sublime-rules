# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Healthcare ID]
#   regions: [Canada]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Canada Health Service Number"
    supported_language: en
    supported_entity: CA_HEALTH_SERVICE
    patterns:
      - name: "ca_health_service"
        regex: "\\b\\d{10,12}\\b"
        score: 0.1
    context: ["health card", "health service", "OHIP", "RAMQ", "MSP", "AHCIP", "health number", "provincial health"]
