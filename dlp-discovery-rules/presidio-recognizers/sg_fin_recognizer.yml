# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Singapore]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Singapore FIN"
    supported_language: en
    supported_entity: SG_FIN
    patterns:
      - name: "sg_fin"
        regex: "\\b[FGMST]\\d{7}[A-Z]\\b"
        score: 0.5
    context: ["FIN", "NRIC", "foreign identification", "singapore", "singaporean", "identity card", "work permit", "employment pass"]
