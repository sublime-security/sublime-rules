# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: String "DocumentDb" followed by 3-200 chars, then 86 base64 chars + ==
recognizers:
  - name: "Azure DocumentDB Auth Key"
    supported_language: en
    supported_entity: AZURE_DOCUMENTDB_AUTH_KEY
    patterns:
      - name: "documentdb_auth_key"
        regex: "(?i)DocumentDb.{3,200}[='\">][A-Za-z0-9/+]{86}=="
        score: 0.85
    context: ["documentdb", "azure", "auth", "key", "AccountKey", "cosmos"]
