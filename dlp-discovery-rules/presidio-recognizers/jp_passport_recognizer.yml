# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Japan]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Japan Passport Number"
    supported_language: en
    supported_entity: JP_PASSPORT
    patterns:
      - name: "jp_passport"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
    context: ["passport", "travel document", "japan", "japanese"]

  - name: "Japan Passport Number (Japanese)"
    supported_language: ja
    supported_entity: JP_PASSPORT
    patterns:
      - name: "jp_passport_ja"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.6
    context: ["パスポート", "旅券", "旅券番号"]
