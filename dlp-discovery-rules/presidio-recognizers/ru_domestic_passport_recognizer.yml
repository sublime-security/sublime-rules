recognizers:
  - name: "Russia Domestic Passport Number"
    supported_language: en
    supported_entity: RU_DOMESTIC_PASSPORT
    patterns:
      - name: "ru_domestic_passport"
        regex: "\\b\\d{2}\\s?\\d{2}\\s?\\d{6}\\b"
        score: 0.3
    context: ["pasport", "passport", "russia", "russian", "vnutrenniy pasport", "domestic passport", "seriya i nomer"]
