# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Medical Code]
#   regions: [United States]
#   compliance: [HIPAA]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "US ICD-9-CM Code"
    supported_language: en
    supported_entity: US_ICD9
    patterns:
      - name: "icd9_diagnosis_with_dot"
        regex: "\\b[EVev]?\\d{3}\\.\\d{1,2}\\b"
        score: 0.5
      - name: "icd9_diagnosis_no_dot"
        regex: "\\b[EVev]?\\d{3,5}\\b"
        score: 0.2
      - name: "icd9_procedure"
        regex: "\\b\\d{2}\\.\\d{1,2}\\b"
        score: 0.4
    context:
      - "ICD-9"
      - "ICD9"
      - "diagnosis code"
      - "procedure code"
      - "diagnostic code"
      - "medical code"
      - "clinical code"
