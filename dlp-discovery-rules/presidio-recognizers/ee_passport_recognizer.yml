recognizers:
  - name: "Estonia Passport Number"
    supported_language: en
    supported_entity: EE_PASSPORT
    patterns:
      - name: "ee_passport"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
    context: ["passport", "pass", "estonia", "estonian", "passinumber", "reisidokument"]
