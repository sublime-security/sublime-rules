# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 512-bit symmetric key (88 chars: 86 base64 + ==)
# Keywords: SharedAccessKey, AccountKey
recognizers:
  - name: "Azure ML Web Service API Key"
    supported_language: en
    supported_entity: AZURE_ML_WEB_SERVICE_KEY
    patterns:
      - name: "azure_ml_apikey"
        regex: "(?i)(?:azureml|machine\\s*learning).{0,100}(?:apikey|api[_\\s]?key)\\s*[=:]\\s*[A-Za-z0-9/+]{86}=="
        score: 0.85
      - name: "azure_ml_connection"
        regex: "(?i)azureml\\.net.{0,100}(?:key|apikey)\\s*[=:]\\s*[A-Za-z0-9/+]{86}=="
        score: 0.85
    context: ["azure ml", "machine learning", "azureml", "apikey", "api key", "web service"]
