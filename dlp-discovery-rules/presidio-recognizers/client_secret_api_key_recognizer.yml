# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Client Secret or API Key (Generic)"
    supported_language: en
    supported_entity: CLIENT_SECRET_API_KEY
    patterns:
      - name: "client_secret_assignment"
        regex: "(?i)(?:client.?secret|client.?id.?secret)\\s*[:=]\\s*[A-Za-z0-9_\\-\\.~]{16,64}"
        score: 0.7
      - name: "api_key_assignment"
        regex: "(?i)(?:api.?key|apikey|api.?secret|api.?token)\\s*[:=]\\s*[A-Za-z0-9_\\-\\.~]{16,64}"
        score: 0.7
      - name: "x_api_key_header"
        regex: "(?i)x-api-key\\s*:\\s*[A-Za-z0-9_\\-\\.~]{16,64}"
        score: 0.75
    context: ["client secret", "api key", "api token", "api secret", "authentication", "authorization", "credentials", "x-api-key"]
