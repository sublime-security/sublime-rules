# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Nigeria]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Nigeria National Identification Number"
    supported_language: en
    supported_entity: NG_NIN
    patterns:
      - name: "ng_nin"
        regex: "\\b\\d{11}\\b"
        score: 0.2
    context: ["NIN", "national identification", "NIMC", "nigeria", "nigerian", "identity number", "national ID"]
