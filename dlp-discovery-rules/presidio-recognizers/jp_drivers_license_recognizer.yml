# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Japan]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Japan Driver's License Number"
    supported_language: en
    supported_entity: JP_DRIVERS_LICENSE
    patterns:
      - name: "jp_drivers_license"
        regex: "\\b\\d{12}\\b"
        score: 0.3
    context: ["driver's license", "drivers license", "driving license", "license number", "DL"]

  - name: "Japan Driver's License Number (Japanese)"
    supported_language: ja
    supported_entity: JP_DRIVERS_LICENSE
    patterns:
      - name: "jp_drivers_license_ja"
        regex: "\\b\\d{12}\\b"
        score: 0.5
    context: ["運転免許証", "免許証", "免許番号"]
