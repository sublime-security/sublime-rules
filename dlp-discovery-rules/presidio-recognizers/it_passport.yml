# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Italy]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Italy Passport"
    supported_language: en
    supported_entity: IT_PASSPORT
    patterns:
      - name: "it_passport_standard"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.4
      - name: "it_passport_electronic"
        regex: "\\bY[A-Z]\\d{7}\\b"
        score: 0.5
    context: ["passaporto", "passport", "documento di viaggio", "travel document"]
