# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Cryptographic Material]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "SSL Certificate"
    supported_language: en
    supported_entity: SSL_CERTIFICATE
    patterns:
      - name: "ssl_certificate_begin"
        regex: "-----BEGIN\\s+CERTIFICATE-----"
        score: 0.7
      - name: "ssl_certificate_full"
        regex: "-----BEGIN\\s+CERTIFICATE-----[A-Za-z0-9+/\\s=]+-----END\\s+CERTIFICATE-----"
        score: 0.9
    context: ["certificate", "ssl", "tls", "x509", "pem", "cert"]
