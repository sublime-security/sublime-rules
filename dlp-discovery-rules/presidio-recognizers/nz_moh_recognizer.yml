# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Healthcare ID]
#   regions: [New Zealand]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "New Zealand Ministry of Health Number (NHI)"
    supported_language: en
    supported_entity: NZ_MOH
    patterns:
      - name: "nz_nhi"
        regex: "\\b[A-Z]{3}\\d{4}\\b"
        score: 0.3
    context: ["NHI", "national health index", "ministry of health", "health number", "new zealand", "NZ", "patient"]
