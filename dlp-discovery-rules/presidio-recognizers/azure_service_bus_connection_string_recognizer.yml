# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Connection String]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: EndPoint=...servicebus.windows.net...SharedAccessKey=<43 base64>=
recognizers:
  - name: "Azure Service Bus Connection String"
    supported_language: en
    supported_entity: AZURE_SERVICE_BUS_CONNECTION_STRING
    patterns:
      - name: "service_bus_connection_string"
        regex: "(?i)Endpoint\\s*=\\s*sb://[^;]+\\.servicebus\\.windows\\.net[^;]*;.*SharedAccessKey\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.9
      - name: "service_bus_key_only"
        regex: "(?i)servicebus\\.windows\\.net.{0,200}SharedAccessKey\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.85
    context: ["service bus", "servicebus.windows.net", "Endpoint", "SharedAccessKey", "azure"]
