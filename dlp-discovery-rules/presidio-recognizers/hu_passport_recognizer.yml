recognizers:
  - name: "Hungary Passport Number"
    supported_language: en
    supported_entity: HU_PASSPORT
    patterns:
      - name: "hu_passport"
        regex: "\\b[A-Z]{2}\\d{6,7}\\b"
        score: 0.4
    context: ["passport", "utlevel", "hungary", "hungarian", "utlevel szama", "utazasi okmany"]
