# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Connection String]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: redis.cache.windows.net ... password/pwd = <43 base64 chars>=
recognizers:
  - name: "Azure Redis Cache Connection String"
    supported_language: en
    supported_entity: AZURE_REDIS_CONNECTION_STRING
    patterns:
      - name: "redis_connection_string"
        regex: "(?i)redis\\.cache\\.windows\\.net.{1,200}(?:password|pwd)\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.9
    context: ["redis", "cache", "redis.cache.windows.net", "password", "connection string", "azure"]
