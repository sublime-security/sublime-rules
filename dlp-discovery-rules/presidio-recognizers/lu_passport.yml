# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Luxembourg]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Luxembourg Passport"
    supported_language: en
    supported_entity: LU_PASSPORT
    patterns:
      - name: "lu_passport_standard"
        regex: "\\b[A-Z]{2}\\d{6}\\b"
        score: 0.4
      - name: "lu_passport_alpha"
        regex: "\\b[A-Z][A-Z0-9]\\d{6}\\b"
        score: 0.4
    context: ["passeport", "passport", "Reisepass", "document de voyage", "travel document"]
