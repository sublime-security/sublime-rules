# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base32 encoded 256-bit key (84 chars) with AZDO signature at position 76-80
# Keywords: pat, token, ado, vsts, azuredevops, visualstudio.com, dev.azure.com
recognizers:
  - name: "Azure DevOps Personal Access Token"
    supported_language: en
    supported_entity: AZURE_DEVOPS_PAT
    patterns:
      - name: "azdo_pat_with_signature"
        regex: "[A-Za-z0-9]{72}AZDO[A-Za-z0-9]{4}"
        score: 0.9
      - name: "azdo_pat_context"
        regex: "(?i)(?:dev\\.azure\\.com|visualstudio\\.com|azuredevops|vsts).{0,80}(?:pat|token)\\s*[=:]\\s*[A-Za-z0-9]{52,84}"
        score: 0.7
    context: ["azure devops", "ado", "pat", "vsts", "visualstudio.com", "dev.azure.com", "personal access token"]
