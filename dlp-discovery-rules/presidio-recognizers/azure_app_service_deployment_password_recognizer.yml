# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 360-bit symmetric key (60 chars)
# Keywords: password, pw
recognizers:
  - name: "Azure App Service Deployment Password"
    supported_language: en
    supported_entity: AZURE_APP_SERVICE_DEPLOYMENT_PASSWORD
    patterns:
      - name: "app_service_deployment_pwd"
        regex: "(?i)(?:userPWD|deploymentPassword|publishProfile|password)\\s*[=:]\\s*[A-Za-z0-9/+~._-]{40,60}"
        score: 0.7
    context: ["azure", "app service", "deployment", "password", "pw", "publish", "kudu", "scm"]
