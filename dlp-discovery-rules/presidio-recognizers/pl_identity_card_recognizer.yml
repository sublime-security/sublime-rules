# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Poland]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Poland Identity Card Number"
    supported_language: en
    supported_entity: PL_IDENTITY_CARD
    patterns:
      - name: "pl_identity_card"
        regex: "\\b[A-Z]{3}\\d{6}\\b"
        score: 0.5
    context: ["dowod osobisty", "identity card", "polish ID", "poland", "polish", "dokument tozsamosci"]
