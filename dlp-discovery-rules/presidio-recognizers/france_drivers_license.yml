# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France Driver's License"
    supported_language: en
    supported_entity: FRANCE_DRIVERS_LICENSE
    patterns:
      - name: "france_dl_12_digits"
        regex: "\\b\\d{12}\\b"
        score: 0.3
      - name: "france_dl_formatted"
        regex: "\\b\\d{2}\\d{2}\\d{2}\\d{3}\\d{2}\\d{1}\\b"
        score: 0.3
    context: ["permis de conduire", "driver's license", "driving licence", "permis"]
