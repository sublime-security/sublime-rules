# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Slack Token"
    supported_language: en
    supported_entity: SLACK_TOKEN
    patterns:
      - name: "slack_bot_token"
        regex: "\\bxoxb-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24,}\\b"
        score: 0.9
      - name: "slack_user_token"
        regex: "\\bxoxp-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24,}\\b"
        score: 0.9
      - name: "slack_app_token"
        regex: "\\bxoxa-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24,}\\b"
        score: 0.9
      - name: "slack_refresh_token"
        regex: "\\bxoxr-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24,}\\b"
        score: 0.9
      - name: "slack_webhook_url"
        regex: "hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]{24}"
        score: 0.9
    context: ["slack", "token", "webhook", "xoxb", "xoxp", "bot token", "api"]
