# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "JSON Web Token"
    supported_language: en
    supported_entity: JSON_WEB_TOKEN
    patterns:
      - name: "jwt_token"
        regex: "\\beyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
        score: 0.85
    context: ["jwt", "token", "bearer", "authorization", "auth", "json web token"]
