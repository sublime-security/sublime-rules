recognizers:
  - name: "Colombia Citizenship Card Number"
    supported_language: en
    supported_entity: CO_CDC
    patterns:
      - name: "co_cdc"
        regex: "\\b\\d{8,10}\\b"
        score: 0.1
    context: ["cédula", "cedula", "citizenship card", "CDC", "ciudadanía", "ciudadania", "colombia", "colombian", "CC"]
