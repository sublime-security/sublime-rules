# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Connection String]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: HostName=...azure-devices.net...SharedAccessKey=<43 base64 chars>=
recognizers:
  - name: "Azure IoT Connection String"
    supported_language: en
    supported_entity: AZURE_IOT_CONNECTION_STRING
    patterns:
      - name: "iot_connection_string"
        regex: "(?i)HostName\\s*=\\s*[^;]+\\.azure-devices\\.net[^;]*;.*SharedAccessKey\\s*=\\s*[A-Za-z0-9/+]{43}="
        score: 0.9
    context: ["azure-devices.net", "iot", "HostName", "SharedAccessKey", "azure", "device"]
