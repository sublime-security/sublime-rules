# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Healthcare ID]
#   regions: [Canada]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Canada Personal Health Identification Number"
    supported_language: en
    supported_entity: CA_PHIN
    patterns:
      - name: "ca_phin"
        regex: "\\b[A-Z0-9]{9,12}\\b"
        score: 0.1
    context: ["PHIN", "personal health identification", "health ID", "health number", "manitoba health", "canada"]
