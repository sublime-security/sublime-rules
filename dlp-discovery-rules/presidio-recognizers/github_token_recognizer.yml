# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "GitHub Token"
    supported_language: en
    supported_entity: GITHUB_TOKEN
    patterns:
      - name: "github_pat"
        regex: "\\bghp_[A-Za-z0-9]{36,}\\b"
        score: 0.9
      - name: "github_oauth_token"
        regex: "\\bgho_[A-Za-z0-9]{36,}\\b"
        score: 0.9
      - name: "github_user_token"
        regex: "\\bghu_[A-Za-z0-9]{36,}\\b"
        score: 0.9
      - name: "github_server_token"
        regex: "\\bghs_[A-Za-z0-9]{36,}\\b"
        score: 0.9
      - name: "github_refresh_token"
        regex: "\\bghr_[A-Za-z0-9]{36,}\\b"
        score: 0.9
      - name: "github_fine_grained_pat"
        regex: "\\bgithub_pat_[A-Za-z0-9_]{22,}\\b"
        score: 0.9
    context: ["github", "token", "pat", "personal access token", "gh"]
