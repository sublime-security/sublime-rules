# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Healthcare]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France Health Insurance Number"
    supported_language: en
    supported_entity: FRANCE_HEALTH_INSURANCE
    patterns:
      - name: "france_carte_vitale"
        regex: "\\b[12]\\s?\\d{2}\\s?\\d{2}\\s?\\d{2}\\s?\\d{3}\\s?\\d{3}\\s?\\d{2}\\b"
        score: 0.4
      - name: "france_health_insurance_id"
        regex: "\\b\\d{1}\\s?\\d{2}\\s?\\d{2}\\s?\\d{5}\\s?\\d{3}\\s?\\d{2}\\b"
        score: 0.3
    context: ["carte vitale", "assurance maladie", "health insurance", "CPAM", "securite sociale", "mutuelle"]
