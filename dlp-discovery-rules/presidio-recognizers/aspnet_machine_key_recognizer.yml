# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Cryptographic Material]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Symmetric keys in XML machineKey element
# Keywords: password, key, connectionstring
recognizers:
  - name: "ASP.NET Machine Key"
    supported_language: en
    supported_entity: ASPNET_MACHINE_KEY
    patterns:
      - name: "machine_key_validation"
        regex: "(?i)<machineKey[^>]+validationKey\\s*=\\s*\"[0-9A-Fa-f]{40,256}\""
        score: 0.9
      - name: "machine_key_decryption"
        regex: "(?i)<machineKey[^>]+decryptionKey\\s*=\\s*\"[0-9A-Fa-f]{16,128}\""
        score: 0.9
    context: ["machineKey", "validationKey", "decryptionKey", "asp.net", "web.config", "system.web"]
