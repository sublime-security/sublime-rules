# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 URL encoded 328/360-bit keys (55 or 63 chars)
# Keywords: botframework, key
recognizers:
  - name: "Azure Bot Framework Secret Key"
    supported_language: en
    supported_entity: AZURE_BOT_FRAMEWORK_SECRET_KEY
    patterns:
      - name: "bot_framework_secret_55"
        regex: "(?i)(?:botframework|webchat).{0,50}[A-Za-z0-9_.-]{55}"
        score: 0.7
      - name: "bot_framework_secret_63"
        regex: "(?i)(?:botframework|webchat).{0,50}[A-Za-z0-9_.-]{11}\\.[A-Za-z0-9_.-]{3}\\.[A-Za-z0-9_.-]{3}\\.[A-Za-z0-9_-]{43}"
        score: 0.75
    context: ["botframework", "webchat", "bot", "azure", "key", "secret", "directline"]
