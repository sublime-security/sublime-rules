# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Brazil]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Brazil RG Number"
    supported_language: en
    supported_entity: BR_RG
    patterns:
      - name: "br_rg_formatted"
        regex: "\\b\\d{1,2}\\.?\\d{3}\\.?\\d{3}-?[0-9X]\\b"
        score: 0.3
    context: ["RG", "registro geral", "identity card", "brazil", "brasil", "identidade"]
