# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Japan]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Japan Social Insurance Number"
    supported_language: en
    supported_entity: JP_SIN
    patterns:
      - name: "jp_sin"
        regex: "\\b\\d{4}[\\s\\-]?\\d{6}\\b"
        score: 0.3
    context: ["social insurance", "pension", "insurance number", "japan"]

  - name: "Japan Social Insurance Number (Japanese)"
    supported_language: ja
    supported_entity: JP_SIN
    patterns:
      - name: "jp_sin_ja"
        regex: "\\b\\d{4}[\\s\\-]?\\d{6}\\b"
        score: 0.5
    context: ["基礎年金番号", "年金手帳", "社会保険", "年金番号"]
