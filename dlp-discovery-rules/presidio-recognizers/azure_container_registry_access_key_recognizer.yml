# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [API Key]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded 192-bit symmetric key (32 chars)
# Keywords: password, -p, azurecr
recognizers:
  - name: "Azure Container Registry Access Key"
    supported_language: en
    supported_entity: AZURE_CONTAINER_REGISTRY_ACCESS_KEY
    patterns:
      - name: "acr_login_with_key"
        regex: "(?i)(?:azurecr\\.io|container\\s*registry).{0,80}(?:password|\\-p)\\s*[=:]?\\s*[A-Za-z0-9/+]{32}"
        score: 0.8
      - name: "acr_password"
        regex: "(?i)azurecr\\.io.{0,50}[A-Za-z0-9/+]{32}"
        score: 0.7
    context: ["azure", "container registry", "azurecr", "acr", "docker", "password", "login"]
