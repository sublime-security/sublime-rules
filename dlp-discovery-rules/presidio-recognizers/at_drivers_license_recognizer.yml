recognizers:
  - name: "Austria Driver's License Number"
    supported_language: en
    supported_entity: AT_DRIVERS_LICENSE
    patterns:
      - name: "at_dl"
        regex: "\\b\\d{8}\\b"
        score: 0.2
    context: ["fuehrerschein", "driver's license", "driving licence", "austria", "austrian", "fahrerlaubnis"]
