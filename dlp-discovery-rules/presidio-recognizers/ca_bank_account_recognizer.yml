# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [Canada]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Canada Bank Account Number"
    supported_language: en
    supported_entity: CA_BANK_ACCOUNT
    patterns:
      - name: "ca_bank_account"
        regex: "\\b\\d{3}[\\s\\-]?\\d{5}[\\s\\-]?\\d{7,12}\\b"
        score: 0.5
    context: ["bank account", "transit", "institution number", "bank", "transfer", "deposit", "chequing", "savings"]
