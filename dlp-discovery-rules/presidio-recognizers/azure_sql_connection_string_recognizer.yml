# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Connection String]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: server=...database.windows.net;...user/uid=...;password/pwd=...
# Keywords: password, pw, DB_
recognizers:
  - name: "Azure SQL Server Connection String"
    supported_language: en
    supported_entity: AZURE_SQL_CONNECTION_STRING
    patterns:
      - name: "azure_sql_connection_string"
        regex: "(?i)(?:Server|Data\\s+Source)\\s*=\\s*[^;]+\\.database\\.windows\\.net[^;]*;.{0,200}(?:Password|pwd)\\s*=\\s*[^;\"]{7,128}"
        score: 0.85
      - name: "azure_sql_uid_pwd"
        regex: "(?i)(?:database\\.windows\\.net).{0,200}(?:uid|user\\s*id)\\s*=\\s*[^;]+;.{0,100}(?:pwd|password)\\s*=\\s*[^;\"]{7,128}"
        score: 0.85
    context: ["database.windows.net", "azure sql", "server", "password", "pwd", "connection string"]
