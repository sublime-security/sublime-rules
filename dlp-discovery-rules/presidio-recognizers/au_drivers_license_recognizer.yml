    supported_language: en
    supported_entity: AU_DRIVERS_LICENSE
    patterns:
      - name: "au_drivers_license"
        regex: "\\b[A-Z0-9]{6,10}\\b"
        score: 0.1
    context: ["driver's license", "drivers license", "driving licence", "DL number", "license number", "australia"]
