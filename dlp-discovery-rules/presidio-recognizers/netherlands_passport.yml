# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Netherlands]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Netherlands Passport"
    supported_language: en
    supported_entity: NETHERLANDS_PASSPORT
    patterns:
      - name: "netherlands_passport_standard"
        regex: "\\b[A-Z]{2}[A-Z0-9]{6}\\d\\b"
        score: 0.4
      - name: "netherlands_passport_numeric"
        regex: "\\b[A-Z]{2}\\d{7}\\b"
        score: 0.5
    context: ["paspoort", "passport", "reisdocument", "identiteitskaart", "travel document"]
