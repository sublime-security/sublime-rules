# Checksum: None
# Source: Purview (sit-defn-medicare-beneficiary-identifier-card)
#
# Format: 11 alphanumeric characters (MBI format since 2018).
# Pattern: C[ACNL]AN-[ACNL]AN-[ACNL][ACNL]NN
#   C = digit 1-9
#   A = letter excluding S, L, O, I, B, Z
#   N = digit 0-9
#   L = letter or digit excluding S, L, O, I, B, Z
#   Hyphens are optional
#
# Card view metadata:
#   data_categories: [PII, PHI]
#   data_types: [Healthcare ID]
#   regions: [United States]
#   compliance: [HIPAA]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "US Medicare Beneficiary ID"
    supported_language: en
    supported_entity: US_MEDICARE_BENEFICIARY_ID
    patterns:
      - name: "mbi_formatted"
        regex: "\\b[1-9][AC-HJKMNP-RT-Y][A-HJKMNP-RT-Y0-9]\\d-?[AC-HJKMNP-RT-Y][A-HJKMNP-RT-Y0-9]\\d-?[AC-HJKMNP-RT-Y]{2}\\d{2}\\b"
        score: 0.65
      - name: "mbi_unformatted"
        regex: "\\b[1-9][AC-HJKMNP-RT-Y][A-HJKMNP-RT-Y0-9]\\d[AC-HJKMNP-RT-Y][A-HJKMNP-RT-Y0-9]\\d[AC-HJKMNP-RT-Y]{2}\\d{2}\\b"
        score: 0.5
    context:
      - "MBI"
      - "mbi#"
      - "medicare beneficiary"
      - "medicare beneficiary identifier"
      - "medicare beneficiary number"
      - "medicare beneficiary #"
      - "medicare beneficiary no"
      - "medicare"
      - "CMS"
