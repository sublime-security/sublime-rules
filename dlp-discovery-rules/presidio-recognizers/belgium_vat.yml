recognizers:
  - name: "Belgium VAT Number"
    supported_language: en
    supported_entity: BELGIUM_VAT
    patterns:
      - name: "belgium_vat_standard"
        regex: "\\bBE\\s?0?\\d{3}\\.?\\d{3}\\.?\\d{3}\\b"
        score: 0.7
      - name: "belgium_vat_compact"
        regex: "\\bBE\\s?0?\\d{9}\\b"
        score: 0.7
    context: ["BTW", "TVA", "VAT", "BTW-nummer", "numero de TVA", "value added tax", "ondernemingsnummer"]
