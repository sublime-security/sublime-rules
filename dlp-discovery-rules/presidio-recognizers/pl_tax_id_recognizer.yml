# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Tax ID]
#   regions: [Poland]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Poland Tax Identification Number (NIP)"
    supported_language: en
    supported_entity: PL_TAX_ID
    patterns:
      - name: "pl_nip_formatted"
        regex: "\\b\\d{3}[\\s\\-]?\\d{3}[\\s\\-]?\\d{2}[\\s\\-]?\\d{2}\\b"
        score: 0.4
      - name: "pl_nip_continuous"
        regex: "\\b\\d{10}\\b"
        score: 0.2
    context: ["NIP", "tax identification", "numer identyfikacji podatkowej", "poland", "polish", "tax ID"]
