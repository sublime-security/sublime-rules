# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Financial]
#   regions: [France]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "France Bank Account"
    supported_language: en
    supported_entity: FRANCE_BANK_ACCOUNT
    patterns:
      - name: "france_iban"
        regex: "\\bFR\\d{2}[\\s]?\\d{4}[\\s]?\\d{4}[\\s]?\\d{4}[\\s]?\\d{4}[\\s]?\\d{4}[\\s]?\\d{3}\\b"
        score: 0.7
      - name: "france_rib"
        regex: "\\b\\d{5}[\\s]?\\d{5}[\\s]?\\d{11}[\\s]?\\d{2}\\b"
        score: 0.5
    context: ["IBAN", "compte bancaire", "bank account", "RIB", "banque", "virement"]
