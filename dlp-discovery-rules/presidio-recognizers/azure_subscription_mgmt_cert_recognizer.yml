# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Cryptographic Material]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Base64 encoded string starting with MII, in context of ManagementCertificate/Subscription
# Keywords: MII
recognizers:
  - name: "Azure Subscription Management Certificate"
    supported_language: en
    supported_entity: AZURE_SUBSCRIPTION_MGMT_CERT
    patterns:
      - name: "azure_mgmt_cert_xml"
        regex: "(?i)ManagementCertificate\\s*=\\s*\"?MII[A-Za-z0-9/+=]{100,}"
        score: 0.9
      - name: "azure_subscription_cert"
        regex: "(?i)(?:Subscription|publishsettings).{0,100}MII[A-Za-z0-9/+=]{100,}"
        score: 0.8
    context: ["ManagementCertificate", "subscription", "azure", "publishsettings", "MII", "certificate"]
