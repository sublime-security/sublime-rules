recognizers:
  - name: "Romania Driver's License Number"
    supported_language: en
    supported_entity: RO_DRIVERS_LICENSE
    patterns:
      - name: "ro_dl"
        regex: "\\b[A-Z]{2}\\d{6,8}\\b"
        score: 0.3
    context: ["permis de conducere", "driver's license", "driving licence", "romania", "romanian"]
