# Checksum: None
# Source: Purview
#
# Card view metadata:
#   data_categories: [Credentials]
#   data_types: [Authentication Token]
#   regions: [Global]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
#
# Purview: Up to 40 chars consisting of a-z, 0-9, -, _, ., ~
# Example: Bb2Cc~3Dd4.-Ee5Ff6Gg7Hh8Ii9Jj0_Kk1Ll2Mm3
# Keywords: secret, password, key
recognizers:
  - name: "Microsoft Entra Client Secret"
    supported_language: en
    supported_entity: ENTRA_CLIENT_SECRET
    patterns:
      - name: "entra_client_secret_with_context"
        regex: "(?i)(?:AppSecret|client[_\\s]?secret|AZURE_CLIENT_SECRET)\\s*[=:]\\s*[A-Za-z0-9~._-]{30,40}"
        score: 0.8
      - name: "entra_client_secret_with_app_id"
        regex: "(?i)AppId\\s*=\\s*[0-9a-f-]{36}.{0,50}(?:AppSecret|Secret)\\s*=\\s*[A-Za-z0-9~._-]{30,40}"
        score: 0.85
    context: ["entra", "azure ad", "client secret", "AppSecret", "tenant", "AppId", "client_secret"]
