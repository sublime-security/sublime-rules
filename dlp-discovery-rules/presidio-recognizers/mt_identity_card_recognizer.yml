# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Malta]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Malta Identity Card Number"
    supported_language: en
    supported_entity: MT_IDENTITY_CARD
    patterns:
      - name: "mt_identity_card"
        regex: "\\b\\d{7,8}[A-Z]\\b"
        score: 0.5
    context: ["identity card", "ID card", "karta tal-identita", "malta", "maltese"]
