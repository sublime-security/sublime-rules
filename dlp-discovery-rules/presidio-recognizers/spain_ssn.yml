# Checksum: None
# Source: MQL
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Spain]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Spain Social Security Number"
    supported_language: en
    supported_entity: SPAIN_SSN
    patterns:
      - name: "spain_ssn_formatted"
        regex: "\\b\\d{2}[\\s/]?\\d{8}[\\s/]?\\d{2}\\b"
        score: 0.4
      - name: "spain_ssn_compact"
        regex: "\\b\\d{12}\\b"
        score: 0.3
    context: ["seguridad social", "social security", "NSS", "numero de afiliacion", "afiliacion"]
