# Checksum: None
# Source: MQL
#
# Card view metadata:
#   data_categories: [Financial]
#   data_types: [Financial Account]
#   regions: [India]
#   compliance: []
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "India IFSC Code"
    supported_language: en
    supported_entity: IN_BANK_ACCOUNT
    patterns:
      - name: "ifsc_code"
        regex: "\\b[A-Z]{4}0[A-Z0-9]{6}\\b"
        score: 0.4
    context: ["IFSC", "bank account", "account number", "bank", "transfer", "deposit"]

  - name: "India Bank Account Number"
    supported_language: en
    supported_entity: IN_BANK_ACCOUNT
    patterns:
      - name: "in_bank_account_number"
        regex: "\\b\\d{9,18}\\b"
        score: 0.1
    context: ["IFSC", "bank account", "account number", "bank", "transfer", "deposit", "savings", "current account"]
