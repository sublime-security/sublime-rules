# Checksum: None
# Source: Purview / MQL
#
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [Hungary]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "Hungary Personal Identification Number"
    supported_language: en
    supported_entity: HU_PERSONAL_ID
    patterns:
      - name: "hu_personal_id"
        regex: "\\b[1-8]\\d{10}\\b"
        score: 0.3
    context: ["szemelyi szam", "personal identification", "hungary", "hungarian", "szemelyi igazolvany", "personal number"]
