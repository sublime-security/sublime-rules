# Checksum: None
# Source: Purview
# Card view metadata:
#   data_categories: [PII]
#   data_types: [Government ID]
#   regions: [United Kingdom]
#   compliance: [GDPR]
#   detection_methods: [Presidio, Content analysis]
recognizers:
  - name: "UK Driver's License"
    supported_language: en
    supported_entity: UK_DRIVERS_LICENSE
    patterns:
      - name: "uk_dl_standard"
        regex: "\\b[A-Z]{2}\\d{6}[A-Z]{2}\\d[A-Z]{2}\\b"
        score: 0.3
      - name: "uk_dl_format2"
        regex: "\\b[A-Z]{5}\\d{6}[A-Z0-9]{5}\\b"
        score: 0.5
    context: ["driving licence", "driver's license", "DVLA", "licence number", "driving license"]
