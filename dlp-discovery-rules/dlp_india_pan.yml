name: "DLP: India PAN Number"
description: "Detects messages containing Indian Permanent Account Numbers (PAN)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IN_PAN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IN_PAN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Tax ID"
regions:
  - "India"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "b7b62f6b-0e77-5020-ba9c-a2eaf35c749a"
