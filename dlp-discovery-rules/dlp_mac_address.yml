name: "DLP: MAC Address"
description: "Detects messages containing MAC addresses."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "MAC_ADDRESS"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "MAC_ADDRESS"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Network Identifiers"
data_types:
  - "Device Identifier"
regions:
  - "Global"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "58524397-0945-5def-b67c-4ca92cc3e5fb"
