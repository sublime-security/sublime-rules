name: "DLP: South Africa National ID"
description: "Detects messages containing South African National Identity Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "ZA_NATIONAL_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "ZA_NATIONAL_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "South Africa"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "da2cdc0e-be76-4080-8bf4-bc352d71b67d"
