name: "DLP: Thailand National Identification Number"
description: "Detects messages containing Thai National Identification Numbers (TNIN)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "TH_TNIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "TH_TNIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Thailand"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "87dc4c70-1a7c-42ee-bab3-6469715e19e6"
