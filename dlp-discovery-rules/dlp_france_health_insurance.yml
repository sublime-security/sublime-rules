name: "DLP: France Health Insurance Number"
description: "Detects messages containing French health insurance card numbers (Carte Vitale)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "FRANCE_HEALTH_INSURANCE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "FRANCE_HEALTH_INSURANCE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Healthcare"
regions:
  - "France"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "3d0f31ab-1958-47e3-9730-26cfbe5be73f"
