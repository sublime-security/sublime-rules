name: "DLP: Medical Specialties"
description: "Detects messages containing medical specialty and subspecialty names."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "MEDICAL_SPECIALTY"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "MEDICAL_SPECIALTY"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "Global"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "bdc95286-3042-4ecf-a75a-96825e16827b"
