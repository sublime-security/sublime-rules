name: "DLP: Portugal Citizen Card Number"
description: "Detects messages containing Portuguese Citizen Card Numbers (Cartao de Cidadao)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "PORTUGAL_CITIZEN_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "PORTUGAL_CITIZEN_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Portugal"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "27a4c2c9-04aa-5719-a6ca-318be8e6cc7c"
