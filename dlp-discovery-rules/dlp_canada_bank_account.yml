name: "DLP: Canada Bank Account Number"
description: "Detects messages containing Canadian bank account numbers with institution and transit numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CA_BANK_ACCOUNT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CA_BANK_ACCOUNT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Canada"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "6ce27d37-a2ae-50dd-a932-23d3dd58f1ac"
