name: "DLP: US Insurance Claim Number"
description: "Detects messages containing insurance claim numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_INSURANCE_CLAIM"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_INSURANCE_CLAIM"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
  - "PHI"
data_types:
  - "Healthcare ID"
regions:
  - "United States"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "63f12df8-006f-5ade-9bd5-cdb9259b6a13"
