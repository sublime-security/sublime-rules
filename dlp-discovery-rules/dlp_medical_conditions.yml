name: "DLP: Medical Conditions"
description: "Detects messages containing medical terms and conditions such as diseases, disorders, and diagnoses."
type: "dlp"
severity: "low"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "MEDICAL_CONDITION"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "MEDICAL_CONDITION"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "Global"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "a221d62c-967f-4624-9d29-3f835467c78b"
