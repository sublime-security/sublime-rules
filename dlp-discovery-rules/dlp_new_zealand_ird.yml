name: "DLP: New Zealand IRD Number"
description: "Detects messages containing New Zealand Inland Revenue Department (IRD) numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "NZ_IRD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "NZ_IRD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Tax ID"
regions:
  - "New Zealand"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "807bb686-9d56-49d2-9607-5e09f69387f3"
