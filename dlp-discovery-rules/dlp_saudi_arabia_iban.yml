name: "DLP: Saudi Arabia IBAN"
description: "Detects messages containing Saudi Arabian International Bank Account Numbers (IBAN)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IBAN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IBAN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Saudi Arabia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "02049a28-c93a-501b-9ae4-1e23d965e4bf"
