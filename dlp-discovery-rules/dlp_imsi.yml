name: "DLP: IMSI Number"
description: "Detects messages containing International Mobile Subscriber Identity (IMSI) numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IMSI"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IMSI"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Network Identifiers"
data_types:
  - "Device Identifier"
regions:
  - "Global"
compliance: []
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "c85b5b07-be6e-5ff4-821e-4490ad3d9f2d"
