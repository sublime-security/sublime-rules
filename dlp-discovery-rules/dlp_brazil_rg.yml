name: "DLP: Brazil RG Number"
description: "Detects messages containing Brazilian General Registry (RG) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "BR_RG"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "BR_RG"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Brazil"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "869f94d6-8b08-5194-a6be-21662dd62372"
