name: "DLP: New Zealand Social Welfare Number"
description: "Detects messages containing New Zealand Social Welfare client numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "NZ_SOCIAL_WELFARE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "NZ_SOCIAL_WELFARE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "New Zealand"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "ac19f141-2a4a-4273-b012-0791e0ce52f6"
