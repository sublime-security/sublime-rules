name: "DLP: China Resident ID Number"
description: "Detects messages containing Chinese Resident Identity Card numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CN_RESIDENT_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CN_RESIDENT_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "China"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "03c59035-48e2-5925-904a-10a1e089bc8d"
