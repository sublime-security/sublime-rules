name: "DLP: Sweden Driver's License"
description: "Detects messages containing Swedish driver's license numbers."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SE_DRIVERS_LICENSE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SE_DRIVERS_LICENSE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Driver's License"
regions:
  - "Sweden"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "fdaf589e-abda-4f94-8db8-d48adc1634b8"
