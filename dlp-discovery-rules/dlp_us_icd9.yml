name: "DLP: US ICD-9-CM Code"
description: "Detects messages containing ICD-9-CM diagnosis and procedure codes."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "US_ICD9"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "US_ICD9"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
  - "PHI"
data_types:
  - "Medical Code"
regions:
  - "United States"
compliance:
  - "HIPAA"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "e6e2af96-e87c-5228-938d-64a29466dc7a"
