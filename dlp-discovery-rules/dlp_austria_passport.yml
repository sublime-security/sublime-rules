name: "DLP: Austria Passport"
description: "Detects messages containing Austrian passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AT_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AT_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "Austria"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "d57e57e5-d9a2-42eb-b9c1-47b6600af3a8"
