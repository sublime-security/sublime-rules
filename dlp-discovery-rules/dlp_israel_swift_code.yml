name: "DLP: Israel SWIFT Code"
description: "Detects messages containing Israeli SWIFT/BIC codes for financial institutions."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "IL_SWIFT_CODE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "IL_SWIFT_CODE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Israel"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "229ae7d5-7c40-5827-a357-189f8cbb9b0e"
