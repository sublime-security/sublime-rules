name: "DLP: Brazil CPF Number"
description: "Detects messages containing Brazilian Natural Persons Register (CPF) numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "BR_CPF"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "BR_CPF"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Tax ID"
regions:
  - "Brazil"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "a0f9bcb7-844a-5512-a013-683efa12261e"
