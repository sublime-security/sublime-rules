name: "DLP: Netherlands VAT Number"
description: "Detects messages containing Dutch VAT identification numbers (BTW-nummer)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "NETHERLANDS_VAT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "NETHERLANDS_VAT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax"
regions:
  - "Netherlands"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "233ce2f1-bd5d-4fa9-ac82-d9447d1d075c"
