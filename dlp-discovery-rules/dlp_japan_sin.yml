name: "DLP: Japan Social Insurance Number"
description: "Detects messages containing Japanese Social Insurance Numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "JP_SIN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "JP_SIN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Japan"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "140a4fa1-a088-5f5a-8ce0-76e30af42b8d"
