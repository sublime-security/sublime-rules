name: "DLP: Client Secret / API Key"
description: "Detects messages containing generic client secrets and API keys."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CLIENT_SECRET_API_KEY"
          and .confidence == "high"
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CLIENT_SECRET_API_KEY"
              and .confidence == "high"
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "API Key"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "7aead3f1-494a-4f7a-aee7-9190cb104f9f"
