name: "DLP: Saudi Arabia SWIFT Code"
description: "Detects messages containing Saudi Arabian SWIFT/BIC codes for financial institutions."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SA_SWIFT_CODE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SA_SWIFT_CODE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Financial"
data_types:
  - "Financial Account"
regions:
  - "Saudi Arabia"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "8b5d1443-6d10-5d90-8a66-1fabb3b29d21"
