name: "DLP: Bulgaria Uniform Civil Number"
description: "Detects messages containing Bulgarian Uniform Civil Numbers (EGN)."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "BG_UCN"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "BG_UCN"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Bulgaria"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "09141e4a-e91c-59c0-b4cc-e612d4c534f7"
