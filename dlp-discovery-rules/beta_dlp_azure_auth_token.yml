name: "beta.DLP: Azure Authentication Token"
description: "Detects messages containing Azure authentication tokens, storage account keys, or SAS signatures."
type: "dlp"
severity: "high"
attack_types:
  - "DLP: Credential Exposure"
tags:
  - "Credentials"
  - "Azure"
  - "Cloud"
source: |
  //
  // This rule makes use of a beta feature and is subject to change without notice
  // using the beta feature in custom rules is not suggested until it has been formally released
  //
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text).elements,
      .type == "azure_auth_token" and .confidence in ("medium", "high")
    )
    or any(beta.ml_extract_sensitive_information(subject.subject).elements,
      .type == "azure_auth_token" and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        (
          any(beta.ml_extract_sensitive_information(.scan.strings.raw).elements,
            .type == "azure_auth_token" and .confidence in ("medium", "high")
          )
          or any(beta.ml_extract_sensitive_information(.scan.ocr.raw).elements,
            .type == "azure_auth_token" and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "File analysis"
  - "Optical Character Recognition"
