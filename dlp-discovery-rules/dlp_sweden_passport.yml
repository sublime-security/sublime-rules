name: "DLP: Sweden Passport"
description: "Detects messages containing Swedish passport numbers."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SE_PASSPORT"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SE_PASSPORT"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Passport"
regions:
  - "Sweden"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "c349c2f0-9236-4773-8fac-cf0d585842e4"
