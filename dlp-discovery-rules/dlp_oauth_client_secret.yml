name: "DLP: OAuth Client Secret"
description: "Detects messages containing OAuth client secrets."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "OAUTH_CLIENT_SECRET"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "OAUTH_CLIENT_SECRET"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "c5e1abfa-7ca5-5ab9-b4b1-a8a55d72917f"
