name: "DLP: SSL Certificate"
description: "Detects messages containing SSL/TLS certificates."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "SSL_CERTIFICATE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "SSL_CERTIFICATE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Cryptographic Material"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "9432a3c1-a364-583d-a5bf-2253b9707e91"
