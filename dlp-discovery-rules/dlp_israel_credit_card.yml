name: "DLP: Israel Credit Card Number"
description: "Detects messages containing credit card numbers in Israeli context."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "CREDIT_CARD"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "CREDIT_CARD"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PCI"
data_types:
  - "Payment Card"
regions:
  - "Israel"
compliance:
  - "PCI-DSS"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "0102f80f-a47f-5f52-a693-1fcf92b109c0"
