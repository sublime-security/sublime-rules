name: "DLP: General Password"
description: "Detects messages containing general passwords in plaintext, code, scripts, or configuration."
type: "dlp"
severity: "high"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "GENERAL_PASSWORD"
          and .confidence == "high"
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "GENERAL_PASSWORD"
              and .confidence == "high"
          )
        )
      )
    )
  )
data_categories:
  - "Credentials"
data_types:
  - "Authentication Token"
regions:
  - "Global"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "e12b3df4-6b1b-4e39-b82d-1f5504de9fa6"
