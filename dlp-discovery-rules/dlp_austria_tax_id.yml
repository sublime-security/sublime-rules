name: "DLP: Austria Tax Identification Number"
description: "Detects messages containing Austrian Tax Identification Numbers (Steuernummer)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "AT_TAX_ID"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "AT_TAX_ID"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Tax ID"
regions:
  - "Austria"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "1b03538f-90be-5ee2-8d63-756d6d7b9ea6"
