name: "DLP: Luxembourg Driver's License Number"
description: "Detects messages containing Luxembourg driver's license numbers (Permis de Conduire)."
type: "dlp"
severity: "medium"
source: |
  type.outbound
  and (
    any(beta.ml_extract_sensitive_information(body.current_thread.text),
          .type == "LU_DRIVERS_LICENSE"
          and .confidence in ("medium", "high")
    )
    or any(attachments,
      any(file.explode(.),
        any(.scan.strings.strings,
          any(beta.ml_extract_sensitive_information(.),
              .type == "LU_DRIVERS_LICENSE"
              and .confidence in ("medium", "high")
          )
        )
      )
    )
  )
data_categories:
  - "PII"
data_types:
  - "Government ID"
regions:
  - "Luxembourg"
compliance:
  - "GDPR"
detection_methods:
  - "Presidio"
  - "Content analysis"
id: "837e2b6a-0d31-4d71-844e-f0905f784684"
