name: "Track link clicks for Malicious, Suspicious, and Unknown messages"
description: "Rewrite links in messages flagged with a Malicious, Suspicious, or Unknown Attack Score to track user clicks."
type: "triage_rule"
triage_flagged_messages: true
default_actions: ["track_link_clicks"]
source: type.inbound and ml.attack_score().verdict in ("malicious", "suspicious", "unknown")