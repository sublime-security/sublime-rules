name: "Run ADÉ Automatically - Spam"
description: "Run ADÉ Automatically"
type: "triage_rule"
triage_classification_changes: true
triage_asa_complete: true
active: false
internal_type: "run_ade_automatically_spam"
default_actions: ["ade_auto_run"]
source: |
  type.inbound 
  and (
    triage.classification.classification =~ "spam"
    or triage.agents.asa.verdict =~ "spam"
  )
  and length(triage.flagged_rules) == 0
