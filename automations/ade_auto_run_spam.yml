name: "Run ADE Automatically - Spam"
description: "Run ADE Automatically"
type: "triage_rule"
triage_classification_changes: true
triage_asa_complete: true
active: false
internal_type: 'run_ade_automatically_spam'
default_actions: ["ade_auto_run"]
source: |
  (triage.trigger == "classification_changes" and triage.classification.classification =~ 'spam')
  or (triage.trigger == "asa_complete" and triage.agents.asa.verdict =~ "spam")