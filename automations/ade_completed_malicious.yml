name: "ADE Completed - Malicious"
description: "An ADE job has completed"
type: "triage_rule"
triage_ade_complete: true
internal_type: 'ade_complete_malicious'
default_actions: ["ade_auto_review"]
source: |
  triage.trigger == "ade_complete"
  and (triage.classification.classification =~ "malicious" or triage.agents.asa.verdict =~ "malicious")