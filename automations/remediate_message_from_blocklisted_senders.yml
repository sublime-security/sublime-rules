name: "Remediate message from blocklisted senders"
description: "Auto-quarantine messages with senders in the blocklisted senders list"
type: "triage_rule"
active: false
triage_flagged_messages: true
# internal_type: "remediate_message_from_blocklisted_senders"
default_actions: ["quarantine_message"]
source: |
  type.inbound
  and sender.email.email in $blocklisted_senders