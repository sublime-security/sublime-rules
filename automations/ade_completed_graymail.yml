name: "ADE Completed - Graymail"
description: "An ADE job has completed"
type: "triage_rule"
triage_ade_complete: true
internal_type: 'ade_complete_graymail'
default_actions: ["ade_auto_review"]
source: |
  triage.trigger == "ade_complete"
  and (triage.classification.classification =~ "graymail" or triage.agents.asa.verdict =~ "graymail")