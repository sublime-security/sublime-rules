name: Update IOC Rules

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Allow manual triggering

env:
  PYTHON_VERSION: "3.11"

jobs:
  update-ioc-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Push to automated-ioc-updates branch
      checks: write         # Future: workflow run checks
      pull-requests: write  # Create/update PR

    steps:
      - name: Checkout sublime-rules repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Full history for branch operations

      - name: Checkout IOC management repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: sublime-security/ioc-management
          ssh-key: ${{ secrets.IOC_MANAGEMENT_DEPLOY_KEY }}  # Deploy key with write access
          path: ioc-repo
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ioc-repo
          pip install -r requirements.txt

      - name: Parse IOCs and generate rule files
        run: |
          cd ioc-repo
          python scripts/main.py --log-level INFO

      - name: Create or switch to automated-ioc-updates branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch --all
          if git show-ref --quiet refs/remotes/origin/automated-ioc-updates; then
            git checkout automated-ioc-updates
            git pull origin automated-ioc-updates
          else
            git checkout -b automated-ioc-updates
          fi

      - name: Copy generated YML files to detection-rules
        run: |
          mkdir -p detection-rules/
          cp ioc-repo/iocs/yml/*.yml detection-rules/

      - name: Commit changes to sublime-rules
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there are any changes to detection rules
          if [[ -z $(git status --porcelain detection-rules/observed_malicious_*.yml) ]]; then
            echo "No changes to IOC rules"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get list of modified files
          FILES=$(git status --porcelain detection-rules/observed_malicious_*.yml | awk '{print $2}')

          # Add and commit each file individually for better audit trail
          for FILE in $FILES; do
            if [[ ! -f "$FILE" ]]; then
              echo "File was deleted: $FILE"
              git add "$FILE"
              git commit -m "chore: Remove IOC rule $(basename $FILE)"
            else
              RULE_NAME=$(grep -m 1 "^name:" "$FILE" | sed 's/name: //' | sed 's/^"//' | sed 's/"$//' | sed "s/^'//" | sed "s/'$//")
              git add "$FILE"
              git commit -m "chore: Update IOC rule - ${RULE_NAME}"
            fi
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push branch to sublime-rules
        if: steps.commit.outputs.changed == 'true'
        run: |
          git push --force origin automated-ioc-updates

      - name: Create or update PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Built-in token (shows as bot)
          TARGET_REPOSITORY: ${{ github.repository }}  # sublime-security/sublime-rules
        run: |
          cd ioc-repo
          python scripts/manage_pr.py --log-level INFO
