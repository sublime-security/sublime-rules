name: "Link: Is.gd shortened URL with fragment matching subject"
description: "Detects messages containing is.gd shortened links where the URL fragment contains only digits that also appear in the email subject line, indicating potential targeted link tracking or social engineering tactics."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.current_thread.links,
          .href_url.domain.root_domain == 'is.gd'
          and .href_url.fragment is not null
          and regex.match(.href_url.fragment, '^\d+$')
          and strings.contains(subject.subject, .href_url.fragment)
  )

attack_types:
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "URL analysis"
  - "Header analysis"
