name: "PR# 4102 - Attachment: PDF with credential theft language and link to a free subdomain (unsolicited)"
description: |
  Detects messages with credential theft PDFs linking to free subdomains.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "cred_theft" and .confidence in ("medium", "high")
  )
  and any(attachments,
          .file_extension == "pdf"
          and any(file.explode(.),
                  any(.scan.pdf.urls,
                      .domain.root_domain in $free_subdomain_hosts
                      and .domain.subdomain is not null
                      and .domain.subdomain != "www"
                  )
                  and any(ml.nlu_classifier(.scan.ocr.raw).intents,
                          .name == "cred_theft"
                          and .confidence in ("medium", "high")
                  )
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Free subdomain host"
  - "PDF"
  - "Social engineering"
detection_methods:
  - "File analysis"
  - "Natural Language Understanding"
  - "Optical Character Recognition"
  - "URL analysis"
id: "1f190aa9-80d4-5668-9cb2-fa46aa712fa9"
tags:
  - created_from_open_prs
