name: "Acts of Violence: Retribution and revenge threats (previous threads)"
description: "Detects in previous email threads revenge-driven threats with 'you will pay' or payback language."
type: "rule"
severity: "high"
source: |
  type.inbound
  and length(body.previous_threads) > 0

  and any(body.previous_threads,
    any(ml.nlu_classifier(.text).topics,
            .name == "Acts of Violence" and .confidence == "high"
    )

    and (
      // Retribution + violence/harm
      (
        regex.icontains(.text,
                        '(?:you|they|everyone)\s+(?:all\s+)?(?:will|gonna|going to)\s+(?:[^\r\n\x20]+\s+){0,5}(?:pay|regret|be sorry|suffer)'
        )
        and (
          // Combined with violence verbs
          regex.icontains(.text,
                          '(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)'
          )
          // Or harm nouns
          or regex.icontains(.text,
                             '(?:pain|suffering|death|blood|corpse|agony|torture|injury)'
          )
          // Or weapons
          or regex.icontains(.text,
                             '(?:gun|knife|weapon|blade|rifle|pistol)'
          )
        )
      )
      // Explicit revenge with violence
      or (
        regex.icontains(.text,
                        '(?:revenge|payback|get back at|settle the score|make (?:you|them) pay)'
        )
        and regex.icontains(.text,
                            '(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)'
        )
      )
      // "You will" + negative consequences
      or regex.icontains(.text,
                         'you\s+(?:all\s+)?will\s+(?:[^\r\n\x20]+\s+){0,5}(?:die|bleed|suffer|scream|beg|cry|regret)'
      )
      // Swearing vengeance/violence
      or regex.icontains(.text,
                         '(?:i|we)\s+(?:swear|promise|vow)\s+(?:[^\r\n\x20]+\s+){0,5}(?:to\s+)?(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)\s+(?:[^\r\n\x20]+\s+){0,5}(?:you|them|everyone)'
      )
      // "Make you" + suffering
      or regex.icontains(.text,
                         '(?:i|we)\s+(?:will|gonna)\s+(?:[^\r\n\x20]+\s+){0,5}make\s+(?:[^\r\n\x20]+\s+){0,5}(?:you|them)\s+(?:[^\r\n\x20]+\s+){0,5}(?:pay|suffer|regret|scream|bleed|die)'
      )
    )
    and length(.text) > 50

    and length(.text) < 10000

    // Negate benign contexts
    and not
      any(ml.nlu_classifier(.text).topics,
          .name in ("News and Current Events", "Newsletters and Digests", "Entertainment and Sports" )
          and .confidence == "high"
      )
  )
