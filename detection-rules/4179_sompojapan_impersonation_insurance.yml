name: "Brand impersonation: Sompo Japan KII"
description: "Impersonation of Sompo Japan KII insurance company, typically used for credential theft or fraud."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    strings.ends_with(sender.email.email, "sompo-japan-kii.com")
    or sender.email.email == "admin@sompo-japan-kii.com"
  )
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
  - "Content analysis"
id: "5b69b033-b770-5e86-95ca-5cae38ca108a"
og_id: "e61340c8-1877-584c-9bdc-3d20a8de9ebb"
