name: "Attachment: PDF with password in message body"
description: "Detects messages containing PDF attachments with body text mentioning a password for a document, including a 4-digit numeric pattern, using machine translation to detect content in multiple languages."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(filter(attachments, .file_type == "pdf")) > 0
  //
  // This rule makes use of a beta feature and is subject to change without notice
  // using the beta feature in custom rules is not suggested until it has been formally released
  //
  and strings.icontains(beta.ml_translate(body.current_thread.text).text,
                        "following password"
  )
  and strings.icontains(beta.ml_translate(body.current_thread.text).text,
                        "document"
  )
  and regex.contains(body.current_thread.text, ": [0-9]{4}")
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Encryption"
  - "PDF"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "File analysis"
id: "8d02e0e6-976e-54ae-baad-a3eaffd36474"
