name: "PR# 4240 - Link: Suspicious action language with undisclosed recipients"
description: "Detects messages sent to undisclosed recipients containing links with suspicious action-oriented language such as 'verify', 'view', 'click', or 'download' combined with terms like 'attachment', 'document', or 'file'. Includes authentication checks to reduce false positives from legitimate trusted domains."
type: "rule"
severity: "high"
source: |
  type.inbound
  // no recipients defined
  and (
    length(recipients.to) == 0
    or all(recipients.to, strings.ilike(.display_name, "undisclosed?recipients"))
    or all(recipients.to, .email.email == sender.email.email)
  )
  and length(recipients.cc) == 0
  and length(recipients.bcc) == 0
  
  // sus display text or no display text
  and (
    any(body.links,
        regex.icontains(.display_text,
                        '((verify|view|click|download|goto|keep|Vιew|release).{0,15}(attachment|current|download|fax|file|document|message|same)s?)'
        )
    )
  )
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and (coalesce(headers.auth_summary.dmarc.pass, false))
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
  
  // negation for messages traversing docusign.net
  // happens with custom sender domains
  and not (
    any(headers.domains, .root_domain == "docusign.net")
    and coalesce(headers.auth_summary.spf.pass, false)
    and coalesce(headers.auth_summary.dmarc.pass, false)
    and strings.contains(sender.display_name, "via")
  )

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "Sender analysis"
