name: "Attachment: ICS calendar file with suspicious product identifier"
description: "Detects inbound messages containing ICS calendar attachments that have product identifiers matching patterns commonly associated with malicious calendar invitations. The rule identifies ICS files through multiple detection methods and analyzes the product_id field for suspicious formatting that may indicate automated generation or spoofing attempts."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(attachments,
          (
            .file_type == "ics"
            or .file_extension == "ics"
            or .content_type in ("application/ics", "text/calendar")
          )
          //
          // This rule makes use of a beta feature and is subject to change without notice
          // using the beta feature in custom rules is not suggested until it has been formally released
          //
          and (
            regex.icontains(beta.file.parse_ics(.).product_id,
                            '-//[a-z0-9]*[0-9][a-z0-9]*//EN'
            )
            or strings.icontains(beta.file.parse_ics(.).product_id,
                                 "-//MyApp//example.com//",
                                 "-//My App//NS9 Calendar//EN",
                                 "-//SharePoint//NONSGML v1.0//EN",
                                 "-//Revised  Handout//NONSGML Event//EN",
                                 "-//WORKFORCE REVIEW//NONSGML Event//EN",
                                 "-////NONSGML Event//EN",
                                 "-//YourCassavaLtd//EateriesDept//EN",
                                 "-//Your App//EN",
                                 "-//Entain//NONSGML Event//EN",
                                 "-//Wood//NONSGML Event//EN",
                                 "-//University Of Exeter//NONSGML Event//EN",
                                 "-//Organization//EN",
                                 "-//Calendar Auto//EN",
                                 "-Meeting Schedule",
                                 "-//JANSANI//Email Engine v12.7//EN",
                                 "-Event Mandate",
                                 "-//CalendarInviteBuilder//EN",
                                 "-//CustomMailer//EN",
                                 "-//2FA Optimized Firewall//NONSGML Event//EN",
                                 "-//Employee Benefits Handbook//NONSGML Event//EN",
                                 "Trafft",
                                 "-//caldav.icloud.com//CALDAVJ 2620B879//EN",
                                 "-//Friendship Family Of Dealerships//NONSGML Event//EN",
                                 "-//Project Managment Department//NONSGML Event//EN",
                                 "-//Calendar Event//EN",
                                 "-//dilmar//EN",
                                 "-//Assurance Manual//NONSGML Event//EN",
                                 "-//Jci//NONSGML Event//EN",
                                 "-//OOPEN Calendar//Time Machine//EN",
                                 "-//Desplaines//NONSGML Event//EN",
                                 "-//First Dips//Portal//EN",
                                 "-//Agilent Technologies//NONSGML Event//EN",
                                 "-//Ba//NONSGML Event//EN",
                                 "-//Mott Macdonald//NONSGML Event//EN",
                                 "-//Stellantis//NONSGML Event//EN",
                                 "-//Totalenergies//NONSGML Event//EN",
                                 "-//May Quality Policy//NONSGML Event//EN",
                                 "-//Administrator//NONSGML Event//EN",
                                 "-//X7fG3//Y2kL9//M9nP4 16.0 MIMEDIR//EN",
                                 "-//HRNotify//CompChange 1.0//EN",
                                 "-//Follow-Up Report/Meeting//NONSGML Event//EN",
                                 "-//Prof Morales Sender//EN",
                                 "-//April Quality Policy//NONSGML Event//EN",
                                 "-//Wiemann Metalcraft//NONSGML Event//EN",
                                 "-//Calhoun Truck Lines//NONSGML Event//EN",
                                 "-//Thompson//NONSGML Event//EN",
                                 "-//Gallomech//NONSGML Event//EN",
                                 "-//Association Of Occupational And Environmental Clinics//NONSGML Event//EN",
                                 "-//YourCompany//NONSGML Event//EN"
            )
          )
  )
