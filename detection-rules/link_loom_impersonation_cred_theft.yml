name: "Link: Loom impersonation with suspicious button styling"
description: "Detects messages containing links to Loom that also include suspicious HTML elements with button-like styling, including rounded borders and background colors, which may indicate impersonation of legitimate Loom notifications or interface elements."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.current_thread.links,
          strings.icontains(.href_url.path, "/loom/")
          and strings.iends_with(.href_url.path, ".html")
  )
  and (
    length(html.xpath(body.html,
                      '//td[@bgcolor and contains(@style, "border-radius")]//a'
           ).nodes
    ) > 0
    or length(html.xpath(body.html,
                         '//a[contains(@style, "background") and contains(@style, "border-radius")]'
              ).nodes
    ) > 0
  )  
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "HTML analysis"
  - "URL analysis"
id: "bd27e7ec-1e77-5134-a572-32d642058aa5"
