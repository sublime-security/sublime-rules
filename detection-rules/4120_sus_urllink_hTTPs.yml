name: "PR# 4120 - Link: Mixed case HTTPS protocol"
description: "Detects messages containing links with mixed case 'hTTPs' protocol, a technique used to evade detection filters."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(body.links) > 0 
  and any(body.links, strings.contains(.href_url.url, 'hTTPs'))

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "Content analysis"
  - "URL analysis"
id: "7e71db97-0fd9-580e-8657-bea099a47f5c"
tags:
