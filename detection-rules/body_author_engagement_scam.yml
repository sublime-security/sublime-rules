name: "Message content: Request for author engagement"
description: "Detects inbound messages containing language consistent with unsolicited book/author related scam. Often used to ask for payment related to promotion of an upcoming or recently published book."
type: "rule"
severity: "low"
source: |
  type.inbound
  and sender.email.domain.domain in $free_email_providers
  and strings.icontains(body.current_thread.text, "would be")
  and strings.icontains(body.current_thread.text, "moderat")
  and strings.icontains(body.current_thread.text, "goodread")
  and strings.icontains(body.current_thread.text, "reader")
  and strings.icontains(body.current_thread.text, "feature")
  and strings.icontains(body.current_thread.text, "book")

attack_types:
  - "Spam"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "c52f5f19-0928-59bf-8409-d58df640c5a7"
