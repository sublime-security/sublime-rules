name: "PR# 4173 - Template variables in HTML body content"
description: "Message contains unprocessed template variables commonly used in mass mailing systems, indicating potential misuse of email marketing platforms or malformed bulk messages."
type: "rule"
severity: "low"
source: |
  type.inbound
  and regex.icontains(body.html.raw,
                      '\{\{(date|unsubscribe_link|email|year|manage_prefs_url|privacy_url|Support_Link|Notification_Preferences_Link|ACCOUNT_SETTINGS_URL|SECURITY_FAQ_URL|recipient_email|domainlogo|companyname)\}\}'
  )
attack_types:
  - "Spam"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
id: "1e236e56-5f5e-57e9-8ec5-bcfe5ac868ec"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_D-Bolton
references:
  - https://github.com/sublime-security/sublime-rules/pull/4173