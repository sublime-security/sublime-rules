name: "PR# 4168 - New sender domain (<=10d)"
description: |
  Detects inbound emails where the sender domain is less than 10 days old.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and network.whois(sender.email.domain).days_old <= 10
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_renamed
detection_methods:
  - "Sender analysis"
  - "Whois"
id: "15ca4370-01ce-5ae0-9f15-61ce5acd5a49"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4168