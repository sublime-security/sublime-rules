name: "PR# 4412 - Abuse: Robinhood injected content"
description: "Detects messages from Robinhood with injected HTML into one of the list fields, often the 'Device' field."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "noreply@robinhood.com"
  and any(html.xpath(body.html, '//div/ul[count(li) = 4]/li').nodes,
          length(.raw) > 500 and strings.count(.raw, "</") > 10
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "HTML analysis"
  - "Sender analysis"
id: "0a2648ba-fc95-5c41-a752-2e70a5ed4826"
tags:
  - created_from_open_prs
