name: "PR# 4161 - Link: Scribd fullscreen link"
description: "Detects messages containing Scribd links with the fullscreen parameter."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(body.links) < 10
  and any(body.links,
          (
            .href_url.domain.root_domain == "scribd.com"
            or strings.icontains(.href_url.query_params, 'scribd.com')
            or strings.icontains(.href_url.query_params, 'scribd%2ecom')
            or strings.icontains(.href_url.query_params, 'scribd%252ecom')
          )
          and strings.icontains(.href_url.fragment, 'fullscreen')
  )
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Free file host"
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "URL analysis"
id: "387ac79d-f85b-5c4e-baa6-e209ea708c58"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4161