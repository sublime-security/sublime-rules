name: "Brand impersonation: Spotify"
description: |
  Impersonation of Spotify.
references:
  - "https://www.phishprotection.com/blog/the-latest-popular-service-to-serve-you-up-phishing-emails-spotify/"
type: "rule"
severity: "low"
source: |
  type.inbound
  and (
    strings.ilike(sender.display_name, '*spotify*')
    or strings.ilevenshtein(sender.display_name, 'spotify') <= 1
    or strings.ilike(sender.email.domain.domain, '*spotify*')
    or (
      regex.icontains(body.current_thread.text, 'Spotify AB\b')
      and any(ml.logo_detect(file.message_screenshot()).brands,
              .name == "Spotify" and .confidence != "low"
      )
    )
  )
  and sender.email.domain.root_domain not in~ (
    'spotify.com',
    'byspotify.com',
    'echosign.com',
    'fromspotify.com',
    'anchor.fm'
  )
  and sender.email.domain.domain not in~ ('privaterelay.appleid.com')
  and (
    profile.by_sender().prevalence in ("new", "outlier")
    or (
      profile.by_sender().any_messages_malicious_or_spam
      and not profile.by_sender().any_messages_benign
    )
  )

  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Lookalike domain"
  - "Social engineering"
detection_methods:
  - "Sender analysis"
