name: "Callback phishing via Apple ID display name abuse"
description: "Detects callback phishing that abuses legitimate Apple ID notification emails as a delivery mechanism. The threat actor sets their Apple ID display name to a callback scam lure (e.g., a fake charge with a phone number), which Apple then embeds in the "Dear [name]" greeting of a routine account change notification. This legitimate email is forwarded to multiple targets via a distribution list, bypassing sender reputation checks since it originates from Apple's real infrastructure. The rule extracts the name field from the greeting and applies NLU classification to detect callback scam language within it.
"
type: "rule"
severity: "high"
source: |
  type.inbound
  and sender.email.email == "appleid@id.apple.com"
  and any(regex.iextract(body.current_thread.text, 'Dear (?P<name>[^\n]+)\n'),
      any(ml.nlu_classifier(.named_groups["name"]).intents,
          .name == "callback_scam"
      )
  )

attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Out of band pivot"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "Sender analysis"
