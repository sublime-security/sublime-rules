name: "PR# 4139 - Attachment with unscannable encrypted zip"
description: |
  Recursively scans files and archives to detect embedded ZIP files
  that are encrypted and could not be opened/scanned.
references:
  - "https://www.zdnet.com/article/this-phishing-email-contains-a-password-protected-file-dont-open-it/"
  - https://github.com/sublime-security/sublime-rules/pull/4139
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(attachments,
          (.file_type == "zip" or .file_extension == "zip")
          and any(file.explode(.),
                  any(.flavors.yara, . == 'encrypted_zip')
                  and .scan.encrypted_zip.cracked_password == null
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Encryption"
  - "Evasion"
detection_methods:
  - "Archive analysis"
  - "File analysis"
  - "YARA"
id: "a0713517-6606-57f2-a77c-73fd96731312"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator