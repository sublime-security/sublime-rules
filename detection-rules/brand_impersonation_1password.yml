name: "Brand impersonation: 1Password"
description: "Detects messages impersonating 1Password by identifying key indicators such as the sender's display name, body text references to the 1Password brand, AgileBits Inc., their Toronto office address, or characteristic footer signatures. Legitimate messages from verified 1Password and AgileBits domains that pass DMARC authentication are excluded, as are newsletter and event-related content."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    (
      any(ml.nlu_classifier(body.current_thread.text).entities,
          .name in ("sender") and strings.icontains(.text, '1Password')
      )
      and (
        any(ml.nlu_classifier(body.current_thread.text).intents,
            .name == "cred_theft" and .confidence == "high"
        )
      )
    )
    or strings.icontains(sender.display_name, "1Password")
    or strings.icontains(body.current_thread.text, "The 1Password Team")
    or strings.icontains(body.current_thread.text, "The 1Password HR Team")
    or strings.icontains(body.current_thread.text, "Contact 1Password Support")
    or strings.icontains(body.current_thread.text, "made by 1Password")
    or strings.icontains(body.current_thread.text,
                         "1Password is a trademark of AgileBits"
    )
    or regex.icontains(body.current_thread.text,
                       '©\s*20[0-9]{2}\s*(?:1Password|AgileBits\s*Inc\.?)'
    )
    or (
      strings.icontains(body.current_thread.text, "1Password")
      and strings.icontains(body.current_thread.text, "4711 Yonge St")
    )
  )
  and not any(ml.nlu_classifier(body.current_thread.text).topics,
              .name in ("Events and Webinars", "Newsletters and Digests")
              and .confidence == "high"
  )
  and not (
    sender.email.domain.root_domain in (
      "1password.com",
      "1password.eu",
      "1password.ca",
      "agilebits.com",
      "ashbyhq.com",
      "trelica.com",
      "atlassian.net"
    )
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Spoofing"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Sender analysis"
  - "Natural Language Understanding"
id: "9b671f8c-c180-5ed9-a60d-d9424aaf9c56"
