name: "Link: Browser fingerprinting detection with WebGL renderer queries"
description: "Detects links that contain WebGL debug renderer information queries commonly used for browser fingerprinting and reconnaissance. This technique allows attackers to gather detailed information about the target's graphics hardware and browser configuration."
type: "rule"
severity: "low"
source: |
  type.inbound
  and 0 < length(body.links) < 15
  and length(recipients.to) == 1
  and recipients.to[0].email.domain.valid
  and any(body.links,
          regex.icontains(ml.link_analysis(., mode="aggressive").final_dom.raw,
                          // WEBGL checks for commonly utilized for browser fingerprinting
                          '(?:UNMASKED_(?:VENDOR|RENDERER)_WEBGL|WEBGL_debug_renderer_info)'
          )
          and not regex.icontains(ml.link_analysis(.).effective_url.domain.root_domain,
                                  'box\.com'
          )
  )

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "Scripting"
detection_methods:
  - "URL analysis"
  - "URL screenshot"
  - "Javascript analysis"
