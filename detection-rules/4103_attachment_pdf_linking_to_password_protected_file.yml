name: "PR# 4103 - Adobe branded PDF file linking to a password-protected file from untrusted sender"
description: |
  Detects pdf files with links to a remotely hosted password-protected file. This is a common technique
  abused by Phishing actors as well as Malware actors (IcedID, Remcos, Async Rat)
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(attachments,
          .file_extension == "pdf"
          and any(file.explode(.),
                  any(ml.nlu_classifier(.scan.ocr.raw).intents,
                      .name == "cred_theft" and .confidence == "high"
                  )
                  and strings.icontains(.scan.ocr.raw, "password-protected")
                  and any(ml.nlu_classifier(.scan.ocr.raw).entities,
                          .name == "org" and .text == "Adobe"
                  )
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Encryption"
  - "Evasion"
  - "Impersonation: Brand"
  - "PDF"
detection_methods:
  - "Archive analysis"
  - "File analysis"
  - "Natural Language Understanding"
  - "Optical Character Recognition"
id: "86f77593-246d-50d3-8684-51429ba15111"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator
references:
