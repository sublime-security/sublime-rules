name: "PR# 4317 - Body: Fake conversation with spouse mention and video call request"
description: "Detects messages with fake thread history containing references to a spouse combined with requests for video calls using platforms like Zoom or Google Meet."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(body.previous_threads) >= 3
  and any(body.previous_threads,
          strings.icontains(.text, "call")
          and (
            strings.icontains(.text, "wife and i")
            or strings.icontains(.text, "husband and i")
          )
          and (
            (strings.icontains(.text, "zoom"))
            or (strings.icontains(.text, "google meet"))
          )
          and length(.text) < 1400
  )

attack_types:
  - "BEC/Fraud"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "5b7a2e34-fda0-5aa7-ac6a-2bdd2c91dc05"
tags:
