name: "PR# 4149 - Brand impersonation: Barracuda Networks"
description: |
  Impersonation of Barracuda Networks, an IT security company.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    strings.ilike(sender.display_name, '*barracuda*')
    or strings.ilevenshtein(sender.display_name, 'barracuda') <= 1
    or strings.ilike(sender.email.domain.domain, '*barracuda*')
  )
  and sender.email.domain.root_domain not in (
    'barracuda.com',
    'barracudamsp.com',
    'barracudanetworks.com',
    'netsuite.com',
  
    // hockey team
    'sharkssports.net',
    'sjbarracuda.com',
  
    // Barracuda Barcatering
    'barracuda-barcatering.de',
  
    // Barracuda Events Team
    'worldspan.co.uk',
  
    // Barracudas Day Camps
    'barracudas.co.uk',
  
    // BarracudaShoes
    'barracudashoes.it'
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Lookalike domain"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "b5bb66ba-f0de-52f0-8b35-2b2290665cea"
tags:
