name: "PR# 4711 - Attachment: DOCX with malicious document template artifacts"
description: "Detects inbound messages containing DOCX attachments with artifacts associated with malicious document templates."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "docx"),
          any(file.explode(.),
              any(.scan.yara.matches,
                  .name in ("malicious_docx_document_template_artifacts")
              )
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Exploit"
detection_methods:
  - "File analysis"
  - "YARA"
id: "5a05b83c-2d40-58d7-b952-a653d857443c"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4711