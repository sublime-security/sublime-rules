name: "Attachment: PDF with credential theft indicators and structured metadata fields"
description: "Detects single-page PDF attachments containing structured metadata fields (From, Subject, Date, Recipient, etc.) and credential theft language, indicating a potential credential harvesting document designed to mimic legitimate communication."
type: "rule"
severity: "medium"
source: |
  type.inbound
  // only a single pdf attachmet
  and length(attachments) == 1
  and any(attachments,
          .file_type == "pdf"
          // a single page pdf
          //
          // This rule makes use of a beta feature and is subject to change without notice
          // using the beta feature in custom rules is not suggested until it has been formally released
          //
          and beta.parse_exif(.).page_count == 1
          and any(file.explode(.),
                  .depth == 1
                  // three of the four table elements observed in the message
                  // these are exact matches when split on new lines extracted from the text of the PDF from the scanPDF scanner
                  and 3 of (
                    'From' in~ .scan.strings.strings,
                    'Subject' in~ .scan.strings.strings,
                    'Date' in~ .scan.strings.strings,
                    'Recipient' in~ .scan.strings.strings,
                    'Delivered' in~ .scan.strings.strings,
                    'Expires' in~ .scan.strings.strings,
                    'Reference' in~ .scan.strings.strings
                  )
                  // negate where there are no strings that have spaces
                  and not all(.scan.strings.strings,
                              not strings.icontains(., ' ')
                  )
          )
          and any(file.explode(.),
                  .depth == 0
                  and length(.scan.url.urls) == 1
                  and all(.scan.url.urls,
                          .domain.root_domain not in ('plateiq.com')
                  )
          )
          //
          // This rule makes use of a beta feature and is subject to change without notice
          // using the beta feature in custom rules is not suggested until it has been formally released
          //
          and any(ml.nlu_classifier(beta.ocr(.).text).intents,
                  .name == "cred_theft"
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "Content analysis"
  - "Exif analysis"
  - "File analysis"
