name: "PR# 4339 - Attachment: PDF With SAI Global ISO9001 Logo"
description: "Detects PDF attachments containing embedded SAI Global ISO9001 logos, which may indicate brand impersonation or fraudulent certification claims."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches,
                  // yara rule matches on an embedded SAI Global logo that allows for resized versions of the image
                  .name == "SAI_Global_ISO9001_Logo_PDF_Fuzzy"
              )
          )
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "a0846901-93c5-55d9-97d3-8f3710510c15"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_zoomequipd
references:
  - https://github.com/sublime-security/sublime-rules/pull/4339