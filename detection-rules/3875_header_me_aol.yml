name: "PR# 3875 - Targeting: Specific AOL address"
description: "Message targeting a specific AOL address (me@aol.com) with a single recipient."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(recipients.to) == 1
  and recipients.to[0].email.email == "me@aol.com"

attack_types:
  - "Spam"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Header analysis"
id: "5c3c79bd-60ca-5e50-af7d-3a992058dc58"
tags:
