name: "PR# 4161 - Link: .onion From Unsolicited Sender"
description: "Detects messages containing .onion (Tor network) links from senders that either lack proper DMARC authentication or are not from trusted domains."
type: "rule"
severity: "low"
source: |
  type.inbound
  and any(body.links, .href_url.domain.tld == "onion")
  // and the sender is not from high trust sender root domains
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
tags:
