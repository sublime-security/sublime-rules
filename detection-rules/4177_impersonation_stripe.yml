name: "PR# 4177 - Brand Impersonation: Stripe"
description: |
  Impersonation of Stripe, usually for credential theft.
type: "rule"
severity: "high"
source: |
  type.inbound
  and (
    (
      strings.replace_confusables(sender.display_name) =~ 'stripe'
      and not regex.icontains(sender.display_name, '^stripe$')
    )
    // fake stripe invoice in attached picture
    or (
      any(attachments,
          .file_type in $file_types_images
          and any(file.explode(.),
                  regex.icontains(.scan.ocr.raw, '\bstripe\b')
                  and not regex.icontains(.scan.ocr.raw,
                                          '(?:via Stripe|partners with Stripe|invoice\.stripe\.com|Stripe (?:Customer Portal|(?:Pro )?Subscription)|Perplexity|@stripe\.com|pay\.stripe\.com|stripe processing fees|Stripe to provide invoicing)'
                  )
                  and any(ml.nlu_classifier(.scan.ocr.raw).intents,
                          .name in ("callback_scam")
                          and .confidence in ("medium", "high")
                  )
          )
      )
    )
    or 2 of (
      strings.icontains(body.current_thread.text, 'The Stripe Team'),
      strings.icontains(sender.display_name, 'Stripe'),
      regex.icontains(subject.base, 'payout.{0,5}paused'),
      regex.icontains(subject.base, 'res(?:ume|tore).{0,5}payout'),
      regex.icontains(body.current_thread.text, 'payout.{0,5}paused'),
      regex.icontains(body.current_thread.text, 'res(?:ume|tore).{0,5}payout'),
      regex.icontains(body.current_thread.text, 'customer.{0,5}chargeback'),
      regex.icontains(body.current_thread.text, 'exposed.{0,5}api'),
      regex.icontains(body.current_thread.text, 'secret key has been created'),
      regex.icontains(body.current_thread.text,
                      'We don\x27t recognize the device that was just used to sign in'
      ),
      regex.icontains(body.current_thread.text, 'suspicious.{0,5}payment')
    )
  )
  and (
    sender.email.domain.root_domain not in~ (
      'stripe.com',
      'stripetour.com',
      'stripe-club.com',
      'shopify.com'
    )
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
  and sender.email.email not in $recipient_emails
  
  // Stripe adds a custom header
  // don't match messages with the header
  and not any(headers.hops, any(.fields, .name == "X-Stripe-EID"))
  
  // msg negations
  and not regex.icontains(body.current_thread.text,
                          '(?:Stripe (?:Local|Dashboard|University|Commons)|marked as paid by Stripe)'
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Lookalike domain"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "2dde18de-c20a-5f23-9b6c-25470cb91e64"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_hadojae
