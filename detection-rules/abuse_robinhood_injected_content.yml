name: "Abuse: Robinhood injected content"
description: "Detects messages from Robinhood with injected data into the 'Device' field. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "noreply@robinhood.com"
  and strings.contains(body.current_thread.text, "Your recent login to Robinhood")
  and any(html.xpath(body.html, '//div/ul/li[contains(., "Device:")]').nodes, 
      length(.raw) > 500
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "HTML analysis"
  - "Sender analysis"
