name: "Link: Credential theft with new domain and suspicious indicators"
description: "Detects messages containing links to newly registered domains that exhibit credential theft characteristics."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links, network.whois(.href_url.domain).days_old <= 365)
  // nlu classifier to find cred-theft emails
  and (
    any(ml.nlu_classifier(body.current_thread.text).intents,
        .name == "cred_theft" and .confidence == "high"
    )
    or any(ml.nlu_classifier(body.current_thread.text).intents, .name != "benign")
    or any(ml.nlu_classifier(body.current_thread.text).entities,
           .name in ("request", "urgency", "financial")
    )
  )
  and not (
    any(ml.nlu_classifier(body.current_thread.text).topics,
        .name in ("Educational and Research", "Newsletters and Digests")
    )
  )
  // negate - senders (not in trusted root domains)
  and not (
    sender.email.domain.root_domain in $high_trust_sender_root_domains
    or sender.email.email == "mailer-daemon@googlemail.com"
  )
  
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Impersonation: Brand"
detection_methods:
  - "Sender analysis"
id: "df724c00-a6c6-59f9-9438-30cce82bd1dd"
