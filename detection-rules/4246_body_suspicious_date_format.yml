name: "Body: Suspicious date format"
description: "Detects messages containing strage date formats observed in phishing emails."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(body.current_thread.text,
                      'Date:\s(?:Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday)\s(?:January|February|March|April|May|June|July|August|September|October|November|December)\s202(?:5|6|7|8|9)'
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Spoofing"
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "cbc06de1-d99a-562c-86e1-94ff20225c40"
og_id: "36344c62-7437-5737-8f57-e509648fa2ae"
