name: "Body HTML: AI-generated credential theft with systematic web template indicators"
description: "Detects credential theft messages containing HTML with multiple indicators of AI-generated web templates, including systematic CSS patterns, glassmorphism effects, template placeholders, AI-style code comments, and professional development practices that suggest automated content generation."
type: "rule"
severity: "high"
source: |
  type.inbound
  and not subject.is_reply
  and not subject.is_forward
  and 2 of (
    // css emoji in content property
    regex.icontains(body.html.raw, "content:\\s*[\"'][☁✓✔✕→\\+][\"']"),
    // perfect css reset with box-sizing
    (
      regex.icontains(body.html.raw,
                      "\\*\\s*,\\s*\\*::before\\s*,\\s*\\*::after\\s*\\{"
      )
      and strings.icontains(body.html.raw, "box-sizing: border-box")
      and strings.icontains(body.html.raw, "margin: 0")
    ),
    // glassmorphism effect (tres chic)
    (
      strings.icontains(body.html.raw, "backdrop-filter: blur(")
      or strings.icontains(body.html.raw, "-webkit-backdrop-filter: blur(")
    ),
    // systematic css custom properties
    (
      strings.icontains(body.html.raw, ":root {")
      and strings.icontains(body.html.raw, "--primary:")
      and strings.icontains(body.html.raw, "--primary-light:")
      and strings.icontains(body.html.raw, "--bg:")
      and strings.icontains(body.html.raw, "--text:")
    ),
    // SaaS pricing template structure
    (
      regex.icontains(body.html.raw, "class=[\"']pricing-grid[\"']")
      and regex.icontains(body.html.raw, "class=[\"']pricing-card[\"']")
      and (
        regex.icontains(body.html.raw, "class=[\"'][^\"']*featured")
        or strings.icontains(body.html.raw, "Most Popular")
      )
    ),
    // multiple placeholder hash links
    (
      regex.icontains(body.html.raw, "href=[\"']#[\"']")
      and not regex.icontains(body.html.raw, "href=[\"']https?://")
    ),
    // // contains ai-esque code comments like "as requested" and "replace x link"
    any(html.xpath(body.html, '//comment()').nodes,
        regex.icontains(.raw,
                        'keeping.{0,10}same|as.{0,10}requested|replace.{0,20}(?:url|link).{0,10}below|\(unchanged\)|New:.{0,20}(?:hero|navigation|footer)'
        )
    ),
    // gradient buttons with shadows
    (
      regex.icontains(body.html.raw, "background:\\s*linear-gradient")
      and regex.icontains(body.html.raw, "box-shadow:.*rgba\\(")
    ),
    // perfect camelCase function naming
    regex.icontains(body.html.raw,
                    "function\\s+(toggle|update|get|set)[A-Z][a-zA-Z]+\\s*\\("
    ),
    // inline calculation comments
    regex.icontains(body.html.raw,
                    "//.*\\b(rough|approx(?:imate)?).{0,20}\\b(avg|estimate|calculat)"
    ),
    // template placeholders left unfilled
    regex.icontains(body.html.raw, "##[A-Z_]+##")
  )
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "cred_theft" and .confidence != "low"
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "HTML analysis"
  - "Content analysis"
  - "Natural Language Understanding"
