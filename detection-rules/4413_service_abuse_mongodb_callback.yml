name: "PR# 4413 - Service abuse: MongoDB Atlas callback scam"
description: "Detects inbound messages from MongoDB Atlas alert addresses that contain callback scam content identified through natural language analysis with medium or high confidence."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "mongodb-atlas-alerts@mongodb.com"
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "callback_scam" and .confidence != "low"
  ) 
attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Natural Language Understanding"
  - "Sender analysis"
id: "629f9ba6-914d-5401-8355-fae2e445c00b"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_markmsublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4413