name: "PR# 4198 - Attachment: ICS with employee policy review lure"
description: "Detects ICS calendar attachments containing references to 'policy review' and 'secure access' terminology, which may be used in social engineering attacks to prompt users to take action under the guise of compliance or security requirements."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments,
                 .file_type in~ ('ics')
                 or .content_type in ("text/calendar", "application/ics")
          ),
          any(file.explode(.),
              .depth == 0
              and any(.scan.strings.strings,
                      strings.icontains(., 'policy review')
              )
              and any(.scan.strings.strings,
                      strings.icontains(., 'secure access')
              )
          )
  )

attack_types:
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "File analysis"
  - "Content analysis"
id: "6be49413-87b8-585b-9b79-104ad3b8ce5d"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_markmsublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4198