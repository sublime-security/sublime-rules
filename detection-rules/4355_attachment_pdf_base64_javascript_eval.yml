name: "PR# 4355 - Attachment: PDF with base64 JavaScript and eval functions"
description: "PDF attachment contains base64-encoded JavaScript variables with eval functions, indicating potential code obfuscation and execution techniques commonly used in malicious documents."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .depth == 0
              and any(.scan.yara.matches,
                      .name in ("pdf_b64_js_var_eval", "pdf_acro_js_functions", )
              )
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "PDF"
detection_methods:
  - "File analysis"
  - "Javascript analysis"
  - "YARA"
id: "9919f39e-6e3f-5508-b383-a787214953e6"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4355