name: "PR# 4079 - Attachment: PDF proposal with credential theft indicators"
description: "PDF attachment with 'proposal' in filename contains sender or recipient domain, credential theft language detected via OCR, and includes a single URL link."
type: "rule"
severity: "high"
source: |
  type.inbound
  and not (
    (subject.is_reply or subject.is_forward)
    and (length(headers.references) > 0 or headers.in_reply_to is not null)
  )
  and any(attachments,
          .file_type == "pdf"
          and strings.icontains(.file_name, 'proposal')
          and beta.parse_exif(.).page_count == 1
          // filename contains sender or recipient sld
          and (
            strings.icontains(.file_name, sender.email.domain.sld)
            or (
              length(recipients.to) == 1
              and any(recipients.to,
                      .email.domain.valid
                      and .email.email != sender.email.email
                      and strings.icontains(..file_name, .email.domain.sld)
              )
            )
          )
          // OCR is cred_theft
          and any(ml.nlu_classifier(beta.ocr(.).text).intents,
                  .name == "cred_theft"
          )
          // contains exactly one link on the root pdf
          and any(file.explode(.), .depth == 0 and length(.scan.url.urls) == 1)
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "File analysis"
  - "Natural Language Understanding"
  - "Optical Character Recognition"
  - "URL analysis"
