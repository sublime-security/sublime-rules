name: "PR# 4165 - Reconnaissance: Empty message"
description: "Detects incoming messages that are completely empty, containing no subject line, message body content, or file attachments. Such messages may be used for reconnaissance, delivery confirmation, or as part of multi-stage attacks."
type: "rule"
severity: "low"
source: |
  type.inbound
  and subject.base == ""
  and (
    body.plain.raw is null
    or body.plain.raw == ""
    or regex.imatch(body.plain.raw, '^\s*$')
  )
  and (
    body.html.raw is null
    or body.html.raw == ""
    or regex.imatch(body.html.raw, '^\s*$')
  )
  and length(attachments) == 0
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_renamed
attack_types:
  - "Spam"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
id: "41399de9-d930-5be1-9c64-d5ade4f0c9ce"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4165