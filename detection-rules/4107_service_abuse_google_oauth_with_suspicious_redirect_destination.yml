name: "PR# 4107 - Service abuse: Google OAuth with suspicious redirect destination"
description: "Detects messages containing Google OAuth links with prompt=none parameter that redirect to suspicious domains including free file hosts, free subdomain providers, or self-service creation platforms."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.domain == "accounts.google.com"
          and strings.istarts_with(.href_url.path, '/o/oauth2/v2/auth')
          and strings.icontains(.href_url.url, 'prompt=none')
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Free file host"
  - "Free subdomain host"
  - "Open redirect"
  - "Social engineering"
detection_methods:
  - "URL analysis"
  - "Threat intelligence"
id: "ecf179a2-e818-5a4a-b947-e9c3f2ec9ccb"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_hadojae
references:
  - https://github.com/sublime-security/sublime-rules/pull/4107