name: "PR# 3889 - Attachment: PDF with suspicious view document characteristics"
description: "PDF attachment contains suspicious characteristics commonly associated with document viewing lures, as detected by YARA pattern matching."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches,
                  .name == "view_document_pdf_characteristics"
              )
          )
  )
attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "File analysis"
  - "YARA"
id: "bc12d440-d912-5db1-815c-033bd0e056ac"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/3889