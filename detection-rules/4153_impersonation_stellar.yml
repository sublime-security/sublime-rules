name: "PR# 4153 - Brand impersonation: Stellar Development Foundation (SDF)"
description: |
  Attack impersonating Stellar Development Foundation (SDF).
references:
  - "https://www.stellar.org"
  - "https://cyberint.com/blog/research/phishing-for-lumens-a-stellar-stealing-campaign/"
  - https://github.com/sublime-security/sublime-rules/pull/4153
type: "rule"
severity: "low"
source: |
  type.inbound
  and regex.imatch(sender.display_name, '\bstellar\b')
  and sender.email.domain.root_domain != "stellar.org"
tags:
  - "Cryptocurrency"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Sender analysis"
id: "c6e91bb4-e1a6-5459-9c4f-3a0b9daed6b0"
