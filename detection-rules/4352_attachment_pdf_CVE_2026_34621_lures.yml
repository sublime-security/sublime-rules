name: "PR# 4352 - Attachment: PDF with CVE-2026-34621 lures"
description: "Detects PDF attachments containing YARA signatures associated with CVE-2026-34621's observed lures."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .depth == 0
              and any(.scan.yara.matches,
                      .name in ("pdf_cve_2026_34621_observed_lures", )
              )
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "208f6409-ae6d-51e7-8a05-4e7255f65d49"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4352