name: "PR# 4102 - Attachment: Office document with VSTO add-in"
description: |
  Recursively scans files and archives to detect Office documents with VSTO Add-ins.
type: "rule"
references:
  - "https://medium.com/@airlockdigital/make-phishing-great-again-vsto-office-files-are-the-new-macro-nightmare-e09fcadef010"
  - https://github.com/sublime-security/sublime-rules/pull/4102
severity: "high"
authors:
  - twitter: "vector_sec"
source: |
  type.inbound
  and any(attachments,
          (
            .file_extension in~ $file_extensions_macros
            or .file_extension in~ $file_extensions_common_archives
            or (
              .file_extension is null
              and .file_type == "unknown"
              and .content_type == "application/octet-stream"
              and .size < 100000000
            )
          )
          and any(file.explode(.),
                  .file_extension in~ (
                    "doc",
                    "docm",
                    "docx",
                    "dot",
                    "dotm",
                    "xls",
                    "xlsx",
                    "xlsm",
                    "xlm",
                    "xlsb",
                    "xlt",
                    "xltm",
                    "ppt",
                    "pptx",
                    "pptm",
                    "ppsm"
                  )
                  and any(.scan.exiftool.fields,
                          .key == "Tag_AssemblyLocation"
                          and strings.ilike(.value, "*.vsto*")
                          and not strings.ilike(.value, 'C:\Program Files*')
                          and not any($org_domains, strings.contains(..value, .))
                  )
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Scripting"
detection_methods:
  - "Archive analysis"
  - "Content analysis"
  - "Exif analysis"
  - "File analysis"
  - "Sender analysis"
  - "URL analysis"
