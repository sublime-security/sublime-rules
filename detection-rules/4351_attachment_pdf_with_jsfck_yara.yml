name: "PR# 4351 - Attachment: PDF with JSFck obfuscation"
description: "PDF attachment contains JavaScript obfuscated using JSFck encoding techniques. JSFck is a method of writing JavaScript code using only six characters: []()!+ which is often used to evade detection by security tools."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .depth == 0
              and any(.scan.yara.matches,
                      .name in ("pdf_jsfck_strings", "pdf_jsfck_ratio", )
              )
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "ba1e7e84-9e4c-519c-a932-7928ee3cc1cf"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4351