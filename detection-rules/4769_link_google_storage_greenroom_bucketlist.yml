name: "Link: Google Cloud Storage hosted credential harvesting page"
description: "Detects inbound messages containing links to Google Cloud Storage (storage.googleapis.com) that follow a pattern of randomized bucket paths ending in a hashed directory and an index.html file. These links have been observed in messages impersonating professional networking and HR platform notifications, such as those mimicking recruiting outreach or job opportunity alerts from services like Sloneek and BambooHR, luring recipients to hosted credential harvesting pages."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.domain == "storage.googleapis.com"
          and regex.icontains(.href_url.path,
                              '^\/([^-]+\-+)+[0-9a-f]{20}\/index\.html$'
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Free file host"
  - "Evasion"
  - "Social engineering"
  - "Impersonation: Brand"
detection_methods:
  - "URL analysis"
  - "Content analysis"
