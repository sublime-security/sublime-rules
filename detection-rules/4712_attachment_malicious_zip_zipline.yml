name: "PR# 4712 - Attachment: Malicious zip file matching zipline campaign"
description: "Detects inbound ZIP attachments containing content that matches observed artifacts from a ZipLine campaign reported on by Telekom Security."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "zip"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("zipline_delivery_telekom"))
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "LNK"
detection_methods:
  - "Archive analysis"
  - "YARA"
  - "Content analysis"
  - "Threat intelligence"
id: "e92a8beb-27b3-5168-903f-18c67445e52a"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4712