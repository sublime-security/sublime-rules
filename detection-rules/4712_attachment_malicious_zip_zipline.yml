name: "Attachment: Malicious zip file matching zipline campaign"
description: "Detects inbound ZIP attachments containing content that matches observed artifacts from a ZipLine campaign reported on by Telekom Security."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "zip"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("zipline_delivery_telekom"))
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "LNK"
detection_methods:
  - "Archive analysis"
  - "YARA"
  - "Content analysis"
  - "Threat intelligence"
id: "e92a8beb-27b3-5168-903f-18c67445e52a"
og_id: "ca3e4844-2c3a-50de-86f0-f5ddee14524b"
testing_pr: 4712
testing_sha: d9af14af86fa195304a1f222ab2a55a7077bf85c