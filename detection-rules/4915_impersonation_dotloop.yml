name: "PR# 4915 - Brand impersonation: Dotloop"
description: "Impersonation of Dotloop, a real estate transaction management platform."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    strings.ilike(sender.display_name, '*dotloop*')
    or strings.ilike(sender.email.domain.domain, '*dotloop*')
    or (
      // dotloop logo
      any(html.xpath(body.html, '//img').nodes,
          strings.icontains(.inner_text, 'dotloop')
      )
      and strings.contains(strings.replace_confusables(body.current_thread.text),
                           '(888)-DOTLOOP'
      )
      and 3 of (
        strings.contains(strings.replace_confusables(body.current_thread.text),
                         'DOTLOOP',
        ),
        strings.contains(strings.replace_confusables(body.current_thread.text),
                         '1301 Second Avenue',
        ),
        strings.contains(strings.replace_confusables(body.current_thread.text),
                         'Floor 36',
        ),
        strings.contains(strings.replace_confusables(body.current_thread.text),
                         'Seattle, WA 98101'
        )
      )
    )
  )
  and sender.email.domain.root_domain not in~ ('dotloop.com', 'showingtime.com')
  and (
    (
      profile.by_sender().prevalence in ("new", "outlier")
      and not profile.by_sender().solicited
    )
    or profile.by_sender().any_messages_malicious_or_spam
  )
  and not profile.by_sender().any_messages_benign

  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "ec1b57dc-eb08-5eeb-8f55-ddf95adde178"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_D-Bolton
references:
  - https://github.com/sublime-security/sublime-rules/pull/4915