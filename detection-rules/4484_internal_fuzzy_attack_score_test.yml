name: "PR# 4484 - Test - Internal fuzzy attack score graymail"
description: |
  Test rule that runs internal.fuzzy_attack_score_test on inbound messages
  and flags when the response sets graymail to true.
type: "rule"
severity: "informational"
source: |
  type.inbound
  and any([internal.fuzzy_attack_score_test()],
          .analyzed and .verdict == "never_match_this_verdict"
  )
tags:
  - "test"
  - pr_author_dlynch-sublime
  - created_from_open_prs
  - rule_status_added
id: "6c6b8b4c-8be8-5bd3-833b-9f0856ca19e2"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4484