name: "Service abuse: Calendly callback scam detection"
description: "Detects inbound messages from Calendly's notification system that contain callback scam content, as identified through natural language processing with medium or high confidence levels."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.domain.root_domain == "calendly.com"
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "callback_scam" and .confidence != "low"
  )
attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Impersonation: Brand"
detection_methods:
  - "Natural Language Understanding"
  - "Sender analysis"
id: "b5ad24a1-cc09-57ed-acaf-428fa721681b"
og_id: "646f5d81-c830-5122-9b73-283cc918373c"
testing_pr: 4886
