name: "BEC/Fraud: Fake family office investment solicitation from newly registered domains"
description: "Detects inbound messages from domains less than 180 days old that solicit investment interest from named organizations or individuals on behalf of a purported private family office, with deal sizes framed in a consistent $2M–$35M range. Senders use newly registered .biz domains with financial-sounding names and rotate first names and target company names while keeping the subject line structure nearly identical. The outreach is designed to appear as a legitimate investment inquiry to bait a response."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and network.whois(sender.email.domain).days_old < 180
  and regex.contains(body.current_thread.text, '\$\d{1,2}[-–—]\$\d{1,2}M')
attack_types:
  - "BEC/Fraud"
  - "Spam"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Sender analysis"
  - "Whois"
id: "e28e1597-6a89-562e-b1e9-e551c5ac4fdd"
