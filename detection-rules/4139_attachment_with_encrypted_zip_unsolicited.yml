name: "PR# 4139 - Attachment with encrypted zip"
description: |
  Recursively scans files and archives to detect encrypted zip files.
references:
  - "https://www.zdnet.com/article/this-phishing-email-contains-a-password-protected-file-dont-open-it/"
  - https://github.com/sublime-security/sublime-rules/pull/4139
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(attachments,
          (.file_type == "zip" or .file_extension == "zip")
          and any(file.explode(.), any(.flavors.yara, . == 'encrypted_zip'))
  )
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "Encryption"
detection_methods:
  - "Archive analysis"
  - "File analysis"
  - "Sender analysis"
id: "e869a66e-7962-58a3-a696-bbd880d82bdf"
