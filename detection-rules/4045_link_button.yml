name: "PR# 4045 - Link: Suspicious button styling with specific padding and border radius"
description: "Detects messages containing links styled as buttons with specific CSS properties including 18px 70px padding and 50px border radius, commonly used in malicious messages to create convincing call-to-action buttons."
type: "rule"
severity: "low"
source: |
  type.inbound
  and any(html.xpath(body.html,
                     '//a[contains(@style, "padding:18px 70px;") and contains(@style, "border-radius:50px")]'
          ).nodes,
          length(.links) > 0
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "HTML analysis"
  - "Content analysis"
id: "bf3f0f5b-0d50-5e32-9d02-4e105bbd1628"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4045