name: "Attachment: PDF With W9 Tax Form Indicators"
description: "TESTING RULE: This rule is to test the update to the yara rule included, which will then replace the existing yara rule. This rule should not be merged into the core feed. Detects PDF attachments containing W9 tax form patterns that may be used for social engineering attacks targeting tax-related information."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"), 
      any(file.explode(.),
          any(.scan.yara.matches, .name == "TESTING_w9_pdf_01")
      )
  )

attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
detection_methods:
  - "File analysis"
  - "YARA"
