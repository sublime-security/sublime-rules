name: "Attachment: QR code linking to Cloudflare Turnstile verification"
description: "Detects attachments containing QR codes that link to Cloudflare's Turnstile verification service, which may be used to bypass security measures or redirect users to malicious content after completing the verification challenge."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(recipients.to) == 1
  and recipients.to[0].email.domain.valid
  and any(attachments,
          // Office documents
          .file_extension in $file_extensions_macros
          and any(file.explode(.),
                  .scan.qr.type == "url"
                  and regex.icontains(ml.link_analysis(.scan.qr.url).final_dom.raw,
                                      'challenges\.cloudflare\.com/turnstile/v0/api\.js'
                  )
          )
          or (
            // pdf or images
            (
              .file_type == "pdf" or .file_type in $file_types_images
            )
            //
            // This rule makes use of a beta feature and is subject to change without notice
            // using the beta feature in custom rules is not suggested until it has been formally released
            //
            and any(beta.scan_qr(.).items,
                    .type is not null
                    and regex.icontains(ml.link_analysis(.url).final_dom.raw,
                                        'challenges\.cloudflare\.com/turnstile/v0/api\.js'
                    )
            )
          )
  )

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "QR code"
  - "Evasion"
detection_methods:
  - "QR code analysis"
  - "File analysis"
  - "Archive analysis"
  - "URL analysis"
  - "Threat intelligence"
