name: "PR# 3994 - Attachment: Embedded PDF icon with inline image reference"
description: "Detects messages containing HTML with PDF icons that reference inline images using Content-ID (CID) patterns, commonly used to create misleading PDF attachment appearances without actual PDF files."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(html.xpath(body.html, '//img').nodes) == 1
  and any(html.xpath(body.html, '//img[@alt="PDF"]').nodes,
          regex.contains(.raw, 'src="cid:image[0-9]{3}\.png@')
  )
attack_types:
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
  - "Image as content"
detection_methods:
  - "HTML analysis"
  - "Content analysis"
id: "2555f652-4917-5ff2-8dc0-384ba9734ccd"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/3994