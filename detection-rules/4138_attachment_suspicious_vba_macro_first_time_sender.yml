name: "PR# 4138 - Suspicious VBA macros from untrusted sender"
description: |
  Detects any VBA macro attachment that scores above a medium confidence threshold in the Sublime Macro Classifier.
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(attachments,
          (
            .file_extension in~ $file_extensions_macros
            or (
              .file_extension is null
              and .file_type == "unknown"
              and .content_type == "application/octet-stream"
              and .size < 100000000
            )
          )
          and ml.macro_classifier(.).malicious
          and ml.macro_classifier(.).confidence in ("high")
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Macros"
detection_methods:
  - "File analysis"
  - "Macro analysis"
id: "301db0a0-633d-52c5-a0af-115dcae38ddd"
tags:
