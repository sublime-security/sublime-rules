name: "PR# 4656 - Body: Yellow highlighted text markers"
description: "Detects messages containing multiple HTML span elements with yellow background highlighting (rgb(255, 241, 0)) and data-markjs attributes, potentially indicating evasion techniques through visual markup manipulation."
type: "rule"
severity: "low"
source: |
  type.inbound
  and regex.icount(body.html.raw,
                   '<span[^>]*data-markjs="true"[^>]*background-color:\s*rgb\(255,\s*241,\s*0\)[^>]*>[^<]'
  ) >= 2
attack_types:
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "HTML analysis"
  - "Content analysis"
id: "ecb8c480-5817-589f-a9fd-4c464873a969"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_IndiaAce
references:
  - https://github.com/sublime-security/sublime-rules/pull/4656