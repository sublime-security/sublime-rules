name: "Spam: Firebase password reset from suspicious sender"
description: "Detects Firebase password reset messages from suspicious senders that may be attempting to abuse the Firebase authentication service."
type: "rule"
severity: "low"
source: |
  type.inbound
  and (
    sender.email.domain.root_domain == "firebaseapp.com"
    or not coalesce(headers.auth_summary.dmarc.pass, false)
  )
  and length(filter(body.links,
                    .href_url.domain.root_domain not in ("aka.ms")
                    and .href_url.path is not null
             )
  ) == 1
  and any(body.links,
          .href_url.domain.domain == sender.email.domain.domain
          and .href_url.path == "/__/auth/action"
          and any(.href_url.query_params_decoded["mode"], . == "resetPassword")
  )
tags:
  - "Attack surface reduction"
attack_types:
  - "Credential Phishing"
  - "Spam"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
  - "URL analysis"
