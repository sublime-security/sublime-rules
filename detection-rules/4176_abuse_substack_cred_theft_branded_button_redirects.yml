name: "PR# 4176 - Service abuse: Substack credential theft with confusable characters and branded button redirects"
description: "Detects messages from Substack that use confusable characters in the sender display name, contain purple buttons or typical button classes that redirect to non-Substack domains, and include credential theft content with urgency indicators."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.domain.root_domain == 'substack.com'
  and sender.display_name != strings.replace_confusables(sender.display_name)
  // substack-branded elements pointing to non-substack domains
  and any(filter(html.xpath(body.html, '//a[@href]').nodes,
                 // purple button or typical button classes
                 (
                   strings.icontains(.raw, 'background-color: #7c3aed')
                   or strings.icontains(.raw, 'background-color:#7c3aed')
                   or strings.icontains(.raw, 'class="button')
                   or strings.icontains(.raw, 'bgcolor="#7c3aed"')
                 )
          ),
          // rewrites to non-Substack domain
          any(.links, .href_url.domain.root_domain not in~ ('substack.com'))
  )
  // cred theft with urgency
  and (
    any(ml.nlu_classifier(body.current_thread.text).intents,
        .name == "cred_theft" and .confidence != "low"
    )
    and any(ml.nlu_classifier(body.current_thread.text).entities,
            .name == "urgency"
    )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "Sender analysis"
  - "HTML analysis"
  - "Natural Language Understanding"
  - "URL analysis"
