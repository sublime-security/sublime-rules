name: "PR# 4118 - Service abuse: Microsoft Power Automate callback scam impersonation"
description: "Detects callback scam attempts using the legitimate Microsoft Power Automate service email address with high-confidence callback scam language in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == 'flow-noreply@microsoft.com'
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "callback_scam" and .confidence != "low"
  )

attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Out of band pivot"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "Sender analysis"
id: "ad1aa21f-8469-5743-b78d-af624b629495"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_markmsublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4118