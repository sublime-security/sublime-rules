name: "PR# 4622 - Attachment: Encrypted PDF With Credential Harvesting Indicators"
description: "Detects encrypted PDF attachments containing patterns and indicators commonly associated with credential harvesting operations, identified through YARA signature analysis."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_encrypted_cred_phish_001"))
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Encryption"
  - "Evasion"
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "9da1afe0-0b19-59d4-897b-de6787d45774"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4622