name: "PR# 4749 - Attachment: PDF with W-9 form indicators"
description: "Detects inbound messages containing PDF attachments that match structural or signature patterns consistent with specific W-9 tax lure activity sets."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches,
                  .name in ("w9_c001_signatures", "w9_c001_structure")
              )
          )
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
  - "Impersonation: Brand"
detection_methods:
  - "YARA"
  - "File analysis"
  - "Content analysis"
id: "d019a86b-1131-54c8-8d7b-1fa390a5e94d"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
