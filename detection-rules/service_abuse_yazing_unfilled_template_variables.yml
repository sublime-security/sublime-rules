name: "Service abuse: Yazing with unfilled template variables"
description: "Detects messages using the Yazing service that contain unfilled template variables such as {Domainrealname}, {activation_token}, {username}, {company_address}, {document_url}, or #Domain#, combined with common lure language related to signatures, remittances, documents, reviews, or access requests."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and 2 of (
    // variables observed unfilled
    strings.icontains(body.html.display_text, '{Domainrealname}'),
    strings.icontains(body.html.display_text, '{activation_token}'),
    strings.icontains(body.html.display_text, '{username}'),
    strings.icontains(body.html.display_text, '{company_address}'),
    strings.icontains(body.html.display_text, '{document_url}'),
    strings.icontains(body.current_thread.text, '#Domain#'),
    // common lure strings
    regex.icontains(subject.base,
                    '(?:Signature|Remittance|Document|Review|Needed|Access)'
    ),
    regex.icontains(body.html.display_text,
                    '(?:Signature|Remittance|Document|Review|Needed|Access)'
    )
  )
  // yazing service
  and regex.icontains(body.html.display_text, '\bYazing\b')

attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
