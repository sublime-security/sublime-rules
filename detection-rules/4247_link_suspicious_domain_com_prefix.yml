name: "PR# 4247 - Link: Suspicious domain structure with com- prefix"
description: "Detects messages containing links with suspicious domain structures that start with 'com-' and contain '.com-' within the domain name, which may indicate domain spoofing or typosquatting tactics."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          strings.starts_with(.display_url.domain.root_domain, "com-")
          and strings.contains(.display_url.domain.domain, ".com-")
          and length(.display_url.domain.subdomain) > 3
          and not .display_url.domain.tld in ("png", "jpg", "gif", "pdf")
          and not strings.contains(.display_url.url, "@")
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Lookalike domain"
  - "Spoofing"
detection_methods:
  - "Content analysis"
id: "4137aabd-1f3c-5121-b102-310bbb7c2752"
tags:
