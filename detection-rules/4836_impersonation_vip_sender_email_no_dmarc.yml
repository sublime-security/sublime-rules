name: "Impersonation: VIP sender email without DMARC authentication"
description: "Detects inbound messages where the sender's email address matches a known organizational VIP but fails DMARC authentication. Flags messages from both org and non-org domains that spoof VIP identities, while excluding trusted senders that pass DMARC verification."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any($org_vips,
          sender.email.email == .email and not headers.auth_summary.dmarc.pass
  )
  // negate org domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $org_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $org_domains
  )
  
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )

attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Impersonation: VIP"
  - "Spoofing"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
