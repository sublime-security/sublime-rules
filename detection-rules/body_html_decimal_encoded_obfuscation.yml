name: "Body: HTML decimal encoded obfuscation"
description: "Message body contains HTML decimal encoded characters used to obfuscate text content, with multiple distinct encoded characters found in HTML elements like spans, links, or titles. This technique is commonly used to bypass text-based security filters."
type: "rule"
severity: "medium"
source: |
  type.inbound
  // html source needs to contain 3 or more groups of 10 or more html decimal encoded characters
  and regex.count(body.html.raw, '>(?:\s*&#[a-fA-F0-9]{2,4};\s*){10,}<') >= 3
  // and the page should not have 3 or more groups that consist of only 4 char elements
  and not regex.count(body.html.raw, '>(?:\s*&#[a-fA-F0-9]{4};\s*){10,}<') >= 3
  // html source needs to contain html decimal encoded chars in certain fields, but they cant all be the same character
  and (
    any(regex.extract(body.html.raw,
                      '<(?:span|a href|title|br|strong)[^>]*>((?:\s*&#[a-fA-F0-9]{2,4};){5}[^<]*)<'
        ),
        length(distinct(map(regex.extract(.groups[0], '&#[a-fA-F0-9]{2,4};'),
                            .full_match
                        )
               )
        ) > 1
    )
    // html decimal encoded microsoft string
    or regex.icontains(body.html.raw,
                       '&#77;\s*&#105;\s*&#99;\s*&#114;\s*&#111;\s*&#115;\s*&#111;\s*&#102;\s*&#116;'
    )
  )
  // not a hidden span containing the html decimal encoded chars
  and not regex.icontains(body.html.raw,
                          // decimal encoded strings in various html field
                          '<span[^>]*hidden[^>]*>(?:\s*&#[a-fA-F0-9]{2,4};){5}[^<]*<'
  )

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
  - "HTML smuggling"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
id: "edd51f50-bf43-5df8-883c-c2bcdb1cb0ef"
