name: "PR# 4758 - Link: Unformatted template with literal {domain} placeholder in mailto link"
description: "Detects inbound messages containing mailto links where the href URL still contains an unresolved '{domain}' placeholder, indicating the sender used a template but failed to substitute the actual domain value before sending."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.scheme == "mailto"
          and strings.icontains(.href_url.url, '{domain}')
  )
tags:
  - "Attack surface reduction"
  - pr_author_zoomequipd
  - created_from_open_prs
  - rule_status_added
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "URL analysis"
  - "Content analysis"
id: "1a23141c-40fd-506a-97ba-7a2197abd420"
references:
