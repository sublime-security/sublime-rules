name: "Link: Unformatted template with literal placeholder in mailto link"
description: "Detects inbound messages containing mailto links where the href URL still contains an unresolved template placeholder ('{domain}', '{email}', or '{RECIPIENT_EMAIL}', matched case-insensitively and allowing internal whitespace), indicating the sender used a template but failed to substitute the actual value before sending."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.scheme == "mailto"
          and regex.icontains(.href_url.url,
                              '{\s*(?:domain|email|RECIPIENT_EMAIL)\s*}'
          )
  )
tags:
  - "Attack surface reduction"
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "URL analysis"
  - "Content analysis"
