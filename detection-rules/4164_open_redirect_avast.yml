name: "PR# 4164 - Open redirect: Avast"
description: "Detects emails containing links to avast.com leveraging an open redirect"
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.root_domain == "avast.com"
          and strings.contains(.href_url.query_params,
                               "DisplayRedirectCustomPage"
          )
  )
  and sender.email.domain.root_domain != "avast.com"
attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Open redirect"
detection_methods:
  - "Sender analysis"
  - "URL analysis"
id: "8e59b77f-309c-56c2-812a-a5577d9f0225"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator
references:
  - https://github.com/sublime-security/sublime-rules/pull/4164