name: "PR# 4106 - Link: Non-standard port 8443 in display URL"
description: "Detects links containing port 8443 in the display URL, which may indicate suspicious redirect or hosting infrastructure."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          strings.contains(.display_url.url, ':8443')
          and network.whois(.href_url.domain).days_old <= 365
  )
attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "URL analysis"
id: "4604ca32-8f37-5c0f-bc3e-65b27c256356"
tags:
