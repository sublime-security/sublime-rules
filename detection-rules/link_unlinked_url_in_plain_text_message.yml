name: "Link: Unlinked URL in plain text message"
description: "Detects messages containing a single link but with additional unlinked URLs present in plain text, potentially indicating evasion tactics or malformed messages."
type: "rule"
severity: "low"
source: |
  type.inbound
  // one link in email
  and length(body.links) == 1
  // no html 
  and body.html.raw is null
  // contains unlinked url
  and regex.icontains(body.current_thread.text, 'https?:\/\/')

attack_types:
  - "Credential Phishing"
  - "Spam"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "Content analysis"
