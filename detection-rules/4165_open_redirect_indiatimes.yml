name: "PR# 4165 - Open redirect: IndiaTimes"
description: |
  Message contains use of the IndiaTimes open redirect. This has been exploited in the wild.
references:
  - "https://www.strongestlayer.ai/India-Times-Hosting-Redirect-to-Newly-Discovered-Microsoft-Phishing-Site"
  - https://github.com/sublime-security/sublime-rules/pull/4165
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.root_domain == "indiatimes.com"
          and strings.icontains(.href_url.path, '/etl.php')
          and strings.icontains(.href_url.query_params, 'url=')
          // don't match on redirects to indiatimes.com
          and not regex.icontains(.href_url.query_params,
                                  'url=[^\&]+\.indiatimes\.com\b'
          )
  )
  
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Open redirect"
detection_methods:
  - "Sender analysis"
  - "URL analysis"
id: "3e976dd2-d403-5950-aee3-078e89aeb987"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator