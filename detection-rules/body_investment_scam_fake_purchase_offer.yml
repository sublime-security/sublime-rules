name: "Body: Investment scams fake purchase offer"
description: "Matching fake purchase offers/investment scams."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and strings.icontains(subject.base, "Offer to Purchase")
  and strings.icontains(body.plain.raw,
                        "private equity",
                        "acquiring companies",
                        "discuss the opportunity"
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "b79e655b-5b3f-5857-9849-39de16937a51"
