name: "PR# 4585 - Attachment: Adobe Sign lure PDF with embedded banner images"
description: "Detects inbound messages containing PDF attachments that contain embedded banner images mimicking Adobe Sign branding, commonly used to deceive recipients into believing the document is legitimate."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name == 'adobe_sign_lure_banner_images')
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
  - "Impersonation: Brand"
detection_methods:
  - "File analysis"
  - "YARA"
id: "4eda82eb-9a83-5422-9052-981ebf3be012"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_zoomequipd
references:
  - https://github.com/sublime-security/sublime-rules/pull/4585