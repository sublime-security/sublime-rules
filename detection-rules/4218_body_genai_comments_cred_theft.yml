name: "Body HTML: Suspected AI-generated HTML comments and styled buttons"
description: "Detects inbound messages containing AI-generated HTML comments with telltale patterns like 'as requested' and 'replace link', along with styled button elements and content classified as credential theft. The rule identifies HTML comments that follow AI coding patterns and exclude legitimate Microsoft Outlook conditional comments."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(body.previous_threads) == 0
  and (
    any(html.xpath(body.html, '//comment()').nodes,
        // contains ai-esque code comments like "as requested" and "replace x link"
        regex.icontains(.raw,
                        'keeping.{0,10}same|as.{0,10}requested|replace.{0,20}(?:url|link|below)|\(unchanged\)|new:|replace'
        )
    )
    or (
      // has 4 or more title-cased comments
      length(filter(html.xpath(body.html, '//comment()').nodes,
                    regex.contains(.raw, '<!--\s*[A-Z]')
             )
      ) >= 4
      // and contains suspect strings
      and strings.icontains(body.current_thread.text, 'unique to you')
    )
  )
  // contains a button
  and any(html.xpath(body.html, '//a[@style]').nodes,
          regex.icontains(.raw, 'padding') and regex.icontains(.raw, 'background')
  )
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name in ("cred_theft") and .confidence != "low"
  )
  // negate if-mso
  and not any(html.xpath(body.html, '//comment()').nodes,
              strings.icontains(.raw, '[if')
  )
tags:
  - "Attack surface reduction"
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "HTML analysis"
  - "Natural Language Understanding"
  - "Content analysis"
