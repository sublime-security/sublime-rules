name: "PR# 4164 - Link: Webflow link from untrusted sender"
description: "This detection rule matches on messaging containing at least one link to webflow.io from an untrusted sender. Webflow.io provides a free plan enabling users to create custom websites and file hosting. This services has been abused by threat actors to host landing pages directing victims to a next stage of credential phishing."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          // webflow link
          .href_url.domain.root_domain == 'webflow.io'
          and .href_url.domain.subdomain != ""
          and .href_url.domain.subdomain != "www"
          and .href_url.path == "/"
  )
  
  // not from high trust sender root domains
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Free file host"
  - "Free subdomain host"
detection_methods:
  - "Content analysis"
  - "URL analysis"
  - "Sender analysis"
id: "bdd7be47-62e9-5757-8c87-4f960cc2d6e7"
