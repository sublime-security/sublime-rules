name: "PR# 4524 - Service abuse: Elastic alerts extortion"
description: "Detects inbound messages impersonating Elastic alerts sender that contain extortion content identified through natural language processing with medium to high confidence."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "noreply@alerts.elastic.co"
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "extortion" and .confidence != "low"
  )
attack_types:
  - "Extortion"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Natural Language Understanding"
  - "Sender analysis"
id: "3d85ff11-73fe-500b-8c4c-19937e6c6053"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_JFarina5
references:
  - https://github.com/sublime-security/sublime-rules/pull/4524