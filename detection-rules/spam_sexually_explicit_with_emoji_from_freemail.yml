name: "Sexually explicit content with emoji in subject from freemail provider"
description: "Detects messages from free email providers that contain sexually explicit content and include emojis in the subject line."
type: "rule"
severity: "low"
source: |
  type.inbound
  // sender is a freemail domain
  and sender.email.domain.root_domain in $free_email_providers
  // look for an emoji in the subject
  and regex.icontains(subject.subject,
                      '[\x{1F300}-\x{1F5FF}\x{1F600}-\x{1F64F}\x{1F680}-\x{1F6FF}\x{1F700}-\x{1F77F}\x{1F780}-\x{1F7FF}\x{1F900}-\x{1F9FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}\x{2300}-\x{23FF}]'
  )
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name == 'Sexually Explicit Messages'
  )

attack_types:
  - "Spam"
tactics_and_techniques:
  - "Free email provider"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "Natural Language Understanding"
  - "Sender analysis"