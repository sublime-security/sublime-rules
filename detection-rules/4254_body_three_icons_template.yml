name: "HTML table with Flaticon CDN images"
description: "Detects HTML content containing a table structure with three columns and three image elements, where images are hosted on Flaticon's CDN and contain 'Icon' in their alt text or content. Observed in templated phishing messages."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(html.xpath(body.html,
                     '//table//tr[count(td) = 3 and count(td/div/img) = 3]//img'
          ).nodes,
          strings.contains(.raw, "cdn-icons-png.flaticon.com")
          and strings.contains(.inner_text, " Icon")
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Image as content"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
id: "92d1d817-78b1-5247-9c38-8c6b3e5dc9f8"
og_id: "def156a0-b717-5897-a0e2-935e07c789ec"
