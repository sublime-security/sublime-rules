name: "PR# 4165 - Open redirect: emlakarsa"
description: |
  Message contains use of the emlakarsa open redirect. This has been exploited in the wild.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.root_domain == "emlakarsa.net"
          and strings.icontains(.href_url.query_params, "_setLang")
          and strings.icontains(.href_url.query_params, "redirect=")
  )
  and sender.email.domain.root_domain != 'emlakarsa.net'
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Open redirect"
detection_methods:
  - "Sender analysis"
  - "URL analysis"
id: "8b4c057f-346d-5181-b56a-040a58346e94"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator
references:
  - https://github.com/sublime-security/sublime-rules/pull/4165