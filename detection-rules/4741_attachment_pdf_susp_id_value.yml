name: "PR# 4741 - Attachment: PDF with suspicious internal object reference identifier"
description: "Detects inbound messages containing PDF attachments with a specific internal object reference identifier pattern, which may indicate a crafted or malicious PDF file."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .depth == 0
              and any(.scan.strings.strings,
                      strings.contains(., "[<C57237C22450666518136DE404118E5E>")
              )
          )
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "Content analysis"
  - "File analysis"
id: "515a1c55-4b31-5eee-8701-3db9e0d33e94"
tags:
  - created_from_open_prs
