name: "PR# 4096 - Brand impersonation: Zoom with character-by-character span obfuscation"
description: "Detects messages that spell out 'Zoom' using individual HTML span elements for each character, a common obfuscation technique used to evade text-based detection while impersonating the Zoom brand."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(html.xpath(body.html,
                        '//span[text()="Z" and following-sibling::span[1][text()="o"] and following-sibling::span[2][text()="o"] and following-sibling::span[3][text()="m"]]'
             ).nodes
  ) > 0
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Impersonation: Brand"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
id: "2cde446a-01ce-55a6-96b8-63b074e867dc"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4096