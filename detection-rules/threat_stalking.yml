name: "Acts of Violence: Stalking and location-based threats"
description: "Detects stalking behavior and 'I know where you live' type threats."
type: "rule"
severity: "high"
source: |
  type.inbound
  and (
    // Find/hunt threats
    (
      regex.icontains(body.current_thread.text,
                      '(?:i|we)\s+(?:will|''ll|gonna|going to|am going to|shall|promise|swear)\s+(?:[^\r\n\x20]+\s+){0,5}(?:find|hunt|track|locate|come for|get to)\s+(?:[^\r\n\x20]+\s+){0,5}(?:you|them|everyone)'
      )
      and (
        // Can't hide/run/escape
        regex.icontains(body.current_thread.text,
                        '(?:can''t|cannot|won''t be able to)\s+(?:[^\r\n\x20]+\s+){0,5}(?:hide|run|escape|get away)'
        )
        // Or know where they are
        or regex.icontains(body.current_thread.text,
                           '(?:i|we)\s+(?:know|found|have)\s+(?:[^\r\n\x20]+\s+){0,5}(?:where you|your address|where you live|your location)'
        )
        // Or with violence
        or regex.icontains(body.current_thread.text,
                           '(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)'
        )
      )
    )
    // Coming for you/them
    or regex.icontains(body.current_thread.text,
                       '(?:i''m|i am|we''re|we are)\s+coming\s+(?:for|to get|after)\s+(?:[^\r\n\x20]+\s+){0,5}(?:you|them|everyone)'
    )
    // Hunt down language
    or regex.icontains(body.current_thread.text,
                       '(?:hunt|track|chase)\s+(?:[^\r\n\x20]+\s+){0,5}(?:you|them)\s+down'
    )
    // Find + violence
    or regex.icontains(body.current_thread.text,
                       '(?:when|once|after)\s+(?:i|we)\s+find\s+(?:[^\r\n\x20]+\s+){0,5}you\s*,?\s*(?:[^\r\n\x20]+\s+){0,5}(?:kill|die|hurt|attack|shoot|dead|over)'
    )
    // Specific location threats
    or regex.icontains(body.current_thread.text,
                       '(?:i|we)\s+(?:know|see|watch)\s+(?:[^\r\n\x20]+\s+){0,5}(?:where you|you live|your house|your (?:home|address|work|school|office))'
    )
    // Watching/following
    or (
      regex.icontains(body.current_thread.text,
                      '(?:i''m|i am|i have been|i''ve been)\s+(?:[^\r\n\x20]+\s+){0,5}(?:watching|following|tracking|stalking)\s+(?:[^\r\n\x20]+\s+){0,5}you'
      )
      and regex.icontains(body.current_thread.text,
                          '(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)'
      )
    )
    // Can't run/hide + threat
    or (
      regex.icontains(body.current_thread.text,
                      '(?:you|they)\s+(?:can''t|cannot|won''t)\s+(?:[^\r\n\x20]+\s+){0,5}(?:hide|run|escape)'
      )
      and regex.icontains(body.current_thread.text,
                          '(?:i|we)\s+(?:will|gonna|''ll)\s+(?:[^\r\n\x20]+\s+){0,5}(?:find|get|kill|hurt)'
      )
    )
  )
  and length(body.current_thread.text) > 50
  and length(body.current_thread.text) < 10000
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name == "Acts of Violence" and .confidence == "high"
  )
  
  // Negate benign contexts
  and not any(ml.nlu_classifier(body.current_thread.text).topics,
              .name in (
                "News and Current Events",
                "Newsletters and Digests",
                "Entertainment and Sports"
              )
              and .confidence == "high"
  )
id: "344938c7-e5e4-56eb-b812-3e56c0a32bf1"
