name: "PR# 4785 - Attachment: PDF Object Hash associated with a fake invoice and a W-9"
description: "Matching PDF Object Hash associated with a fake invoice followed by a W-9."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .scan.pdf_obj_hash.object_hash == "cc08b7eae4b6f5f4e897dd0998b90e21"
          )
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "File analysis"
  - "Threat Intelligence"
id: "16449792-ba26-52c2-a4e4-dc7749167c49"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_D-Bolton
references:
  - https://github.com/sublime-security/sublime-rules/pull/4785