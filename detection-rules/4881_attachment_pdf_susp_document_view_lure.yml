name: "Attachment: PDF with suspicious document view lure"
description: "Detects PDF attachments containing a title box designed to lure recipients into viewing a document, a common social engineering technique used to direct users to malicious content."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name == "pdf_view_doc_here_title_box")
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "YARA"
id: "d6af2af2-242c-51bf-9372-20b96b6317f1"
og_id: "c9a7ca6f-7291-5788-ba55-a965316d4fee"
testing_pr: 4881
testing_sha: 848d51b089f576d127791f9720bde0b7b14a1d3d