name: "BEC/Fraud: Targeting entire organization with suspicious indicators"
description: "Detects messages that target all employees, staff, and contain at least 2 suspicious indicators."
type: "rule"
severity: "low"
source: |
  type.inbound
  // Detect language indicating the message targets the entire organization
  and any([body.current_thread.text, subject.base],
          regex.icontains(., '(?:all|every) (?:employee|staff)')
  )
  // FP avoidance
  and not any(ml.nlu_classifier(body.current_thread.text).topics,
              .name in ('News and Current Events', 'Newsletters and Digests')
              and .confidence == 'high'
  )
  and not any(headers.hops,
              any(.fields,
                  .name == 'List-Unsubscribe-Post'
                  and .value == 'List-Unsubscribe=One-Click'
              )
  )
  and not (
    sender.email.domain.root_domain in ("tripadvisor.com")
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
  // At least 2 suspicious indicators
  and 2 of (
    // fake thread
    (
      (subject.is_forward or subject.is_reply)
      and (length(headers.references) == 0 and headers.in_reply_to is null)
    ),
    // Mismatched sender and reply to address with same display name
    (
      any(headers.reply_to,
          .display_name =~ sender.display_name
          and .email.email != sender.email.email
      )
    ),
    // W-2 mention
    (
      regex.icontains(subject.base, 'w-2', 'w_2', 'w2', 'w\x{2011}2')
      or strings.icontains(body.current_thread.text, 'w-2')
    ),
    // blank subject
    (
      subject.base is null or regex.imatch(subject.base, '\s*')
    ),
    // QR code link in attachment contains recipient email address
    (
      any(attachments,
          (
            .file_type in $file_types_images
            or .file_extension in $file_extensions_macros
            or .file_type == "pdf"
          )
          and any(filter(file.explode(.), .scan.qr.type == "url"),
                  any(recipients.to,
                      .email.domain.valid
                      and (
                        strings.icontains(..scan.qr.url.url, .email.email)
                        or any(strings.scan_base64(..scan.qr.url.url,
                                                   format="url"
                               ),
                               strings.icontains(., ..email.email)
                        )
                      )
                  )
          )
      )
    ),
    // kindly in current thread
    (
      strings.icontains(body.current_thread.text, 'kindly')
      and not any(ml.nlu_classifier(body.current_thread.text).intents,
                  .name == "benign" and .confidence == "high"
      )
    ),
    // new sender domain
    (
      network.whois(sender.email.domain).days_old < 30
    ),
    // linked domain is less than 30 days old
    (
      any(body.links, network.whois(.href_url.domain).days_old < 30)
    )
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Social engineering"
  - "Spoofing"
  - "QR code"
  - "Evasion"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "QR code analysis"
  - "Sender analysis"
  - "Whois"
