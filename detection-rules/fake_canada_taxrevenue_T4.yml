name: "Brand impersonation: Canada Revenue Agency with attachment"
description: "Detects messages impersonating the Canada Revenue Agency (CRA) with attachments, using common tax-related subjects in both English and French, and containing CRA-related content in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(sender.display_name, '(?:Canada Revenue Agency|\bCRA\b)')
  and (
    any(filter(attachments, .file_type == "pdf"),
        any(file.explode(.),
            .scan.pdf_obj_hash.object_hash in (
              "d78fe5b3970f3fc62903a9a718ad13b9",
              "e63a2fcd4f7c82df5e42e30cf5b18675",
              "242063f5800d21c276b1f9c904b32013",
              "7ef09f07baf4d959b980e5638424888b"
            )
            or any(.scan.url.urls, .domain.root_domain == 'vercel.app')
        )
    )
  )
  and length(attachments) == 1
    and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name in ("Reminders and Notifications", "Security and Authentication")
          and .confidence != "low"
  )
  and not (
    sender.email.domain.root_domain == 'cra-arc.gc.ca'
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )

attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
  - "PDF"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "Header analysis"
  - "Sender analysis"
id: "72607c4c-52dc-5df6-b547-54ee321b7a7a"
