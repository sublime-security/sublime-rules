name: "Brand impersonation: Canada Revenue Agency with attachment"
description: "Detects messages impersonating the Canada Revenue Agency (CRA) with attachments, using common tax-related subjects in both English and French, and containing CRA-related content in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(attachments) > 0
  and (
    regex.icontains(subject.subject, 'New mail from the Canada Revenue Agency*')
    or regex.icontains(subject.subject,
                       "Nouveau courrier de l'Agence du revenu du Canada*"
    )
    or regex.icontains(subject.subject, "T4 form*")
    or regex.icontains(subject.subject, "T4 slip*")
  )
  and regex.icontains(body.current_thread.text,
                      "Message Preview",
                      "Canada Revenue Agency",
                      "T4"
  )
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
  - "PDF"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "Header analysis"
  - "Sender analysis"
id: "72607c4c-52dc-5df6-b547-54ee321b7a7a"
