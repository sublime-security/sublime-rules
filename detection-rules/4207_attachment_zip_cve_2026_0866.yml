name: "PR# 4207 - Attachment: ZIP file with CVE-2026-0866 exploit"
description: "Detects ZIP attachments containing exploits targeting CVE-2026-0866 vulnerability through YARA signature matching."
type: "rule"
severity: "medium"
source: |
  any(filter(attachments, .file_type == "zip"),
      any(file.explode(.),
          any(.scan.yara.matches, .name in ("zip_cve_2026_0866"))
      )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Exploit"
  - "Evasion"
detection_methods:
  - "Archive analysis"
  - "File analysis"
  - "YARA"
id: "9b24446d-17ef-55ce-8fbb-0de7a5f05e1d"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4207