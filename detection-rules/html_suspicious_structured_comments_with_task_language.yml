name: "HTML: Suspicious structured comments with task language"
description: "Detects messages containing specific HTML comment markers for login buttons, account numbers, and next steps sections, along with references to tasks and operation teams in the body text."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and 4 of (
    strings.icontains(body.html.raw, '<!-- Login Button -->'),
    strings.icontains(body.html.raw, '<!-- End Login Button -->'),
    strings.icontains(body.html.raw, '<!-- Account Numbers -->'),
    strings.icontains(body.html.raw, '<!-- End Account Numbers -->'),
    strings.icontains(body.html.raw, '<!-- Next Steps -->'),
    strings.icontains(body.html.raw, '<!-- End Next Steps -->'),
    strings.icontains(body.html.raw, 'HU548G'),
    strings.icontains(body.html.raw, 'PO67565')
  )
  and strings.icontains(body.current_thread.text, 'task')
  and strings.icontains(body.current_thread.text, 'operation team')

attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "HTML smuggling"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
