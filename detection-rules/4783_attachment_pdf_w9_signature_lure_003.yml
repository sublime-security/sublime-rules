name: "PR# 4783 - Attachment: PDF with specific W-9 lure."
description: "Detects PDF attachments containing W-9 related lures. This one is looking for signatures that have been observed across multiple samples."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_w9_signature_c003"))
          )
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
detection_methods:
  - "File analysis"
  - "YARA"
id: "00524376-36cb-5b67-abe8-37d43d708725"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4783