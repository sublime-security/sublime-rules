name: "PR# 4094 - HTML: Hex token comment indicating campaign tracking"
description: "Detects HTML messages containing a 24-character hexadecimal token within HTML comments, either at the very beginning of the document or as the sole comment element. This pattern may indicate automated message generation or tracking mechanisms."
type: "rule"
severity: "low"
source: |
  type.inbound
  and (
    // 24-character hex token is the very first thing in HTML
    regex.icontains(body.html.raw, '^\s*<!--\s*[a-f0-9]{24}\s*-->')
    // exactly one comment and it's the hex token
    or (
      length(html.xpath(body.html, '//comment()').nodes) == 1
      and regex.icontains(html.xpath(body.html, '//comment()').nodes[0].raw,
                          '^<!--\s*[a-f0-9]{24}\s*-->$'
      )
    )
    or (
      // hex at the end of the html
      regex.icontains(body.html.raw,
                      '<!--\s*[a-f0-9]{24}\s*-->\s*(?:</\w+>\s*)*$'
      )
      // negate these advertising(?) campaigns containing mso checks in html comments like <!--[if mso]-->
      and not any(html.xpath(body.html, '//comment()').nodes,
                  strings.icontains(.raw, '[if')
      )
    )
  )
attack_types:
  - "Spam"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
