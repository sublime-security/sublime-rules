name: "NLU embedding vectors non-empty"
description: |
  Exercises vector generation for the nlu embedding function.
  Matches any inbound message where the NLU embedding vectors are non-empty.
type: "rule"
severity: "informational"
source: |
  type.inbound
  and length(internal.nlu_embedding(body.current_thread.text).vectors) > 0
tags:
  - "Test"
detection_methods:
  - "Natural Language Understanding"
id: "9ec4f1d6-7397-5c6e-aa6b-a30250785b7a"
