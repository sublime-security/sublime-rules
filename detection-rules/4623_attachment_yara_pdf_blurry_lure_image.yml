name: "Attachment: PDF with blurry lure image"
description: "Detects PDF attachments containing a blurry image used in credential phishing lures."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_lure_image_blurry", ))
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "a6955660-c759-57db-84d3-c90f71f07b1b"
og_id: "5539a3fd-5821-5fd9-9119-7dd9e42cd739"
