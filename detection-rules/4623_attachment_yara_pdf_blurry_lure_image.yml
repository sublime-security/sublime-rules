name: "PR# 4623 - Attachment: PDF with blurry lure image"
description: "Detects PDF attachments containing a blurry image used in credential phishing lures."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_lure_image_blurry", ))
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "a6955660-c759-57db-84d3-c90f71f07b1b"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4623