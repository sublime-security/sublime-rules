name: "PR# 4642 - Evasion: Hidden content divs from Gmail sender"
description: "Detects inbound messages from Gmail sender containing multiple hidden HTML div elements with specific styling properties (display:none, opacity:0, zero dimensions) that are commonly used to evade content filtering and detection systems."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.domain.root_domain in $free_email_providers
  and strings.count(body.html.raw,
                    '<div style="display:none;opacity:0;width:0;height:0;overflow:hidden" aria-hidden="true">'
  ) >= 3
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Free email provider"
detection_methods:
  - "HTML analysis"
  - "Content analysis"
  - "Sender analysis"
id: "f582e47b-39eb-54d7-aade-44427717376b"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_D-Bolton
references:
  - https://github.com/sublime-security/sublime-rules/pull/4642