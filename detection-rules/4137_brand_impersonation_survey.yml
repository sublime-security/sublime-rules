name: "Brand impersonation: Survey request with credential theft indicators"
description: "Detects messages containing credential theft language disguised as survey requests from promotional content, targeting organizations from untrusted or spoofed high-trust domains."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    any(ml.nlu_classifier(body.current_thread.text).intents,
        .name == "cred_theft" and .confidence == "high"
    )
    or any(ml.nlu_classifier(body.current_thread.text).entities,
           .name == "org" and .text == 'AAA'
    )
    or any(ml.nlu_classifier(body.current_thread.text).entities,
           .name == "request"
           and regex.icontains(.text,
                               'Claim Your Kit',
                               'Road Safety Kit',
                               'Review Your Kit Details',
                               'Get Your Free Car',
                               'courtesy kit',
                               'You QuaIify for'
           )
    )
  )
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name == "Advertising and Promotions" and .confidence != "low"
          or any(ml.nlu_classifier(body.current_thread.text).topics,
                 .name != "Advertising and Promotions"
          )
  )
  and any(ml.nlu_classifier(body.current_thread.text).entities,
          .name in ("request", "org")
          and regex.icontains(.text,
                              'survey',
                              'Offer Ends Soon',
                              'AAA',
                              'Courtesy Roadside Kit',
                              'Premier Roadside',
                              'Review Your Kit Details'
          )
  )
  // and the sender is not from high trust sender root domains
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Impersonation: Brand"
  - "Spoofing"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "Natural Language Understanding"
  - "Sender analysis"
