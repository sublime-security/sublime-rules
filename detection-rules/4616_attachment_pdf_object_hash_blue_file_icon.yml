name: "Attachment: PDF Object Hash with Blue File Icon"
description: "Detects PDF attachments containing a specific object hash (8638ef6bfe382a927aa12a18f2150757) associated with encrypted PDFs leading to cred phishing."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .scan.pdf_obj_hash.object_hash == "8638ef6bfe382a927aa12a18f2150757"
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "File analysis"
id: "62406d6b-e357-5c4d-b440-c8bd72b9e0d0"
og_id: "d092e95c-62b7-5d55-b2a3-6363294180d4"
testing_pr: 4616
testing_sha: e40de576db0cefb688b740d47d2fd38c87edcb28