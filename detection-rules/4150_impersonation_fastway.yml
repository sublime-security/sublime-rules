name: "PR# 4150 - Brand impersonation: Fastway"
description: |
  Impersonation of Fastway Couriers, a delivery services company in Ireland and South Africa.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    strings.ilike(sender.display_name, '*fastway*')
    or strings.ilevenshtein(sender.display_name, 'fastway couriers') <= 1
  )
  and sender.email.domain.root_domain not in~ (
    'fastway.co.za',
    'fastway.com.au',
    'fastway.ie'
  )
  
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Lookalike domain"
  - "Social engineering"
detection_methods:
  - "Sender analysis"
id: "3ec79844-3d2c-5b25-82c0-6d9d97c7265d"
tags:
