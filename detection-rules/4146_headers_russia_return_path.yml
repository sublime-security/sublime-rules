name: "PR# 4146 - Russia return-path TLD (untrusted sender)"
description: |
  The return-path header is a .ru TLD from an untrusted sender.
type: "rule"
severity: "low"
source: |
  type.inbound
  and headers.return_path.domain.tld == "ru"
  and sender.email.domain.domain != "corp.mail.ru"
  and sender.email.domain.domain != "calendar.yandex.ru"
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
  - "Malware/Ransomware"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "6c119d68-4a7f-5237-b83a-ce6865848a01"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4146