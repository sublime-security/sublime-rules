name: "Attachment: PDF Object Hash - Fake Zoom Meeting"
description: "Detects PDF attachments containing a specific object hash (8eba3fb9ab98d0ef303358d7d0cfb10d) known to be associated with malicious content."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"), 
      any(file.explode(.),
          .scan.pdf_obj_hash.object_hash == "8eba3fb9ab98d0ef303358d7d0cfb10d"
      )
  ) 

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "Threat intelligence"
