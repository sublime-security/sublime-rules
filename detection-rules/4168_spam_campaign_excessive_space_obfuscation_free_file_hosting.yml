name: "PR# 4168 - Spam: Campaign with excessive space/char obfuscation and free file hosted link"
description: |
  This rule detects mass spam campaigns using excessive space padding with
  links utilizing free file hosting.
references:
  - "https://playground.sublimesecurity.com?id=a340c08c-a1d9-41a9-96f8-6d1fe888cb5b"
  - https://github.com/sublime-security/sublime-rules/pull/4168
type: "rule"
severity: "low"
source: |
  type.inbound
  and length(attachments) == 0
  and regex.icontains(coalesce(body.html.inner_text, body.html.display_text),
                      '([a-zA-Z\d\.]\s){30,}'
  )
  and any(body.links,
          .href_url.domain.domain in $free_file_hosts
          or .href_url.domain.root_domain in $free_file_hosts
  )
attack_types:
  - "Spam"
tactics_and_techniques:
  - "Free file host"
detection_methods:
  - "Content analysis"
id: "1aa3368d-8f70-5545-9f5d-52a2428d6638"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator