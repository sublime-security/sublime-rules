false_positives:
  - "U+200C (Zero-Width Non-Joiner) appears naturally in Gmail HTML formatting.
     Threshold of 50+ occurrences eliminates this false positive class."
  - "U+FE00–U+FE0F (Variation Selectors 1-16) appear in emoji rendering
     sequences from major mail providers. Threshold of 50+ required."
  - "Email tracking fingerprinting: marketing platforms inject zero-width
     characters between letters of recipient email addresses in tracking URLs.
     Pattern is alphanumeric → ZW char → alphanumeric throughout the email.
     When 70%+ of zero-width chars follow this pattern, classify as tracking
     not steganography. Validated against Glassdoor job alert emails March 2026."
  - "U+FEFF (BOM) appears legitimately at the start of HTML emails as a
     standard encoding marker. Exclude from email body scanning."
  - "Rich HTML marketing emails from legitimate senders use Unicode formatting
     characters in templates. Confirmed senders: ALLMODERN, Hotels.com,
     DepositPhotos, Mpix, Woman Within, Tonecheer, Boys & Girls Clubs,
     Superhuman newsletter — validated in 70-email inbox test March 2026.
     Mitigated by domain exclusion list and threshold of 50+."
  - "U+202E (RLO) and Tag block (U+E0000–U+E007F) remain zero-threshold —
     no legitimate email use case exists for these ranges."
  - "U+E0100–U+E01EF (VS Supplement) zero-threshold retained pending broader
     testing. Operators serving large CJK user bases may apply 3+ threshold
     if noise is observed."
