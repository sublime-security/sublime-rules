name: "Malware: Invisible Unicode payload in email body or attachment (Glassworm-style)"
description: |
  Detects emails carrying Glassworm-style invisible Unicode character payloads
  embedded in the email body or text-based attachments.

  Glassworm hides malicious execution payloads inside invisible Unicode codepoints
  (zero-width spaces, bidirectional control characters, tag characters, and private
  use area codepoints) that render as blank space in every editor but can carry
  executable instructions or C2 communication strings.

  Active campaign as of March 2026. Confirmed across 151+ GitHub repositories,
  npm packages, and VS Code extensions.

  Updated March 2026: Thresholds tuned after real-world testing against 70 Gmail
  inbox emails. U+200C appears 20-30x naturally in Gmail HTML formatting and
  marketing platforms inject ZW chars between email address letters for tracking.
  Threshold of 50+ and tracking fingerprint detection eliminates false positives
  while preserving detection of actual steganography payloads.

  Based on original research: "The Invisible Threat — Glassworm & Unicode Supply Chain Attack"
  by Yana Ivanov (2026).

  References:
  - https://yana-ivanov.github.io/cybersecurity-portfolio/analysis/glassworm_analysis.html
  - MITRE ATT&CK T1027 (Obfuscated Files or Information)
  - MITRE ATT&CK T1027.005 (Indicator Removal from Tools)

severity: critical
type: rule
authors:
  - name: Yana Ivanov

source: |
  type.inbound

  // -----------------------------------------------------------------------
  // BLOCK 1: High-confidence invisible Unicode — zero threshold
  //
  // These ranges have NO legitimate use in email body content.
  //   U+202E          RLO Bidirectional Override — filename reversal trick
  //   U+E0000–U+E007F Tag characters — confirmed Glassworm PUA, no legit use
  //   U+E0100–U+E01EF Variation Selectors Supplement — confirmed Glassworm PUA
  //   U+FFF9–U+FFFB   Interlinear annotation characters
  // -----------------------------------------------------------------------
  and (
    (
      regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '\u202e')
      or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0000-\U000E007F]')
      or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0100-\U000E01EF]')
      or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\ufff9-\ufffb]')
    )

    // -----------------------------------------------------------------------
    // BLOCK 2: Threshold-based invisible Unicode
    //
    // Real-world testing (70 Gmail inbox emails, March 2026) confirmed:
    //   U+200C appears 5-10x in standard Gmail HTML — not suspicious alone
    //   U+FE00–U+FE0F appears in emoji rendering sequences
    // Threshold of 50+ filters all observed legitimate use.
    // -----------------------------------------------------------------------
    or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u200b-\u200f]{50,}')
    or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\ufe00-\ufe0f]{50,}')
    or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u202a-\u202d]{50,}')
    or regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u2060-\u2064]{50,}')

    // -----------------------------------------------------------------------
    // BLOCK 3: Invisible Unicode in text-based attachments — no threshold
    // -----------------------------------------------------------------------
    or any(attachments,
      .file_extension in~ ("js", "ts", "py", "json", "yml", "yaml", "txt", "md", "sh", "ps1")
      and any(file.explode(.),
        regex.icontains(.scan.strings.strings, '[\u200b-\u200f\u202a-\u202e\u2060-\u2064\ufe00-\ufe0f]')
        or regex.icontains(.scan.strings.strings, '[\U000E0000-\U000E007F]')
        or regex.icontains(.scan.strings.strings, '[\U000E0100-\U000E01EF]')
      )
    )
  )

  // -----------------------------------------------------------------------
  // BLOCK 4: Blockchain C2 amplifying signals
  // -----------------------------------------------------------------------
  and (
    true
    or strings.ilike(body.plain.raw, "*ethers.getDefaultProvider*")
    or strings.ilike(body.plain.raw, "*web3.eth.getTransaction*")
    or regex.icontains(body.plain.raw, 'infura\.io|alchemy\.com|ankr\.com|quicknode\.com')
  )

  // -----------------------------------------------------------------------
  // Exclusions: Known safe senders
  // High-trust senders excluded UNLESS they contain zero-threshold indicators.
  // -----------------------------------------------------------------------
  and not (
    sender.email.domain.root_domain in $high_trust_sender_root_domains
    and not any([
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u202e]'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0000-\U000E007F]'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0100-\U000E01EF]'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\ufe00-\ufe0f]{50,}'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u200b-\u200f]{50,}')
      ], .
    )
  )

  // -----------------------------------------------------------------------
  // Exclusions: Known marketing/ESP sender domains
  // These use Unicode formatting legitimately in HTML email templates.
  // Zero-threshold indicators (RLO, Tag block, VS Supplement) still apply.
  // Validated against: ALLMODERN, Hotels.com, DepositPhotos, Mpix,
  // Woman Within, Tonecheer, Boys & Girls Clubs — March 2026 inbox test.
  // -----------------------------------------------------------------------
  and not (
    sender.email.domain.root_domain in~ (
      "allmodern.com", "wayfair.com", "uniqlo.com", "hotels.com",
      "depositphotos.com", "mailchimp.com", "klaviyo.com", "beehiiv.com",
      "substack.com", "hubspot.com", "constantcontact.com", "sendinblue.com",
      "mpix.com", "womanwithin.com", "tonecheer.com", "bgca.org"
    )
    and not any([
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\u202e]'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0000-\U000E007F]'),
        regex.icontains(coalesce(body.html.inner_text, body.plain.raw, ""), '[\U000E0100-\U000E01EF]')
      ], .
    )
  )

