name: "Brand impersonation: Canada Revenue Agency with attachment"
description: "Detects messages impersonating the Canada Revenue Agency (CRA) with attachments, using common tax-related subjects in both English and French, and containing CRA-related content in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(sender.display_name, '(?:Canada Revenue Agency|\bCRA\b)')
  and 3 of (
    any(filter(attachments, .file_type == "pdf"),
        any(file.explode(.),
            any(.scan.url.urls, .domain.root_domain == 'vercel.app')
        )
    ),
    network.whois(sender.email.domain).days_old < 90,
    any(body.links, network.whois(.href_url.domain).days_old <= 365),
    any(body.links,
        regex.icontains(.href_url.path,
                        '\.(msi|exe|lnk|js|vbs|bat|cmd|ps1|hta|wsf|scr)$'
        )
    ),
    regex.icontains(body.current_thread.text,
                    '(?:cra|canada revenue agency|\bt4\b)'
    ),
    regex.icontains(body.current_thread.text,
                    "(tax?|record|form|document|copy|attachment)"
    ),
    regex.icontains(body.current_thread.text,
                    '\b(review|open(?:ed)|evaluat(?:ed|ion)|assessment|feedback|adjust|change|modification|distribution|details|revis(?:ed|ion)|update(?:d|to))\b'
    )
  )
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "cred_theft"
  )
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name in (
            "Reminders and Notifications",
            "Security and Authentication",
            "Request to View Invoice"
          )
          and .confidence != "low"
  )
  // negate legit cra sender domain
  and not (
    sender.email.domain.root_domain == 'cra-arc.gc.ca'
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
  // negate legit senders from merck
  and not (
    sender.email.domain.root_domain == 'merck.com'
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
  // negate highly trusted sender domains unless they fail DMARC authentication
  and not (
    sender.email.domain.root_domain in $high_trust_sender_root_domains
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
  - "PDF"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "Header analysis"
  - "Sender analysis"
