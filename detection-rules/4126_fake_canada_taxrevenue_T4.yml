name: "PR# 4126 - Brand impersonation: Canada Revenue Agency with attachment"
description: "Detects messages impersonating the Canada Revenue Agency (CRA) with attachments, using common tax-related subjects in both English and French, and containing CRA-related content in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (
    strings.icontains(sender.display_name, 'Canada Revenue Agency')
    or strings.icontains(sender.display_name, 'CRA')
  )
  and (
    any(filter(attachments, .file_type == "pdf"),
        any(file.explode(.),
            .scan.pdf_obj_hash.object_hash in (
              "d78fe5b3970f3fc62903a9a718ad13b9",
              "e63a2fcd4f7c82df5e42e30cf5b18675",
              "242063f5800d21c276b1f9c904b32013",
              "7ef09f07baf4d959b980e5638424888b"
            )
            or any(.scan.url.urls, .domain.root_domain == 'vercel.app')
        )
    )
  )
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name == "Reminders and Notifications" and .confidence in ("medium")
          or (.name == "Security and Authentication" and .confidence in ("high"))
  )

attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
  - "PDF"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "Header analysis"
  - "Sender analysis"
id: "a1af76b1-6080-5489-bf8b-c5a7b7cbb725"
