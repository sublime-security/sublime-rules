name: "PR# 4756 - Link: Suspicious wp-admin path from mismatched sender domain"
description: "Detects inbound messages containing links that point to a WordPress admin path (single directory under /wp-admin/ with no subdirectories or file extensions) where the link domain does not match the sender's domain. This mismatch, combined with the use of a sensitive admin path, is indicative of malicious activity. Messages from high-trust senders and known web security services passing DMARC are excluded."
type: "rule"
severity: "medium"
source: |
  type.inbound
  // single file/directory under wp-admin which doesn't contain a .
  and any(body.links,
          regex.icontains(.href_url.path, '^/wp-admin/[^/\.]+/?$')
          // domain is not the same as the sender domain
          and .href_url.domain.root_domain != sender.email.domain.root_domain
  )
  and not (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      // website security companies that send reports via email
      or sender.email.domain.root_domain in ('imperva.com', 'urllo.com')
    )
    and coalesce(headers.auth_summary.dmarc.pass, false)
  )
  
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
  - "Spoofing"
detection_methods:
  - "URL analysis"
  - "Sender analysis"
  - "Header analysis"
