name: "Impersonation: Fake product discount promotion"
description: "Detects messages containing fake product discount offers with Claim X% Off buttons that link to googleapis.com."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(body.html.raw, 'claim \d+% off')
  and any(body.current_thread.links,
          .href_url.domain.root_domain == "googleapis.com"
  )

attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Social engineering"
  - "Free file host"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
  - "URL analysis"
