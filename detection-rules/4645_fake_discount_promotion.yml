name: "PR# 4645 - Impersonation: fake product discount promotion"
description: "Detects messages containing fake product discount offers with Claim X% Off buttons that link to googleapis.com."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(body.html.raw, 'class="product-cta">claim \d+% off')
  and any(body.current_thread.links,
          .href_url.domain.root_domain == "googleapis.com"
  )

attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Social engineering"
  - "Free file host"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
  - "URL analysis"
id: "da4bb1ff-a667-5f3c-ba0a-f01ce3223da7"
tags:
