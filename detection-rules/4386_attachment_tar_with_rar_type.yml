name: "PR# 4386 - Attachment: TAR file with RAR type"
description: "Detects messages with TAR file extensions that are actually RAR file types. This mismatch between file extension and actual file type may indicate an evasion technique."
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(attachments, .file_extension =~ "tar" and .file_type =~ "rar")

attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Evasion"
detection_methods:
  - "Archive analysis"
  - "File analysis"
id: "d3c3a83b-5cc6-522b-9899-34d3050b85ed"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_D-Bolton
references:
  - https://github.com/sublime-security/sublime-rules/pull/4386