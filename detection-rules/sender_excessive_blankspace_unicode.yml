name: "Sender: Excessive blankspace Unicode characters in display name"
description: "Detects messages where the sender's display name contains excessive Unicode characters, which may be used to obscure or manipulate the visual appearance of the sender name for deceptive purposes."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.contains(sender.display_name,
                     '[\x{200B}-\x{200F}\x{202A}-\x{202E}\x{2060}-\x{206F}\x{3164}\x{FEFF}]{3,}'
  )
attack_types:
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
  - "Impersonation: Brand"
detection_methods:
  - "Sender analysis"
  - "Content analysis"
id: "b22329c5-dc58-56cf-afb2-c38a68350887"
