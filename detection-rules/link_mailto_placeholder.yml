name: "Link: Unformatted template with literal placeholder in mailto link"
description: "Detects inbound messages containing mailto links where the href URL still contains an unresolved template placeholder ('{domain}', '{email}', or '{RECIPIENT_EMAIL}', matched case-insensitively and allowing internal whitespace), indicating the sender used a template but failed to substitute the actual value before sending."
type: "rule"
severity: "medium"
source: |
                                                                                               
  type.inbound
  and any(body.links,
          .href_url.scheme == "mailto"
          and (
              // @{domain} pattern is strong
              regex.icontains(.href_url.url, '@\s*{\s*domain\s*}')
              // combine {RECIPIENT_EMAIL} and {SENDER EMAIL} with NLU to remove a bunch of 
              // benign use cases
              or (
                  regex.icontains(.href_url.url, '{\s*(?:RECIPIENT|SENDER)[_\s]?EMAIL\s*}')
                  and any(ml.nlu_classifier(body.current_thread.text).intents,
                          .name in ("cred_theft", "bec") and .confidence == "high")
              )
          )
  )
  
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "URL analysis"
  - "Content analysis"
