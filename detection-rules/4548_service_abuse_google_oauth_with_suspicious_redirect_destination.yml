name: "PR# 4548 - Service abuse: Google OAuth with suspicious redirect destination"
description: "Detects messages containing Google OAuth links with prompt=none parameter that redirect to suspicious domains including free file hosts, free subdomain providers, or self-service creation platforms."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.links,
          .href_url.domain.subdomain == "accounts"
          and .href_url.domain.sld == "google"
          and strings.istarts_with(.href_url.path, '/o/oauth2/v2/auth')
          and strings.icontains(.href_url.url, 'prompt=none')
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Free file host"
  - "Free subdomain host"
  - "Open redirect"
  - "Social engineering"
detection_methods:
  - "URL analysis"
  - "Threat intelligence"
id: "6858c8f7-630c-55e0-9ab8-2fa708c987bc"
tags:
  - created_from_open_prs
