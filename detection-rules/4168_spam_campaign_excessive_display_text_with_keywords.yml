name: "PR# 4168 - Spam: Campaign with excessive display-text and keywords found"
description: |
  Detects affiliate marketing spam where any link contains display-text greater than 3000 chars and specific values found. 
references:
  - "https://playground.sublimesecurity.com?id=aa90e106-fa06-43f2-aa85-50d69591e073"
  - https://github.com/sublime-security/sublime-rules/pull/4168
type: "rule"
severity: "low"
source: |
  type.inbound
  and length(body.links) > 0
  and any(body.links, length(.display_text) > 3000)
  and any(body.links,
          regex.icontains(.display_text, '(\bPassword:)', 'Hi.{0,5}Welcome\b')
  )
attack_types:
  - "Spam"
detection_methods:
  - "Content analysis"
id: "35b08d6b-8a11-51e3-93bc-dbcba961afca"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator