name: "Acts of Violence: Repetitive violence language"
description: "Flags obsessive repetition like 'DIE DIE DIE' or repeated violence words that show fixation."
type: "rule"
severity: "critical"
source: |
  type.inbound
  and length(body.current_thread.text) > 50
  and length(body.current_thread.text) < 10000
  and (
    // Repeated die or death or kill
    regex.icontains(body.current_thread.text,
                    '(?:(?:die|death|kill|murder|shoot)\s*!*\s*){3,}'
    )
    // Repeated violence verbs
    or regex.icontains(body.current_thread.text,
                       '(?:(?:kill|murder|shoot|stab|hurt|harm|attack|assault|beat|destroy|eliminate|slaughter|slay|strangle|choke)\s+(?:[\r\n]+\s+){0,5}){3,}'
    )
    // Death/violence in all caps
    or regex.count(body.current_thread.text,
                   '(?:DIE|KILL|MURDER|DEATH|SHOOT|HURT|DESTROY|DEAD)'
    ) > 3
    // Or combined with "YOU" or "WILL"
    or regex.contains(body.current_thread.text,
                      '(?:YOU|WILL)\s+(?:[\r\n]+\s+){0,5}(?:DIE|KILL|DEATH|SHOOT|HURT|DEAD)'
    )
    // Extreme repetition with any violence term
    or (
      length(body.current_thread.text) < 500
      and (
        regex.icount(body.current_thread.text,
                     '(?:die|kill|dead|death|murder|shoot|hurt)',
        ) > 5
      )
    )
  )
  and any(ml.nlu_classifier(body.current_thread.text).topics,
          .name == "Acts of Violence" and .confidence == "high"
  )
  
  // Negate benign contexts
  and not any(ml.nlu_classifier(body.current_thread.text).topics,
              .name in (
                "News and Current Events",
                "Newsletters and Digests",
                "Entertainment and Sports"
              )
              and .confidence == "high"
  )
id: "abde646c-fc0b-5d44-aa17-985ea35f9477"
