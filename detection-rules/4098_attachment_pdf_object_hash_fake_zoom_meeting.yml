name: "Attachment: PDF Object Hash - Fake Zoom Meeting"
description: "Detects PDF attachments containing a specific object hash (8eba3fb9ab98d0ef303358d7d0cfb10d) known to be associated with malicious content."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .scan.pdf_obj_hash.object_hash == "8eba3fb9ab98d0ef303358d7d0cfb10d"
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "Threat intelligence"
id: "6be9524e-1fcb-5a4b-85c9-eb51fdc16b77"
og_id: "fba5f4b6-8e87-55e9-a9c4-f16d3c45e60c"
testing_pr: 4098
testing_sha: 8af61a7fe26a014f6f4f035ef9b296666f3d620a