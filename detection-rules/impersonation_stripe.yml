name: "Brand Impersonation: Stripe"
description: |
  Impersonation of Stripe, usually for credential theft.
type: "rule"
severity: "high"
source: |
  type.inbound
  and (
    (
      sender.display_name =~ 'stripe '
      or (
        strings.istarts_with(sender.display_name, 'stripe')
        and not sender.display_name in~ (
          'Stripe & Stare',
          'Stripe and Stare',
          'Stripe Events',
          'Stripe Contracts via Docusign',
          'Stripe Press',
          'Stripe Partner Ecosystem via LinkedIn',
          'Stripe Economics',
          'Stripe OLT'
        )
      )
      or strings.replace_confusables(sender.display_name) =~ 'stripe'
      // fake stripe invoice in attached picture
      or (
        any(attachments,
            .file_type in $file_types_images
            and any(file.explode(.),
                    regex.icontains(.scan.ocr.raw, '\bstripe\b')
                    and not regex.icontains(.scan.ocr.raw,
                                            '(?:via Stripe|partners with Stripe|invoice\.stripe\.com|Stripe (?:Customer Portal|(?:Pro )?Subscription)|Perplexity|@stripe\.com)'
                    )
                    and any(ml.nlu_classifier(.scan.ocr.raw).intents,
                            .name in ("callback_scam")
                            and .confidence in ("medium", "high")
                    )
            )
        )
      )
    )
    or 2 of (
      strings.icontains(body.current_thread.text, 'The Stripe Team'),
      strings.icontains(sender.display_name, 'Stripe'),
      regex.icontains(subject.base, 'payout.{0,5}paused'),
      regex.icontains(subject.base, 'res(?:ume|tore).{0,5}payout'),
      regex.icontains(body.current_thread.text, 'payout.{0,5}paused'),
      regex.icontains(body.current_thread.text, 'res(?:ume|tore).{0,5}payout'),
      regex.icontains(body.current_thread.text, 'customer.{0,5}chargeback'),
      regex.icontains(body.current_thread.text, 'suspicious.{0,5}payment')
    )
  )
  and sender.email.domain.root_domain not in~ (
    'stripe.com',
    'stripetour.com',
    'stripe-club.com'
  )
  and sender.email.email not in $recipient_emails
  
  // Stripe adds a custom header
  // don't match messages with the header
  and not any(headers.hops, any(.fields, .name == "X-Stripe-EID"))
  
  // msg negations
  and not regex.icontains(body.current_thread.text,
                          '(?:Stripe (?:Local|Dashboard|University|Commons)|marked as paid by Stripe)'
  )

attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Lookalike domain"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "862d4654-4a32-50c1-a441-b3a5106be174"
