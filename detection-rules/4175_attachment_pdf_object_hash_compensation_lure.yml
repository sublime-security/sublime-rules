name: "PR# 4175 - Attachment: PDF Object Hash - Malicious PDF with compensation lure"
description: "Detects PDF attachments containing a specific object hash that has been identified as malicious. This hash-based detection targets known malicious PDF objects used in targeted attacks."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .scan.pdf_obj_hash.object_hash in (
                "baf7a7496c205fd7d27267e0dce6e5ef",
                "c57d382b638960d183fd955be1063a3a"
              )
          )
  )

attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "File analysis"
  - "Threat intelligence"
id: "001e5fe6-1c1a-590e-90dd-a083d0f87873"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_markmsublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4175