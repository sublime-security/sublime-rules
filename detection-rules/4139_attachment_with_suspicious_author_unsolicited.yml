name: "PR# 4139 - Attachment with suspicious author"
description: |
  Recursively scans files and archives to detect embedded docx files with a specific author.
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(attachments,
          (
            .file_extension in~ ("doc", "docm", "docx", "dot", "dotm")
            or .file_extension in~ $file_extensions_common_archives
          )
          and any(file.explode(.), strings.ilike(.scan.docx.author, "root"))
  )
attack_types:
  - "Malware/Ransomware"
detection_methods:
  - "File analysis"
id: "1fc657cf-79ee-5eb4-a517-78f6a4ccb030"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_MSAdministrator
references:
  - https://github.com/sublime-security/sublime-rules/pull/4139