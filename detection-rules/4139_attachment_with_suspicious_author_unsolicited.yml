name: "Attachment with suspicious author"
description: |
  Recursively scans files and archives to detect embedded docx files with a specific author.
type: "rule"
severity: "high"
source: |
  type.inbound
  and any(attachments,
          (
            .file_extension in~ ("doc", "docm", "docx", "dot", "dotm")
            or .file_extension in~ $file_extensions_common_archives
          )
          and any(file.explode(.), strings.ilike(.scan.docx.author, "root"))
  )
attack_types:
  - "Malware/Ransomware"
detection_methods:
  - "File analysis"
id: "1fc657cf-79ee-5eb4-a517-78f6a4ccb030"
og_id: "40f518b9-88a2-59c5-8f6a-54bfd0fdf209"
testing_pr: 4139
