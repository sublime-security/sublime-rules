name: "PR# 4061 - Brand impersonation: Zoom via HTML styling"
description: "Detects messages impersonating Zoom by identifying HTML table cells with specific blue styling (rgb(11,92,255)) containing Zoom branding in header elements."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(html.xpath(body.html, '//tr/td[contains(@style, "rgb(11,92,255)")]/h1').nodes,
          strings.icontains(.display_text, "zoom")
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "HTML analysis"
id: "eb2efe0e-e5cc-5e12-9146-c17eb9ac7591"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4061