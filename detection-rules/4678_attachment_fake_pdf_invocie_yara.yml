name: "PR# 4678 - Attachment: Fake PDF Invoices Yara"
description: "These yara signatures match fake invoice PDFs with specific artifiacts including images and link locations. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches,
                  .name in (
                    "fake_invoice_pdf_structure_01",
                    "fake_invoice_pdf_images_01",
                  )
              )
          )
  )
attack_types:
  - "Malware/Ransomware"
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "File analysis"
  - "YARA"
id: "0b802dbd-c27c-58a4-ab63-04560bab3080"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4678