name: "PR# 4077 - Attachment: PDF with email message metadata structure"
description: "Detects single-page PDF attachments containing structured email metadata fields including From, Subject, Date, and Reference elements, which may indicate forwarded or embedded email content within a PDF document."
type: "rule"
severity: "medium"
source: |
  type.inbound
  // only a single pdf attachmet
  and length(attachments) == 1
  and any(attachments,
          .file_type == "pdf"
          // a single page pdf
          and beta.parse_exif(.).page_count == 1
          and any(file.explode(.),
                  .depth == 1
                  // three of the four table elements observed in the message
                  // these are exact matches when split on new lines extracted from the text of the PDF from the scanPDF scanner
                  and 3 of (
                    'From' in~ .scan.strings.strings,
                    'Subject' in~ .scan.strings.strings,
                    'Date' in~ .scan.strings.strings,
                    'Reference' in~ .scan.strings.strings
                  )
          )
  )
  

attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "Content analysis"
  - "Exif analysis"
  - "File analysis"
