name: "Brand impersonation: Indeed"
description: "Detects messages impersonating Indeed using logo detection, Indeed branding elements, and font styling while originating from domains other than legitimate Indeed domains."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and 2 of (
    strings.contains(body.current_thread.text,
                     "Block B, Capital Dock, 80 Sir John Rogerson's Quay, Grand Canal Dock, Dublin 2"
    ),
    strings.contains(sender.display_name, 'lndeed'),
    strings.icontains(sender.display_name, 'indeed'),
    any(ml.logo_detect(file.message_screenshot()).brands,
        .name == "Indeed" and .confidence == "high"
    ),
    strings.contains(body.current_thread.text, 'lndeed'),
    strings.contains(sender.email.domain.sld, 'indeed')
  )
  and not (
    sender.email.domain.root_domain in (
      'indeed.com',
      'indeedemail.com',
      'careindeed.com',
      'recruitee.com',
      'indeedflex.com',
      'clrco.com',
      'googlegroups.com'
    )
    and headers.auth_summary.dmarc.pass
  )
  // not forwards/replies
  and not (
    length(headers.references) > 0
    and (subject.is_forward or subject.is_reply)
    and length(body.previous_threads) >= 1
  )
  // negate iCloud Private Message Relay
  and not (
    sender.email.domain.domain == "privaterelay.appleid.com"
    or any(headers.hops, any(.fields, .name == "X-ICLOUD-HME"))
  )
  // negate instances where proofpoint sends a review of a reported message via analyzer
  and not (
    sender.email.email == "analyzer@analyzer.securityeducation.com"
    and any(headers.domains, .root_domain == "pphosted.com")
    and headers.auth_summary.spf.pass
    and headers.auth_summary.dmarc.pass
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Computer Vision"
  - "Content analysis"
  - "Header analysis"
  - "Sender analysis"
id: "f1e291fc-15f8-5ae1-b36c-444d89440a08"
