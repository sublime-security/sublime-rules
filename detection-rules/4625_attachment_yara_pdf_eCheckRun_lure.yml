name: "Attachment: PDF with eCheckRun lures"
description: "Detects PDF attachments containing artifacts from a couple eCheckRun lures we've observed. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_eCheckLure_format", ))
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "fef186eb-6165-58c7-baaa-95da7026a252"
og_id: "577991e1-b7c4-5f35-a2ca-239424062e7d"
testing_pr: 4625
