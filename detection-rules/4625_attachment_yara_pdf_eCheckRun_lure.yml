name: "PR# 4625 - Attachment: PDF with eCheckRun lures"
description: "Detects PDF attachments containing artifacts from a couple eCheckRun lures we've observed. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.yara.matches, .name in ("pdf_eCheckLure_format", ))
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "PDF"
detection_methods:
  - "File analysis"
  - "YARA"
id: "fef186eb-6165-58c7-baaa-95da7026a252"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4625