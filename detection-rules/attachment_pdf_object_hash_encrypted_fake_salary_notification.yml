name: "Attachment: PDF Object Hash - fake salary notification"
description: "Detects PDF attachments containing a specific object hash (1dd474cd8d27d2ba2228150176920d00) that may indicate malicious content or known threat indicators."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              .scan.pdf_obj_hash.object_hash == "1dd474cd8d27d2ba2228150176920d00"
          )
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "PDF"
  - "Evasion"
detection_methods:
  - "File analysis"
  - "Threat intelligence"
id: "381cf20f-3764-5a4f-94e6-c21b8be54926"
