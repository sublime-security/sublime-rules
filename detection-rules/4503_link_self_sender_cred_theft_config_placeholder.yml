name: "PR# 4503 - Link: Self-sender credential theft with configuration placeholder"
description: "Detects messages where the sender and recipient are the same address, containing credential theft language and links with configuration placeholder text indicating a phishing lure."
type: "rule"
severity: "high"
source: |
  type.inbound
  // self sender
  and length(recipients.to) == 1
  and sender.email.email == recipients.to[0].email.email
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == 'cred_theft' and .confidence != 'low'
  )
  and any(body.current_thread.links,
          strings.contains(ml.link_analysis(., mode="aggressive").final_dom.raw,
                           '/*──── CONFIG: Replace with your lure URL ────*/'
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Evasion"
detection_methods:
  - "Natural Language Understanding"
  - "Content analysis"
  - "URL analysis"
  - "Header analysis"
id: "f3278088-a485-5a0f-9af7-91ecc13ffe60"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_D-Bolton
references:
