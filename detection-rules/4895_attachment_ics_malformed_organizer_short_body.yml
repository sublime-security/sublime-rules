name: "Attachment: ICS calendar invite with invalid organizer domain"
description: "Detects inbound messages with minimal body text containing an ICS calendar file where the event organizer's email domain fails validation. This technique is used to deliver malicious calendar invites that may redirect recipients to fraudulent sites or harvest credentials through calendar interactions."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and (body.current_thread.text is null or length(body.current_thread.text) < 500)
  and any(attachments,
          (
            .file_type == "ics"
            or .file_extension == "ics"
            or .content_type in ("application/ics", "text/calendar")
          )
          //
          // This rule makes use of a beta feature and is subject to change without notice
          // using the beta feature in custom rules is not suggested until it has been formally released
          //
          and any(beta.file.parse_ics(.).events,
                  .organizer.email.email is not null
                  and .organizer.email.email != ""
                  and not .organizer.email.domain.valid
          )
  )
attack_types:
  - "ICS Phishing"
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
  - "Spoofing"
detection_methods:
  - "File analysis"
  - "Content analysis"
  - "Sender analysis"
