name: "PR# 4163 - Link: Direct link to riddle.com hosted showcase"
description: "Message contains a single link to a Riddle.com hosted showcase which has been observed abused for credential phishing landing"
type: "rule"
severity: "medium"
source: |
  type.inbound
  and length(body.links) < 20
  and any(body.links, .href_url.domain.root_domain == "riddle.com")
  and length(filter(body.links,
                    .href_url.domain.root_domain == "riddle.com"
                    and strings.istarts_with(.href_url.path, '/view/')
             )
  ) == 1
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
  )
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Free file host"
detection_methods:
  - "Sender analysis"
  - "URL analysis"
  - "Header analysis"
id: "63afca54-75a7-5a9a-a8af-bf1168f64f04"
references:
  - https://github.com/sublime-security/sublime-rules/pull/4163