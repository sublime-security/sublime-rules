name: "PR# 4103 - Attachment: PDF file with low reputation links to suspicious filetypes (unsolicited)"
description: |
  Detects messages with PDF attachments linking directly to suspicious filetypes on hosts with low reputation from unsolicited senders.
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(ml.nlu_classifier(body.current_thread.text).entities,
          .name == "request"
  )
  and any(attachments,
          .file_extension == "pdf"
          and any(file.explode(.),
                  any(.scan.pdf.urls,
                      regex.contains(.path,
                                     '\.(?:exe|cab|vbs|ps1|rar|iso|dll|one|lnk|sh)\b'
                      )
                      and .domain.root_domain not in $tranco_1m
                  )
          )
  )
tags:
  - "Malfam: Ave Maria"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
