name: "PR# 4103 - Attachment: PDF file with low reputation link to ZIP file (unsolicited)"
description: |
  Detects messages with PDF attachments linking directly to zip files from unsolicited senders.
type: "rule"
severity: "medium"
authors:
  - name: "Michael Tingle"
source: |
  type.inbound
  and any(ml.nlu_classifier(body.current_thread.text).entities,
          .name == "request"
  )
  and any(attachments,
          .file_extension == "pdf"
          and any(file.explode(.),
                  any(.scan.pdf.urls,
                      regex.contains(.url, '\.(?:zip)')
                      and .domain.root_domain not in $tranco_1m
                  )
          )
  )
tags:
  - "Malfam: QakBot"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
