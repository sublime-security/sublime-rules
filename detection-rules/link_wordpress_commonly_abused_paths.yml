name: "Link: WordPress Commonly Abused Paths"
description: "Detects links targeting commonly exploited WordPress administrative and content paths that are frequently abused by attackers to host malicious content"
type: "rule"
severity: "low"
source: |
  type.inbound
  and 0 < length(body.links) < 15
  and any(body.links,
          regex.icontains(.href_url.path,
                          // commonly abused wordpress paths
                          '^\/wp-(?:admin|includes)\/.*\.(?:html?|php)',
                          '^\/wp-content\/(?:(?:mu-)?plugins|themes)\/.*\.(?:html?|php)'
          )
          and not regex.icontains(.href_url.path,
                                  '^\/wp-admin\/(?:[a-z0-9-]+\/)?[a-z0-9-]+\.php'
          )
          and not regex.icontains(.href_url.path,
                                  '^\/wp-content\/.*\/(?:confirm|functions|matomo)\.php$'
          )
  )
  // exclude wordpress mailer
  and not strings.istarts_with(headers.mailer, 'WPMailSMTP')
  and any(ml.nlu_classifier(body.current_thread.text).intents, .name != "benign")

attack_types:
  - "Credential Phishing"
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Exploit"
detection_methods:
  - "URL analysis"
  - "Header analysis"
id: "4b93032a-537f-5de6-b665-7f16b6baa98c"
