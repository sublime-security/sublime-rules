name: "PR# 4902 - Spam: Suspicious toll-free phone number"
description: "Detects messages containing phone numbers 1 800-555-0199 or 1 800-555-0299 in the subject or body, which is reserved for use by the entertainment industry. Commonly used as a placeholder phone number in LLM-generated campaigns."
type: "rule"
severity: "low"
source: |
  type.inbound
  and any([body.current_thread.text, subject.subject],
          regex.icontains(., '\b\+?(\d{1}.)?\(?8\d{2}?\)?.555.?0[12]99\b')
  )
attack_types:
  - "Spam"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "b0146028-1830-5968-bdb3-8fb29aff052b"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_peterdj45
references:
  - https://github.com/sublime-security/sublime-rules/pull/4902