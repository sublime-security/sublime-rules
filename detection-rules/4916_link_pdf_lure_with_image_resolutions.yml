name: "PR# 4916 - Link: PDF lure with image resolution pattern"
description: "Detects inbound messages containing a link with 'PDF' display text alongside body content matching a numeric image resolution patterns, observed in a document preview lure."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.current_thread.links, strings.contains(.display_text, "PDF"))
  and regex.icontains(body.current_thread.text, '[0-9]{3}x[0-9]{3} (RSI|DPI)')
attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "b8a6f527-db22-5dc5-bd98-0992ebdd3ad8"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4916