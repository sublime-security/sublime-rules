name: "PR# 4598 - Attachment: PDF file with recipient domain and ATT eCheckRun pattern"
description: "Detects PDF attachments with filenames containing the recipient's domain, potentially indicating targeted financial document spoofing."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          strings.contains(.file_name, recipients.to[0].email.domain.sld)
          and strings.starts_with(.file_name, "ATT")
          and strings.icontains(.file_name, "eCheckRun")
  )

attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "PDF"
  - "Social engineering"
detection_methods:
  - "File analysis"
  - "Content analysis"
id: "276accec-b211-550a-bced-d61883de3bd5"
tags:
