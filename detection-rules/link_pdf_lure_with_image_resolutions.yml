name: "Link: PDF lure with image resolution pattern"
description: "Detects inbound messages containing a link with 'PDF' display text alongside body content matching a numeric image resolution patterns, observed in a document preview lure."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.current_thread.links, 
      strings.contains(.display_text, "PDF")
  )
  and regex.icontains(body.current_thread.text, '[0-9]{3}x[0-9]{3} (RSI|DPI)')

attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
