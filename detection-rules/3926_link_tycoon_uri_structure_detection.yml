name: "PR# 3926 - Link: Unsolicited email contains link to page containing Tycoon URI structure"
description: "Detects links containing Tycoon phishing kit URI patterns with specific alphanumeric sequences separated by exclamation marks or at symbols from unsolicited senders."
type: "rule"
severity: "high"
source: |
    type.inbound
    and 0 < length(body.links) < 15
    and any(body.links,
            any(html.xpath(ml.link_analysis(.).final_dom, '//script//text()').nodes,
                // full tycoon uri struct
                any(.links,
                    any(regex.extract(.href_url.url,
                                      '(?P<url_fragment>\/[a-zA-Z0-9]{0,30}[!@][a-zA-Z0-9]{0,30}\/)'
                        ),
                        not regex.icontains(.named_groups["url_fragment"],
                                            '\/[!@][a-zA-Z]{2,30}\/'
                        )
                    )
                    and regex.icontains(.href_url.url,
                                        'https:\/\/[^/]+\/[a-zA-Z0-9]{0,30}[!@][a-zA-Z0-9]{0,30}\/'
                    )
                    and not strings.icontains(.href_url.url, 'https://www.')
                    and not regex.icontains(.href_url.domain.root_domain,
                                            '(?:fpjs\.io|(?:medium|unpkg)\.com|turtl\.co)'
                    )
                )
            )
            // tycoon structured path and cloudflare captcha domain
            or (
              regex.icontains(.display_text,
                              '\/[a-zA-Z0-9]{0,30}[!@][a-zA-Z0-9]{0,30}\/'
              )
              and strings.icontains(.display_text, 'challenges.cloudflare.com')
            )
    )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Sender analysis"
  - "URL analysis"
  - "URL screenshot"
