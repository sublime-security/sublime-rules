name: "PR# 4408 - Abuse: Robinhood injected content"
description: "Detects messages from Robinhood with injected data into the 'Device' field. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "noreply@robinhood.com"
  and strings.contains(body.current_thread.text, "Your recent login to Robinhood")
  and any(html.xpath(body.html, '//div/ul/li[contains(., "Device:")]').nodes,
          length(.raw) > 500
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "HTML analysis"
  - "Sender analysis"
id: "999a8ee3-1dc7-5a45-a946-18cb21df74a8"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4408