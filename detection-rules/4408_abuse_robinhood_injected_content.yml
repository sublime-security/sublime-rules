name: "Abuse: Robinhood injected content"
description: "Detects messages from Robinhood with injected data into the 'Device' field. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == "noreply@robinhood.com"
  and strings.contains(body.current_thread.text, "Your recent login to Robinhood")
  and any(html.xpath(body.html, '//div/ul/li[contains(., "Device:")]').nodes,
          length(.raw) > 500
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Header analysis"
  - "HTML analysis"
  - "Sender analysis"
id: "999a8ee3-1dc7-5a45-a946-18cb21df74a8"
og_id: "4ada5d76-9327-538e-9ebc-31e63dfcc252"
testing_pr: 4408
testing_sha: 25311550372ad5e7038a14ffc96b7dcc01c91eb6