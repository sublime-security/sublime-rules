name: "Service abuse: Task management message sent via SendGrid"
description: "Detect and auto-quarantine messages from senders within the blocklisted_senders group"
type: "rule"
severity: "high"
source: |
  type.inbound and sender.email.email in $blocklisted_senders
default_actions: ["quarantine_message"]
detection_methods:
  - "Sender analysis"
