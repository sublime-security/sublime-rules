name: "PR# 4244 - Service abuse: Microsoft Azure callback scam"
description: "Detects callback scams using the legitimate Microsoft Azure no-reply email address with callback scam language in the message body."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.email == 'azure-noreply@microsoft.com'
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "callback_scam" and .confidence != "low"
  )

attack_types:
  - "Callback Phishing"
tactics_and_techniques:
  - "Impersonation: Brand"
  - "Out of band pivot"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Natural Language Understanding"
  - "Sender analysis"
id: "6883ae21-6a80-5a56-8062-1686b6203f91"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_markmsublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4244