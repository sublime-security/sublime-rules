name: "Fake warning banner using confusable characters"
description: "Detects messages containing fake security banners that use visually similar characters to impersonate legitimate sender verification text, potentially to bypass security controls and deceive recipients."
type: "rule"
severity: "medium"
source: |
  type.inbound
  // contains wanner banner text with confusables
  and regex.contains(strings.replace_confusables(body.current_thread.text),
                     'This sender has been verified fro(?:m|rn) safe senders list'
  )
  // but not in plain text
  and not strings.contains(body.current_thread.text,
                           'This sender has been verified from safe senders list'
  )
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
