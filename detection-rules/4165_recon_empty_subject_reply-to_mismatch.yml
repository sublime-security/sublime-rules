name: "PR# 4165 - Reconnaissance: Empty subject with mismatched reply-to"
description: "Message with no subject line from a sender where the reply-to address differs from the sender address, potentially indicating header manipulation or impersonation tactics."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and subject.base == ""
  and length(headers.reply_to) > 0
  and sender.email.email not in map(headers.reply_to, .email.email)
tags:
  - "Attack surface reduction"
  - pr_author_MSAdministrator
  - created_from_open_prs
  - rule_status_modified
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
  - "Spoofing"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
id: "cd0df9ee-4f8d-5091-b8a0-18cdcb894c46"
references:
