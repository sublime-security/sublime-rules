name: "PR# 4246 - Body: Strange Date format"
description: "Detects messages containing strage date formats observed in phishing emails. "
type: "rule"
severity: "medium"
source: |
  type.inbound
  and regex.icontains(body.plain.raw,
                      'Date:\s(?:Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday)\s(?:January|February|March|April|May|June|July|August|September|October|November|December)\s202(?:5|6|7|8|9)'
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Spoofing"
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "70c360fd-f678-57b4-b47a-c2646ce9f52c"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4246