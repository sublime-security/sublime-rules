name: "PR# 4698 - Body: Investment scams fake purchase offer"
description: "Matching fake purchase offers/investment scams."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and strings.icontains(subject.base, "Offer to Purchase")
  and strings.icontains(body.plain.raw,
                        "private equity",
                        "acquiring companies",
                        "discuss the opportunity"
  )
attack_types:
  - "BEC/Fraud"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
id: "211e5315-9e6f-5583-b4de-854144e511fa"
tags:
  - created_from_open_prs
  - rule_status_added
  - pr_author_keaton-sublime
references:
  - https://github.com/sublime-security/sublime-rules/pull/4698