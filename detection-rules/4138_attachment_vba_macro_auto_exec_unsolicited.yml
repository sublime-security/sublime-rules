name: "PR# 4138 - Attachment with auto-executing macro (unsolicited)"
description: |
  Attachment from an unsolicited sender contains a macro that will auto-execute when the file is opened.

  Macros are a common phishing technique used to deploy malware.
references:
  - "https://www.trustedsec.com/blog/malicious-macros-for-script-kiddies/"
  - https://github.com/sublime-security/sublime-rules/pull/4138
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(attachments,
          (
            .file_extension in~ $file_extensions_macros
            or (
              .file_extension is null
              and .file_type == "unknown"
              and .content_type == "application/octet-stream"
              and .size < 100000000
            )
          )
          and any(file.oletools(.).macros.keywords, .type =~ "autoexec")
  )
  // negate replies
  and (
    length(headers.references) == 0
    or not any(headers.hops, any(.fields, strings.ilike(.name, "In-Reply-To")))
  )
attack_types:
  - "Malware/Ransomware"
tactics_and_techniques:
  - "Macros"
detection_methods:
  - "Archive analysis"
  - "Header analysis"
  - "File analysis"
  - "Macro analysis"
  - "OLE analysis"
id: "37a4b4fe-fd18-5338-8312-8fbf57b7888b"
tags:
