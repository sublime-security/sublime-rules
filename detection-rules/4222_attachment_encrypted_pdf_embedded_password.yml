name: "Attachment: Encrypted PDF with embedded password"
description: "Attached PDF is encrytped, where the password is provided in the email body text. This technique is commonly used to bypass security scanning since encrypted files cannot be analyzed for malicious content."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(filter(attachments, .file_type == "pdf"),
          any(file.explode(.),
              any(.scan.exiftool.fields, .key == "Encryption")
              or (
                .scan.entropy.entropy > 7
                and any(.scan.strings.strings, strings.icontains(., "/Encrypt"))
              )
          )
          // Encrypted PDFs do not have child nodes with any data
          and all(filter(file.explode(.), .depth > 0), .size == 0)
  )
  and (
    regex.icontains(body.current_thread.text,
                    '(Access|Preview|Unlock|Decrypt|Pass)\s*(?:word|code)\s*(?:\S+\s+){0,3}PDF\s*is?\s*:',
                    'This\s+(?:file|document|pdf)\s+is\s+(?:password[-\s]?)\s+protected\.\s*The\s+password\s+is\s*:?',
                    '(?:Access|Preview|Unlock|Decrypt)\s+(?:\S+\s+){0,3}PDF(?:\S+\s+){0,3}pass(?:word|code)'
    )
    or (
      regex.icontains(body.current_thread.text,
                      'PDF\s*(?:.){0,18}\spass(?:word|code)'
      )
      and not regex.icontains(body.current_thread.text,
                              'PDF\s*[^\r\n]+\s*pass(?:word|code)\s+(is\s+your|format\swould\sbe|recovery)',
                              'encrypted[\w\s]{1,60}identity',
                              'PDF\s(document\sis|is)\spassword-protected'
      )
    )
    or (
      (
        length(body.current_thread.text) <= 10
        or (body.current_thread.text is null)
      )
      and any(body.previous_threads,
              regex.icontains(.text,
                              '(Access|Preview|Unlock|Decrypt|Pass)\s*(?:word|code)\s*(?:\S+\s+){0,3}PDF\s*is?\s*:',
                              'This\s+(?:file|document|pdf)\s+is\s+(?:password[-\s]?)\s+protected\.\s*The\s+password\s+is\s*:?',
                              '(?:Access|Preview|Unlock|Decrypt)\s+(?:\S+\s+){0,3}PDF(?:\S+\s+){0,3}pass(?:word|code)'
              )
              or (
                regex.icontains(.text, 'PDF\s*(?:.){0,18}\s*pass(?:word|code)')
                and not regex.icontains(.text,
                                        'PDF\s*[^\r\n]+\s*pass(?:word|code)\s+(is\s+your|format\swould\sbe|recovery)',
                                        'encrypted[\w\s]{1,60}identity',
                                        'PDF\s(document\sis|is)\spassword-protected'
                )
              )
      )
    )
  )
  // not forwards/replies
  and not (
    (length(headers.references) > 0 or headers.in_reply_to is not null)
    and (subject.is_forward or subject.is_reply)
    and length(body.previous_threads) >= 1
  )
  and (
    (
      profile.by_sender_email().prevalence in ("new", "outlier")
      and not profile.by_sender_email().solicited
    )
    or (
      profile.by_sender_email().any_messages_malicious_or_spam
      and not profile.by_sender_email().any_messages_benign
    )
    or (
      length(recipients.to) == 0
      or all(recipients.to,
             strings.ilike(.display_name, "undisclosed?recipients")
      )
    )
    or (
      length(recipients.to) == 1
      and any(recipients.to, .email.email == sender.email.email)
    )
  )
  // negate highly trusted sender domains unless they fail DMARC authentication
  and (
    (
      sender.email.domain.root_domain in $high_trust_sender_root_domains
      and not headers.auth_summary.dmarc.pass
    )
    or sender.email.domain.root_domain not in $high_trust_sender_root_domains
    or sender.email.domain.root_domain not in $org_domains
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Encryption"
  - "Evasion"
  - "PDF"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "Exif analysis"
  - "File analysis"
  - "Natural Language Understanding"
  - "Sender analysis"
