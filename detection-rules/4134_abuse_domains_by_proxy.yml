name: "PR# 4134 - Service abuse: Domains By Proxy sender"
description: "Message originates from a sender using Domains By Proxy's domain privacy service, commonly used to hide domain ownership information."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and sender.email.domain.root_domain == 'domainsbyproxy.com'

attack_types:
  - "Spam"
  - "Credential Phishing"
  - "BEC/Fraud"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Header analysis"
  - "Sender analysis"
  - "Whois"
id: "76c30e2a-b49d-56a2-a168-44e362c237d6"
tags:
