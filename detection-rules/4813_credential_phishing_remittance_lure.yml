name: "Credential phishing: Remittance financial lure"
description: "Detects inbound messages referencing remittance in a financial context where natural language understanding identifies high-confidence credential theft intent. These messages leverage financial transaction terminology to deceive recipients into surrendering their credentials."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(ml.nlu_classifier(body.current_thread.text).entities,
          .name == "financial" and strings.icontains(.text, 'remittance')
  )
  and any(ml.nlu_classifier(body.current_thread.text).intents,
          .name == "cred_theft" and .confidence == "high"
  )
  
tags:
  - "Attack surface reduction"
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Natural Language Understanding"
  - "Content analysis"
