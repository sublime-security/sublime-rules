name: "Attachment: PDF with minimal object structure and link annotations"
description: "Identifies PDF attachments with a simplified object structure containing fewer than 12 objects while including link annotations and standard PDF elements. This pattern may indicate artificially constructed PDFs designed to bypass security filters while maintaining the ability to redirect users to external resources."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(attachments,
          .file_type == "pdf"
          and any(file.explode(.),
                  (
                    strings.icount(.scan.pdf_obj_hash.hash_string, '|') < 12
                    and strings.icontains(.scan.pdf_obj_hash.hash_string,
                                          '|Annot/Link|Page|Catalog|Author|Pages|Filter|'
                    )
                  )
          )
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "PDF"
detection_methods:
  - "File analysis"
  - "Content analysis"
