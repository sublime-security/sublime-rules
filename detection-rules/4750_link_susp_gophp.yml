name: "PR# 4750 - Link: Suspicious go.php redirect with document lure"
description: "Detects links containing a PHP redirect endpoint with authentication parameters, commonly used in malicious redirects and unauthorized access attempts."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and any(body.current_thread.links,
          strings.ends_with(.href_url.path, "go.php")
          and strings.starts_with(.href_url.query_params, "auth=", "c=")
          and strings.count(.href_url.path, "/") == 2
  )
attack_types:
  - "Credential Phishing"
tactics_and_techniques:
  - "Evasion"
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "URL analysis"
id: "8a21583c-498c-5b57-bcee-8f832a5ca235"
tags:
  - created_from_open_prs
  - rule_status_modified
  - pr_author_zoomequipd
references:
