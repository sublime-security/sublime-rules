name: "Link: Remittance payment request with suspicious indicators"
description: "Detects messages containing references to business days and account information with links containing 'remittance' in the URL path, commonly used in financial fraud schemes."
type: "rule"
severity: "medium"
source: |
  type.inbound
  and strings.icontains(body.plain.raw, "business days")
  and strings.icontains(body.plain.raw, "account")
  and any(body.links, strings.icontains(.href_url.path, "remittance"))
attack_types:
  - "BEC/Fraud"
  - "Credential Phishing"
tactics_and_techniques:
  - "Social engineering"
detection_methods:
  - "Content analysis"
  - "URL analysis"
id: "06d21fb0-41f5-58c1-82cc-2a2660be213f"
og_id: "10dde1bf-480e-589b-95a3-3f81b811b667"
